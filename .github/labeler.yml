# PR Labeler Configuration
# Uses modern changed-files syntax (actions/labeler v5+)
#
# Goals:
# - Automatic area labels for better triage
# - Special attention to high-risk areas (migrations, security, infra)
# - Keep rules minimal and maintainable

# Frontend
area/frontend:
  - changed-files:
      - any-glob-to-any-file: 'frontend/**/*'

# Backend / Data layer
area/backend:
  - changed-files:
      - any-glob-to-any-file: 'supabase/**/*'
      - any-glob-to-any-file: 'scripts/**/*'

# Database migrations (high risk — deserves extra review)
area/migrations:
  - changed-files:
      - any-glob-to-any-file: 'supabase/migrations/**/*'

# Documentation
area/docs:
  - changed-files:
      - any-glob-to-any-file: '**/*.md'
      - any-glob-to-any-file: 'docs/**/*'

# CI / GitHub Actions / Workflows
area/ci:
  - changed-files:
      - any-glob-to-any-file: '.github/workflows/**/*'
      - any-glob-to-any-file: '.github/actions/**/*'
      - any-glob-to-any-file: '.github/CODEOWNERS'
      - any-glob-to-any-file: '.github/labeler.yml'
      - any-glob-to-any-file: '.github/labels.yml'

# Infrastructure & configuration
area/infra:
  - changed-files:
      - any-glob-to-any-file: 'package.json'
      - any-glob-to-any-file: 'package-lock.json'
      - any-glob-to-any-file: 'vercel.json'
      - any-glob-to-any-file: 'tsconfig*.json'
      - any-glob-to-any-file: 'supabase/config.toml'
