name: Supabase Link and Run
description: Setup Supabase CLI, optionally link a project, then execute a command.

inputs:
  project_ref:
    description: Supabase project reference.
    required: true
  supabase_access_token:
    description: Supabase access token.
    required: true
  supabase_db_password:
    description: Optional database password.
    required: false
    default: ''
  command:
    description: Shell command to execute.
    required: true

runs:
  using: composite
  steps:
    - name: Setup Supabase CLI
      uses: supabase/setup-cli@v2.0.0
      with:
        version: latest

    - name: Validate required inputs
      shell: bash
      env:
        INPUT_PROJECT_REF: ${{ inputs.project_ref }}
        SUPABASE_ACCESS_TOKEN: ${{ inputs.supabase_access_token }}
      run: |
        set -euo pipefail
        if [ -z "$INPUT_PROJECT_REF" ]; then
          echo "::error::project_ref is required."
          exit 1
        fi
        if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
          echo "::error::supabase_access_token is required."
          exit 1
        fi

    - name: Link Supabase project when password is provided
      if: ${{ inputs.supabase_db_password != '' }}
      shell: bash
      env:
        INPUT_PROJECT_REF: ${{ inputs.project_ref }}
        SUPABASE_DB_PASSWORD: ${{ inputs.supabase_db_password }}
      run: |
        set -euo pipefail
        echo "::add-mask::$SUPABASE_DB_PASSWORD"
        supabase link --project-ref "$INPUT_PROJECT_REF" --password "$SUPABASE_DB_PASSWORD" --yes

    - name: Execute command
      shell: bash
      env:
        SUPABASE_ACCESS_TOKEN: ${{ inputs.supabase_access_token }}
        SUPABASE_PROJECT_REF: ${{ inputs.project_ref }}
        SUPABASE_DB_PASSWORD: ${{ inputs.supabase_db_password }}
      run: |
        set -euo pipefail
        bash -lc "${{ inputs.command }}"
