# yaml-language-server: $schema=https://json.schemastore.org/github-action.json
name: 'Supabase Link and Run'
description: 'Composite action that links a Supabase project and runs a command using the Supabase CLI.'

inputs:
  project_ref:
    description: 'Supabase project reference'
    required: true
  supabase_access_token:
    description: 'Supabase access token'
    required: true
  database_url:
    description: 'Optional database URL for deriving SUPABASE_DB_PASSWORD if not provided'
    required: false
    default: ''
  supabase_db_password:
    description: 'Optional database password for Supabase CLI operations'
    required: false
    default: ''
  skip_link:
    description: 'Skip the supabase link step'
    required: false
    default: 'false'
  command:
    description: 'Shell command to execute after linking (e.g. "supabase db push")'
    required: true
  supabase_cli_version:
    description: 'Supabase CLI version to use'
    required: false
    default: 'latest'

outputs:
  resolved_db_password:
    description: 'Resolved DB password extracted from inputs or DATABASE_URL'
    value: ${{ steps.creds.outputs.resolved_db_password }}
  skipped:
    description: 'True if the link step was skipped due to deterministic errors'
    value: ${{ steps.link.outputs.skipped }}

runs:
  using: 'composite'
  steps:
    - name: Setup Supabase CLI
      uses: supabase/setup-cli@v1
      with:
        version: ${{ inputs.supabase_cli_version }}

    - name: Validate required inputs
      shell: bash
      env:
        INPUT_PROJECT_REF: ${{ inputs.project_ref }}
        SUPABASE_ACCESS_TOKEN: ${{ inputs.supabase_access_token }}
      run: |
        set -euo pipefail
        if [ -z "$INPUT_PROJECT_REF" ]; then
          echo "::error::project_ref is required."
          exit 1
        fi
        if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
          echo "::error::supabase_access_token is required."
          exit 1
        fi

    - name: Resolve DB credentials
      id: creds
      shell: bash
      env:
        INPUT_DATABASE_URL: ${{ inputs.database_url }}
        INPUT_SUPABASE_DB_PASSWORD: ${{ inputs.supabase_db_password }}
      run: |
        set -euo pipefail
        RESOLVED_DB_PASSWORD="$INPUT_SUPABASE_DB_PASSWORD"
        if [ -z "$RESOLVED_DB_PASSWORD" ] && [ -n "$INPUT_DATABASE_URL" ]; then
          # Extract password from URL defensively without failing on malformed URL variants.
          RESOLVED_DB_PASSWORD=$(echo "$INPUT_DATABASE_URL" | sed -n 's|.*://[^:]*:\([^@]*\)@.*|\1|p' || echo "")
        fi
        if [ -n "$RESOLVED_DB_PASSWORD" ]; then
          echo "::add-mask::$RESOLVED_DB_PASSWORD"
        fi
        printf 'resolved_db_password=%s\n' "$RESOLVED_DB_PASSWORD" >> "$GITHUB_OUTPUT"

    - name: Link Supabase project
      id: link
      if: ${{ inputs.skip_link != 'true' }}
      shell: bash
      env:
        INPUT_PROJECT_REF: ${{ inputs.project_ref }}
        RESOLVED_DB_PASSWORD: ${{ steps.creds.outputs.resolved_db_password }}
        SUPABASE_ACCESS_TOKEN: ${{ inputs.supabase_access_token }}
      run: |
        set -euo pipefail
        is_deterministic_link_error() {
          local output="$1"
          local pattern='invalid access token|invalid token|not authorized|unauthorized|forbidden|permission denied|necessary privileges|project ref.*not found|project.*not found|invalid project ref|database password.*incorrect|password authentication failed|Unexpected HTTP response: 404'
          echo "$output" | grep -Eiq "$pattern"
        }
        run_link_once() {
          if [ -n "$RESOLVED_DB_PASSWORD" ]; then
            timeout --signal=TERM --kill-after=15s 120s \
              supabase link --project-ref "$INPUT_PROJECT_REF" --password "$RESOLVED_DB_PASSWORD" --yes </dev/null
          else
            timeout --signal=TERM --kill-after=15s 120s \
              supabase link --project-ref "$INPUT_PROJECT_REF" --yes </dev/null
          fi
        }
        run_link_with_retry() {
          local max_attempts=3
          local delay_seconds=10
          local attempt=1
          while true; do
            echo "Linking Supabase project (attempt $attempt/$max_attempts)..."
            local output
            output=$(run_link_once 2>&1) || {
              local exit_code=$?
              echo "$output"
              # Correct bash syntax: func "$arg" (sin paréntesis)
              if is_deterministic_link_error "$output"; then
                echo "::warning::Supabase link skipped (deterministic error): $output"
                echo "skipped=true" >> "$GITHUB_OUTPUT"
                return 0
              fi
              if [ "$attempt" -ge "$max_attempts" ]; then
                echo "::error::Supabase project link failed after $max_attempts attempts. Check the link step output above for the upstream/proxy error returned by Supabase CLI."
                return 1
              fi
              attempt=$((attempt + 1))
              echo "::warning::Supabase project link failed, retrying in ${delay_seconds}s in case this was a transient upstream/proxy error."
              sleep "$delay_seconds"
              continue
            }
            echo "$output"
            echo "Supabase project linked successfully."
            return 0
          done
        }
        run_link_with_retry

    - name: Write command script
      if: steps.link.outputs.skipped != 'true'
      shell: bash
      env:
        ACTION_COMMAND: ${{ inputs.command }}
      run: |
        set -euo pipefail
        {
          echo '#!/usr/bin/env bash'
          printf '%s\n' "$ACTION_COMMAND"
        } > /tmp/supabase_command.sh
        chmod +x /tmp/supabase_command.sh

    - name: Execute command
      if: steps.link.outputs.skipped != 'true'
      shell: bash
      env:
        DATABASE_URL: ${{ inputs.database_url }}
        SUPABASE_ACCESS_TOKEN: ${{ inputs.supabase_access_token }}
        SUPABASE_PROJECT_REF: ${{ inputs.project_ref }}
        SUPABASE_DB_PASSWORD_INPUT: ${{ steps.creds.outputs.resolved_db_password }}
      run: |
        set -euo pipefail

        if [ -n "${SUPABASE_DB_PASSWORD_INPUT:-}" ]; then
          export SUPABASE_DB_PASSWORD="$SUPABASE_DB_PASSWORD_INPUT"
        fi

        # ROOT CAUSE FIX (Supabase CLI + official guidance for GitHub Actions):
        # Supabase direct host db.<ref>.supabase.co is IPv6-only by default (to save IPv4).
        # GitHub ubuntu-latest runners frequently have no usable IPv6 route to Supabase IPv6
        # → "dial tcp [2a05:...]:5432: network is unreachable".
        # Solution: Prefer the Supavisor Session Pooler string (port 5432 on aws-0-*.pooler.supabase.com)
        # which reliably provides IPv4. Store it as the DATABASE_URL secret (from Dashboard → Connect → "Session mode").
        # Modern Supabase CLI (2.1x+) after `supabase link` also auto-selects pooler-compatible paths.
        # Never force the direct IPv6 hostname in CI.
        if [ -n "${DATABASE_URL:-}" ]; then
          # Primary: Use the provided DATABASE_URL (must be Session Pooler for CI reliability).
          # Do NOT rewrite hostname. Pass verbatim to --db-url.
          SESSION_URL="$DATABASE_URL"
          export SESSION_URL
          echo "Using provided DATABASE_URL for SESSION_URL (Session Pooler recommended for GitHub Actions IPv4)"
        elif [ -n "${SUPABASE_DB_PASSWORD:-}" ] && [ -n "${SUPABASE_PROJECT_REF:-}" ]; then
          # Fallback (only if no DATABASE_URL): construct Session Pooler style if possible,
          # but prefer letting supabase link handle connection. For explicit, use direct only as last resort.
          # Note: we intentionally do NOT default to db.<ref> here to avoid IPv6 failures.
          SESSION_URL=$(printf 'postgresql://postgres:%s@db.%s.supabase.co:5432/postgres' "$SUPABASE_DB_PASSWORD" "$SUPABASE_PROJECT_REF")
          export SESSION_URL
          echo "::warning::No DATABASE_URL provided; falling back to direct host (potential IPv6 issues). Prefer Session Pooler."
        fi

        if [ -z "${SESSION_URL:-}" ]; then
          echo "::warning::SESSION_URL not set. CLI will use default link context."
        fi

        # Pre-flight connectivity check (Debugging like your psql commands)
        echo "Checking connectivity to database host..."
        DB_HOST=$(python3 -c "import os, urllib.parse as p; u=os.environ.get('SESSION_URL',''); print(p.urlparse(u).hostname or '')" 2>/dev/null || true)
        if [ -n "$DB_HOST" ]; then
          nc -zv -w 5 "$DB_HOST" 5432 || echo "::warning::Could not connect to $DB_HOST on port 5432"
        fi

        if [ -f /tmp/supabase_command.sh ]; then
          bash /tmp/supabase_command.sh
        else
          echo "::error::Command script /tmp/supabase_command.sh not found."
          exit 1
        fi
