# yaml-language-server: $schema=https://json.schemastore.org/github-action.json
name: 'Supabase Link and Run'
description: 'Composite action that links a Supabase project and runs a command using the Supabase CLI (hardened for GitHub Actions + Supabase IPv6/DNS issues).'

inputs:
  project_ref:
    required: true
  supabase_access_token:
    required: true
  database_url:
    required: false
    default: ''
  supabase_db_password:
    required: false
    default: ''
  skip_link:
    required: false
    default: 'false'
  command:
    required: true
  supabase_cli_version:
    required: false
    default: 'latest'

outputs:
  resolved_db_password:
    value: ${{ steps.creds.outputs.resolved_db_password }}
  skipped:
    value: ${{ steps.link.outputs.skipped || 'false' }}

runs:
  using: 'composite'
  steps:
    - name: Setup Supabase CLI
      uses: supabase/setup-cli@v1
      with:
        version: ${{ inputs.supabase_cli_version }}

    - name: Validate required inputs
      shell: bash
      env:
        INPUT_PROJECT_REF: ${{ inputs.project_ref }}
        SUPABASE_ACCESS_TOKEN: ${{ inputs.supabase_access_token }}
      run: |
        set -euo pipefail
        [[ -z "$INPUT_PROJECT_REF" ]] && { echo "::error::project_ref is required"; exit 1; }
        [[ -z "$SUPABASE_ACCESS_TOKEN" ]] && { echo "::error::supabase_access_token is required"; exit 1; }

    - name: Resolve DB credentials
      id: creds
      shell: bash
      env:
        INPUT_DATABASE_URL: ${{ inputs.database_url }}
        INPUT_SUPABASE_DB_PASSWORD: ${{ inputs.supabase_db_password }}
      run: |
        set -euo pipefail
        RESOLVED_DB_PASSWORD="$INPUT_SUPABASE_DB_PASSWORD"

        if [ -z "$RESOLVED_DB_PASSWORD" ] && [ -n "$INPUT_DATABASE_URL" ]; then
          # More robust password extraction
          RESOLVED_DB_PASSWORD=$(printf '%s' "$INPUT_DATABASE_URL" | sed -n 's|^[^:]*://[^:]*:\([^@]*\)@.*|\1|p' || true)
        fi

        if [ -n "$RESOLVED_DB_PASSWORD" ]; then
          echo "::add-mask::$RESOLVED_DB_PASSWORD"
        fi

        printf 'resolved_db_password=%s\n' "$RESOLVED_DB_PASSWORD" >> "$GITHUB_OUTPUT"

    - name: Link Supabase project
      id: link
      if: ${{ inputs.skip_link != 'true' }}
      shell: bash
      env:
        INPUT_PROJECT_REF: ${{ inputs.project_ref }}
        RESOLVED_DB_PASSWORD: ${{ steps.creds.outputs.resolved_db_password }}
        SUPABASE_ACCESS_TOKEN: ${{ inputs.supabase_access_token }}
      run: |
        set -euo pipefail

        is_deterministic_link_error() {
          local output="$1"
          local pattern='invalid access token|invalid token|not authorized|unauthorized|forbidden|permission denied|necessary privileges|project ref.*not found|project.*not found|invalid project ref|database password.*incorrect|password authentication failed|Unexpected HTTP response: 404'
          echo "$output" | grep -Eiq "$pattern"
        }

        run_link_once() {
          local args=(--project-ref "$INPUT_PROJECT_REF" --yes)
          [ -n "$RESOLVED_DB_PASSWORD" ] && args+=(--password "$RESOLVED_DB_PASSWORD")

          timeout --signal=TERM --kill-after=15s 120s \
            supabase link "${args[@]}" </dev/null
        }

        run_link_with_retry() {
          local max_attempts=3 delay=10 attempt=1
          while true; do
            echo "Linking Supabase project (attempt $attempt/$max_attempts)..."
            local output exit_code=0
            output=$(run_link_once 2>&1) || exit_code=$?

            echo "$output"

            if [ $exit_code -eq 0 ]; then
              echo "Supabase project linked successfully."
              return 0
            fi

            if is_deterministic_link_error "$output"; then
              echo "::warning::Supabase link skipped (deterministic error)"
              echo "skipped=true" >> "$GITHUB_OUTPUT"
              return 0
            fi

            if [ $attempt -ge $max_attempts ]; then
              echo "::error::Supabase project link failed after $max_attempts attempts."
              return 1
            fi

            attempt=$((attempt + 1))
            echo "::warning::Link failed, retrying in ${delay}s..."
            sleep "$delay"
          done
        }

        run_link_with_retry

    - name: Execute command
      if: steps.link.outputs.skipped != 'true'
      shell: bash
      env:
        DATABASE_URL: ${{ inputs.database_url }}
        SUPABASE_ACCESS_TOKEN: ${{ inputs.supabase_access_token }}
        SUPABASE_PROJECT_REF: ${{ inputs.project_ref }}
        SUPABASE_DB_PASSWORD: ${{ steps.creds.outputs.resolved_db_password }}
        ACTION_COMMAND: ${{ inputs.command }}
      run: |
        set -euo pipefail

        # Prefer Session Pooler (DATABASE_URL) over direct host for GitHub Actions reliability
        if [ -n "${DATABASE_URL:-}" ]; then
          SESSION_URL="$DATABASE_URL"
        elif [ -n "${SUPABASE_DB_PASSWORD:-}" ] && [ -n "${SUPABASE_PROJECT_REF:-}" ]; then
          SESSION_URL="postgresql://postgres:${SUPABASE_DB_PASSWORD}@db.${SUPABASE_PROJECT_REF}.supabase.co:5432/postgres?sslmode=require"
          echo "::warning::No DATABASE_URL provided. Using direct host (may have IPv6 issues)."
        else
          SESSION_URL=""
        fi

        export SESSION_URL

        # Lightweight, non-blocking preflight
        if [ -n "$SESSION_URL" ]; then
          HOST=$(echo "$SESSION_URL" | sed -n 's|.*@\(.*\):.*|\1|p' | cut -d'?' -f1 || true)
          if [ -n "$HOST" ]; then
            echo "Preflight: resolving $HOST..."
            getent hosts "$HOST" >/dev/null 2>&1 || dig +short "$HOST" @8.8.8.8 >/dev/null 2>&1 || \
              echo "::warning::Could not resolve $HOST (possible transient DNS issue on runner)"
          fi
        fi

        # Write and execute the provided command safely (avoids YAML/heredoc parsing issues with large inline scripts)
        printf '%s\n' "$ACTION_COMMAND" > /tmp/supabase_command.sh
        chmod +x /tmp/supabase_command.sh
        bash /tmp/supabase_command.sh
