# yaml-language-server: $schema=https://json.schemastore.org/github-action
name: Supabase Link and Run
description: 'Composite action that links a Supabase project and runs a command using the Supabase CLI.'

inputs:
  project_ref:
    description: 'Supabase project reference'
    required: true
  supabase_access_token:
    description: 'Supabase access token'
    required: true
  database_url:
    description: 'Optional database URL for deriving SUPABASE_DB_PASSWORD if not provided'
    required: false
    default: ''
  supabase_db_password:
    description: 'Optional database password for Supabase CLI operations'
    required: false
    default: ''
  command:
    description: 'Shell command to execute after linking (e.g. "supabase db push")'
    required: true

runs:
  using: composite
  steps:
    - name: Setup Supabase CLI
      uses: supabase/setup-cli@v2.0.0
      with:
        version: latest

    - name: Validate required inputs
      shell: bash
      env:
        INPUT_PROJECT_REF: ${{ inputs.project_ref }}
        SUPABASE_ACCESS_TOKEN: ${{ inputs.supabase_access_token }}
      run: |
        set -euo pipefail
        if [ -z "$INPUT_PROJECT_REF" ]; then
          echo "::error::project_ref is required."
          exit 1
        fi
        if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
          echo "::error::supabase_access_token is required."
          exit 1
        fi

    - name: Link Supabase project
      id: link
      shell: bash
      env:
        INPUT_PROJECT_REF: ${{ inputs.project_ref }}
        INPUT_DATABASE_URL: ${{ inputs.database_url }}
        INPUT_SUPABASE_DB_PASSWORD: ${{ inputs.supabase_db_password }}
        SUPABASE_ACCESS_TOKEN: ${{ inputs.supabase_access_token }}
      run: |
        set -euo pipefail

        RESOLVED_DB_PASSWORD="$INPUT_SUPABASE_DB_PASSWORD"
        if [ -z "$RESOLVED_DB_PASSWORD" ] && [ -n "$INPUT_DATABASE_URL" ]; then
          # Extract password from DATABASE_URL
          RESOLVED_DB_PASSWORD=$(python3 -c 'from urllib.parse import urlparse; import os; print(urlparse(os.environ.get("INPUT_DATABASE_URL", "")).password or "")')
        fi

        if [ -n "$RESOLVED_DB_PASSWORD" ]; then
          echo "::add-mask::$RESOLVED_DB_PASSWORD"
          supabase link --project-ref "$INPUT_PROJECT_REF" --password "$RESOLVED_DB_PASSWORD" --yes
        else
          supabase link --project-ref "$INPUT_PROJECT_REF" --yes
        fi

        # Pass to outputs for downstream steps in this action
        echo "resolved_db_password=$RESOLVED_DB_PASSWORD" >> "$GITHUB_OUTPUT"

    - name: Execute command
      shell: bash
      env:
        DATABASE_URL: ${{ inputs.database_url }}
        SUPABASE_ACCESS_TOKEN: ${{ inputs.supabase_access_token }}
        SUPABASE_PROJECT_REF: ${{ inputs.project_ref }}
        SUPABASE_DB_PASSWORD: ${{ steps.link.outputs.resolved_db_password }}
      run: |
        set -euo pipefail
        cat > /tmp/supabase_command.sh <<'CMD'
        ${{ inputs.command }}
        CMD
        chmod +x /tmp/supabase_command.sh
        /tmp/supabase_command.sh
