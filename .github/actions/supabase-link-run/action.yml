# yaml-language-server: $schema=https://json.schemastore.org/github-action.json
name: 'Supabase Link and Run'
description: 'Composite action that links a Supabase project and runs a command using the Supabase CLI.'

inputs:
  project_ref:
    description: 'Supabase project reference'
    required: true
  supabase_access_token:
    description: 'Supabase access token'
    required: true
  database_url:
    description: 'Optional database URL for deriving SUPABASE_DB_PASSWORD if not provided'
    required: false
    default: ''
  supabase_db_password:
    description: 'Optional database password for Supabase CLI operations'
    required: false
    default: ''
  command:
    description: 'Shell command to execute after linking (e.g. "supabase db push")'
    required: true

outputs:
  resolved_db_password:
    description: 'Resolved DB password extracted from inputs or DATABASE_URL'
    value: ${{ steps.link.outputs.resolved_db_password }}

runs:
  using: 'composite'
  steps:
    - name: Setup Supabase CLI
      uses: supabase/setup-cli@v2
      with:
        version: latest

    - name: Validate required inputs
      shell: bash
      env:
        INPUT_PROJECT_REF: ${{ inputs.project_ref }}
        SUPABASE_ACCESS_TOKEN: ${{ inputs.supabase_access_token }}
      run: |
        set -euo pipefail
        if [ -z "$INPUT_PROJECT_REF" ]; then
          echo "::error::project_ref is required."
          exit 1
        fi
        if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
          echo "::error::supabase_access_token is required."
          exit 1
        fi

    - name: Link Supabase project
      id: link
      shell: bash
      env:
        INPUT_PROJECT_REF: ${{ inputs.project_ref }}
        INPUT_DATABASE_URL: ${{ inputs.database_url }}
        INPUT_SUPABASE_DB_PASSWORD: ${{ inputs.supabase_db_password }}
        SUPABASE_ACCESS_TOKEN: ${{ inputs.supabase_access_token }}
      run: |
        set -euo pipefail

        RESOLVED_DB_PASSWORD="$INPUT_SUPABASE_DB_PASSWORD"
        if [ -z "$RESOLVED_DB_PASSWORD" ] && [ -n "$INPUT_DATABASE_URL" ]; then
          # Extract password from DATABASE_URL
          RESOLVED_DB_PASSWORD=$(python3 -c 'from urllib.parse import urlparse; import os; print(urlparse(os.environ.get("INPUT_DATABASE_URL", "")).password or "")')
        fi

        run_link_once() {
          if [ -n "$RESOLVED_DB_PASSWORD" ]; then
            timeout --signal=TERM --kill-after=15s 120s \
              supabase link --project-ref "$INPUT_PROJECT_REF" --password "$RESOLVED_DB_PASSWORD" --yes </dev/null
          else
            timeout --signal=TERM --kill-after=15s 120s \
              supabase link --project-ref "$INPUT_PROJECT_REF" --yes </dev/null
          fi
        }

        run_link_with_retry() {
          local max_attempts=3
          local delay_seconds=10
          local attempt=1

          while true; do
            echo "Linking Supabase project (attempt $attempt/$max_attempts)..."
            if run_link_once; then
              return 0
            fi

            if [ "$attempt" -ge "$max_attempts" ]; then
              echo "::error::Supabase project link failed after $max_attempts attempts."
              return 1
            fi

            attempt=$((attempt + 1))
            echo "::warning::Supabase project link failed, retrying in ${delay_seconds}s in case this was a transient upstream/proxy error."
            sleep "$delay_seconds"
          done
        }

        if [ -n "$RESOLVED_DB_PASSWORD" ]; then
          echo "::add-mask::$RESOLVED_DB_PASSWORD"
        fi
        run_link_with_retry

        # Always publish the resolved password output before linking. If the link
        # step fails, GitHub still records whether credential resolution worked,
        # which makes failed runs easier to diagnose from debug logs.
        printf 'resolved_db_password=%s\n' "$RESOLVED_DB_PASSWORD" >> "$GITHUB_OUTPUT"

        is_deterministic_failure() {
          local output="$1"
          # Fail fast on deterministic/structural errors; do not retry these.
          if echo "$output" | grep -qE "(permission denied|invalid token|not authorized|invalid project|authentication failed)"; then
            return 0
          fi
          return 1
        }

        run_link_once() {
          if [ -n "$RESOLVED_DB_PASSWORD" ]; then
            timeout --signal=TERM --kill-after=15s 120s \
              supabase link --project-ref "$INPUT_PROJECT_REF" --password "$RESOLVED_DB_PASSWORD" --yes </dev/null
          else
            timeout --signal=TERM --kill-after=15s 120s \
              supabase link --project-ref "$INPUT_PROJECT_REF" --yes </dev/null
          fi
        }

        run_link_with_retry() {
          local max_attempts=3
          local delay_seconds=10
          local attempt=1

          while true; do
            echo "Linking Supabase project (attempt $attempt/$max_attempts)..."
            local output
            output=$(run_link_once 2>&1) || {
              local exit_code=$?
              echo "$output"

              # Short-circuit if this is a deterministic failure.
              if is_deterministic_failure "$output"; then
                echo "::error::Deterministic auth/permission failure detected. Not retrying."
                return "$exit_code"
              fi

              if [ "$attempt" -ge "$max_attempts" ]; then
                echo "::error::Supabase project link failed after $max_attempts attempts. Check the link step output above for the upstream/proxy error returned by Supabase CLI."
                return 1
              fi

              attempt=$((attempt + 1))
              echo "::warning::Supabase project link failed, retrying in ${delay_seconds}s in case this was a transient upstream/proxy error."
              sleep "$delay_seconds"
              continue
            }

            echo "$output"
            echo "Supabase project linked successfully."
            return 0
          done
        }

        run_link_with_retry

    - name: Write command script
      shell: bash
      env:
        ACTION_COMMAND: ${{ inputs.command }}
      run: |
        set -euo pipefail
        printf '%s\n' "$ACTION_COMMAND" > /tmp/supabase_command.sh
        chmod +x /tmp/supabase_command.sh

    - name: Execute command
      shell: bash
      env:
        DATABASE_URL: ${{ inputs.database_url }}
        SUPABASE_ACCESS_TOKEN: ${{ inputs.supabase_access_token }}
        SUPABASE_PROJECT_REF: ${{ inputs.project_ref }}
        SUPABASE_DB_PASSWORD: ${{ steps.link.outputs.resolved_db_password }}
      run: |
        set -euo pipefail
        /tmp/supabase_command.sh
