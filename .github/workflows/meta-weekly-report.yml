name: Daily Meta + Google Ads Report

# Daily performance analysis for Meta Ads and Google Ads.
# Compares channels, lead funnels and generates a markdown report artifact.
#
# Required secrets:
#   META_ACCESS_TOKEN
#   META_AD_ACCOUNT_ID
#
# Optional secrets (enable Google Ads + CRM enrichment + output persistence):
#   GOOGLE_ADS_SERVICE_ACCOUNT   — service account JSON (base64 or raw)
#   GOOGLE_ADS_DEVELOPER_TOKEN   — Google Ads developer token
#   GOOGLE_ADS_CUSTOMER_ID       — e.g. 123-456-7890
#   DATABASE_URL
#   CLINIC_ID
#   REPORT_USER_ID

on:
  schedule:
    - cron: '0 7 * * *'  # Every day 07:00 UTC (~09:00 Spain)
  workflow_dispatch:

jobs:
  daily-ads-report:
    name: Generate daily Meta + Google Ads report
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Preflight - validate required secrets
        run: |
          MISSING=()
          [ -z "$META_ACCESS_TOKEN" ] && MISSING+=("META_ACCESS_TOKEN")
          [ -z "$META_AD_ACCOUNT_ID" ] && MISSING+=("META_AD_ACCOUNT_ID")
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "::error::Missing secrets: ${MISSING[*]}"
            echo "::error::Add them at Settings -> Secrets and variables -> Actions"
            exit 1
          fi
          echo "Required secrets are configured."
        env:
          META_ACCESS_TOKEN: ${{ secrets['META_ACCESS_TOKEN'] || '' }}
          META_AD_ACCOUNT_ID: ${{ secrets['META_AD_ACCOUNT_ID'] || '' }}

      - name: Install optional DB dependency
        run: npm install --no-save pg

      - name: Run daily Meta + Google Ads report
        run: node scripts/meta-weekly-report.js
        env:
          META_ACCESS_TOKEN: ${{ secrets['META_ACCESS_TOKEN'] || '' }}
          META_AD_ACCOUNT_ID: ${{ secrets['META_AD_ACCOUNT_ID'] || '' }}
          GOOGLE_ADS_SERVICE_ACCOUNT: ${{ secrets['GOOGLE_ADS_SERVICE_ACCOUNT'] || '' }}
          GOOGLE_ADS_DEVELOPER_TOKEN: ${{ secrets['GOOGLE_ADS_DEVELOPER_TOKEN'] || '' }}
          GOOGLE_ADS_CUSTOMER_ID: ${{ secrets['GOOGLE_ADS_CUSTOMER_ID'] || '' }}
          DATABASE_URL: ${{ secrets['DATABASE_URL'] || '' }}
          CLINIC_ID: ${{ secrets['CLINIC_ID'] || '' }}
          REPORT_USER_ID: ${{ secrets['REPORT_USER_ID'] || '' }}

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: daily-ads-unified-report
          path: reports/meta-weekly-report-*.md
          if-no-files-found: error
