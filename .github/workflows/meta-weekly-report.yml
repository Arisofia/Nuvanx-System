name: Daily Meta + Google Ads Report

permissions:
  contents: read

# Daily performance analysis for Meta Ads and Google Ads.
# Compares channels, lead funnels and generates a markdown report artifact.
#
# Required secrets:
#   META_ACCESS_TOKEN
#   META_AD_ACCOUNT_ID
#
# Optional secrets (enable Google Ads + CRM enrichment + output persistence):
#   GOOGLE_ADS_SERVICE_ACCOUNT   — service account JSON (base64 or raw)
#   GOOGLE_ADS_DEVELOPER_TOKEN   — Google Ads developer token
#   GOOGLE_ADS_CUSTOMER_ID       — e.g. 123-456-7890
#   DATABASE_URL
#   CLINIC_ID
#   REPORT_USER_ID

on:
  workflow_dispatch:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * *'  # 8am Madrid

jobs:
  report:
    runs-on: ubuntu-latest
    env:
      REPORT_DAYS: 30
      META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
      META_AD_ACCOUNT_ID: ${{ secrets.META_AD_ACCOUNT_ID }}
      GOOGLE_ADS_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_ADS_SERVICE_ACCOUNT }}
      GOOGLE_ADS_DEVELOPER_TOKEN: ${{ secrets.GOOGLE_ADS_DEVELOPER_TOKEN }}
      GOOGLE_ADS_CUSTOMER_ID: ${{ secrets.GOOGLE_ADS_CUSTOMER_ID }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      CLINIC_ID: ${{ secrets.CLINIC_ID }}
      REPORT_USER_ID: ${{ secrets.REPORT_USER_ID }}

    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
      - name: Validate required secrets
        run: |
          MISSING=()
          [ -z "$META_ACCESS_TOKEN" ] && MISSING+=("META_ACCESS_TOKEN")
          [ -z "$META_AD_ACCOUNT_ID" ] && MISSING+=("META_AD_ACCOUNT_ID")
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "::error::Missing required secrets: ${MISSING[*]}"
            echo "::error::Configure them in GitHub Settings → Secrets and variables → Actions"
            exit 1
          fi
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          META_AD_ACCOUNT_ID: ${{ secrets.META_AD_ACCOUNT_ID }}
      - run: npm install --no-save pg
      - run: node scripts/meta-daily-report.js
      - uses: actions/upload-artifact@v4.6.0
        with:
          name: daily-ads-unified-report
          path: reports/
