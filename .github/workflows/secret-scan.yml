# yaml-language-server: $schema=https://raw.githubusercontent.com/SchemaStore/schemastore/master/src/schemas/json/github-workflow.json
name: Secret Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  scan:
    name: Repository secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    env:
      # This environment variable forces JavaScript actions to run with Node.js 24,
      # addressing the deprecation warning for Node.js 20.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4 # v4
      - uses: actions/setup-node@v4 # v4
        with:
          node-version: 20
      - run: node scripts/scan-secrets.js
