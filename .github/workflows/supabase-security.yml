name: Supabase Security Check

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  SUPABASE_PROJECT_REF: ssvvuuysgxyqvmovrlvk

# Fails the CI if any table is missing RLS or has a dangerous policy.
# Runs on every push and pull_request to main.
#
# Required secrets:
#   SUPABASE_ACCESS_TOKEN   — Supabase personal access token
#   SUPABASE_DB_PASSWORD    — optional, recommended for db lint on linked remote
#   DATABASE_URL            — optional fallback to derive SUPABASE_DB_PASSWORD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  advisor:
    name: RLS & security lint
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Run Supabase DB lint
        if: ${{ secrets.SUPABASE_ACCESS_TOKEN != '' }}
        uses: ./.github/actions/supabase-link-and-run
        with:
          project_ref: ${{ env.SUPABASE_PROJECT_REF }}
          supabase_access_token: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          database_url: ${{ secrets.DATABASE_URL }}
          supabase_db_password: ${{ secrets.SUPABASE_DB_PASSWORD }}
          command: |
            if [ -z "$SUPABASE_DB_PASSWORD" ]; then
              echo "::warning::SUPABASE_DB_PASSWORD not set — skipping remote lint because linking may prompt in CI."
              exit 0
            fi
            supabase db lint --linked --level error

      - name: Skip security lint (missing token)
        if: ${{ secrets.SUPABASE_ACCESS_TOKEN == '' }}
        run: echo "::warning::SUPABASE_ACCESS_TOKEN not set — skipping security lint."
