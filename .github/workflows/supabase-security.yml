# yaml-language-server: $schema=https://json.schemastore.org/github-workflow
name: Supabase Security Check

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Fails the CI if any table is missing RLS or has a dangerous policy.
# Runs on every push and pull_request to main.
#
# Required secrets:
#   SUPABASE_ACCESS_TOKEN   — Supabase personal access token
#   SUPABASE_PROJECT_REF    — Supabase project ref used by supabase link
#   SUPABASE_DB_PASSWORD    — optional, recommended for db lint on linked remote
#   DATABASE_URL            — optional fallback to derive SUPABASE_DB_PASSWORD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  advisor:
    name: RLS & security lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate Supabase security secrets
        run: |
          MISSING=()
          [ -z "$SUPABASE_ACCESS_TOKEN" ] && MISSING+=("SUPABASE_ACCESS_TOKEN")
          [ -z "$SUPABASE_PROJECT_REF" ] && MISSING+=("SUPABASE_PROJECT_REF")
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "::error::Missing required Supabase security secrets: ${MISSING[*]}"
            echo "::error::Configure them in GitHub Settings → Secrets and variables → Actions."
            exit 1
          fi

      - name: Run Supabase DB lint
        uses: ./.github/actions/supabase-link-run
        with:
          project_ref: ${{ env.SUPABASE_PROJECT_REF }}
          supabase_access_token: ${{ env.SUPABASE_ACCESS_TOKEN }}
          database_url: ${{ env.DATABASE_URL }}
          supabase_db_password: ${{ env.SUPABASE_DB_PASSWORD }}
          command: |
            if [ -n "$DATABASE_URL" ]; then
              supabase db lint --db-url "$DATABASE_URL" --level error --fail-on error
            elif [ -n "$SUPABASE_DB_PASSWORD" ]; then
              supabase db lint --linked --password "$SUPABASE_DB_PASSWORD" --level error --fail-on error
            else
              echo "::error::SUPABASE_DB_PASSWORD and DATABASE_URL are both missing. Cannot run security lint."
              exit 1
            fi

