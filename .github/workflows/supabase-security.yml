name: Supabase Security Check

# Fails the CI if any table is missing RLS or has a dangerous policy.
# Runs on every push and pull_request to main.
#
# Required secrets:
#   SUPABASE_ACCESS_TOKEN   — Supabase personal access token

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  advisor:
    name: RLS & security lint
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Run Supabase DB lint
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN || '' }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::warning::SUPABASE_ACCESS_TOKEN not set — skipping security lint."
            exit 0
          fi
          supabase db lint --level error --project-ref ssvvuuysgxyqvmovrlvk
