name: Supabase Security Check

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Fails the CI if any table is missing RLS or has a dangerous policy.
# Runs on every push and pull_request to main.
#
# Required secrets:
#   SUPABASE_ACCESS_TOKEN   — Supabase personal access token
#   SUPABASE_PROJECT_REF    — Supabase project ref used by supabase link

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  advisor:
    name: RLS & security lint
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Supabase RLS & security lint
        uses: ./.github/actions/supabase-link-run
        with:
          project_ref: ${{ secrets.SUPABASE_PROJECT_REF }}
          supabase_access_token: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          command: supabase db lint --level error --linked
