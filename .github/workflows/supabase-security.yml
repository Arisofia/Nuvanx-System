name: Supabase Security Check

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Fails the CI if any table is missing RLS or has a dangerous policy.
# Runs on every push and pull_request to main.
#
# Required secrets:
#   SUPABASE_ACCESS_TOKEN   — Supabase personal access token
#   SUPABASE_PROJECT_REF    — Supabase project ref used by supabase link
#   SUPABASE_DB_PASSWORD    — optional, recommended for db lint on linked remote
#   DATABASE_URL            — optional fallback to derive SUPABASE_DB_PASSWORD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  advisor:
    name: RLS & security lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - name: Run Supabase DB lint
        if: ${{ secrets.SUPABASE_ACCESS_TOKEN != '' }}
        uses: ./.github/actions/supabase-link-run
        with:
          project_ref: ${{ secrets.SUPABASE_PROJECT_REF || 'ssvvuuysgxyqvmovrlvk' }}
          supabase_access_token: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          database_url: ${{ secrets.DATABASE_URL }}
          supabase_db_password: ${{ secrets.SUPABASE_DB_PASSWORD }}
          command: |
            if [ -n "$DATABASE_URL" ]; then
              supabase db lint --db-url "$DATABASE_URL" --level error --fail-on error
            elif [ -n "$SUPABASE_DB_PASSWORD" ]; then
              supabase db lint --linked --password "$SUPABASE_DB_PASSWORD" --level error --fail-on error
            else
              echo "::warning::SUPABASE_DB_PASSWORD and DATABASE_URL are both missing — skipping security lint."
              exit 0
            fi

      - name: Skip security lint (missing token)
        if: ${{ secrets.SUPABASE_ACCESS_TOKEN == '' }}
        run: echo "::warning::SUPABASE_ACCESS_TOKEN not set — skipping security lint."

