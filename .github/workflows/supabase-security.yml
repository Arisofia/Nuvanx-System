# yaml-language-server: $schema=https://raw.githubusercontent.com/SchemaStore/schemastore/master/src/schemas/json/github-workflow.json
name: Supabase Security Check

# Fails the CI if any table is missing RLS or has a dangerous policy.
# Runs on every push and pull_request to main.
#
# Required secrets:
#   SUPABASE_ACCESS_TOKEN   — Supabase personal access token
#   SUPABASE_PROJECT_REF    — Supabase project ref used by supabase link
#   SUPABASE_DB_PASSWORD    — used to build direct DB URL (db.<ref>.supabase.co:5432) as fallback
#   DATABASE_URL            — main secret. Recommended: Session Pooler connection string (port 5432)
#
# GitHub Actions runners have no IPv6.
# The supabase-link-run action auto-rewrites transaction pooler (6543) → Session Pooler (5432).
# Best practice: Store a Session Pooler (5432) string in the DATABASE_URL secret.

on:
  # On push to main, wait for Deploy Supabase to finish so the lint runs against
  # the just-applied migrations (avoids race conditions when a migration both
  # introduces and fixes a function in adjacent commits).
  workflow_run:
    workflows: ["Deploy Supabase"]
    types: [completed]
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}
  workflow_call:
    secrets:
      SUPABASE_ACCESS_TOKEN:
        required: false
      SUPABASE_PROJECT_REF:
        required: false
      DATABASE_URL:
        required: false
      SUPABASE_DB_PASSWORD:
        required: false
      VITE_MCP_API_KEY:
        required: false

env:
  VITE_MCP_API_KEY: ${{ secrets.VITE_MCP_API_KEY }}
  # Deprecated in favor of per-job setting; see advisor job for NODE24 force.

concurrency:
  group: supabase-security-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  advisor:
    name: RLS & security lint
    runs-on: ubuntu-latest
    timeout-minutes: 8
    permissions:
      contents: read
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - name: Prefer IPv4 (gai.conf + diagnostics)
        run: |
          echo "Applying IPv4 precedence (only helps when both A and AAAA records exist)"
          sudo sed -i 's/^#precedence ::ffff:0:0\/96  100/precedence ::ffff:0:0\/96  100/' /etc/gai.conf || true
          echo "Current gai.conf precedence:"
          grep -E 'precedence|IPv4' /etc/gai.conf || true

      - name: Diagnose Supabase host resolution (IPv4 vs IPv6)
        run: |
          echo "=== Supabase connectivity diagnosis (GitHub runner has no IPv6) ==="
          ref="${SUPABASE_PROJECT_REF:-}"
          if [ -z "$ref" ]; then
            echo "SUPABASE_PROJECT_REF not set — skipping host diagnosis."
            exit 0
          fi
          hosts=(
            "db.${ref}.supabase.co"
            "aws-1-eu-central-1.pooler.supabase.co"
            "aws-0-eu-central-1.pooler.supabase.co"
          )
          for h in "${hosts[@]}"; do
            echo ""
            echo "Host: $h"
            nslookup "$h" 2>/dev/null || echo "  nslookup failed or no output"
            echo "  IPv4 (A):    $(getent ahosts "$h" 2>/dev/null | grep -oE '[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+' | head -3 | tr '\n' ' ' || echo 'none')"
            echo "  IPv6 (AAAA): $(getent ahosts "$h" 2>/dev/null | grep -oE '([0-9a-fA-F]{1,4}:){2,}[0-9a-fA-F]{1,4}' | head -3 | tr '\n' ' ' || echo 'none')"
          done
          echo ""
          echo "Recommendation: Store a Session Pooler (port 5432) string in the DATABASE_URL secret for reliable connections from GitHub runners."

      - name: Report upstream Deploy Supabase result
        if: github.event_name == 'workflow_run'
        run: |
          echo "Deploy Supabase completed with conclusion: ${{ github.event.workflow_run.conclusion }}"
          echo "Security lint will still run against the current linked remote database."

      - name: Validate Supabase security secrets
        id: validate
        run: |
          MISSING=()
          [ -z "$SUPABASE_ACCESS_TOKEN" ] && MISSING+=("SUPABASE_ACCESS_TOKEN")
          [ -z "$SUPABASE_PROJECT_REF" ] && MISSING+=("SUPABASE_PROJECT_REF")
          if [ -z "$DATABASE_URL" ] && [ -z "$SUPABASE_DB_PASSWORD" ]; then
            MISSING+=("DATABASE_URL or SUPABASE_DB_PASSWORD")
          fi
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "::warning::Supabase security check skipped — missing secrets: ${MISSING[*]}"
            echo "::warning::Configure them in GitHub Settings → Secrets and variables → Actions."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Supabase DB lint
        id: lint
        if: steps.validate.outputs.skip != 'true'
        uses: ./.github/actions/supabase-link-run
        with:
          project_ref: ${{ env.SUPABASE_PROJECT_REF }}
          supabase_access_token: ${{ env.SUPABASE_ACCESS_TOKEN }}
          database_url: ${{ env.DATABASE_URL }}
          supabase_db_password: ${{ env.SUPABASE_DB_PASSWORD }}
          skip_link: true
          command: |
            set -euo pipefail

            # === DB URL resolution for lint ===
            # The supabase-link-run action sets SESSION_URL from DATABASE_URL (or builds direct).
            # Recommended: Store a Session Pooler (port 5432) string in the DATABASE_URL secret.
            # The shared action will auto-rewrite transaction pooler URLs to session pooler.
            #
            # Priority:
            #   1. Use SESSION_URL if provided by the action (best when it is a Session Pooler)
            #   2. Build direct connection as fallback

            if [ -n "${SESSION_URL:-}" ]; then
              LINT_DB_URL="$SESSION_URL"
              echo "LINT using SESSION_URL (recommended: Session Pooler on port 5432)"
            elif [ -n "${SUPABASE_DB_PASSWORD:-}" ] && [ -n "${SUPABASE_PROJECT_REF:-}" ]; then
              LINT_DB_URL=$(printf 'postgresql://postgres:%s@db.%s.supabase.co:5432/postgres' "$SUPABASE_DB_PASSWORD" "$SUPABASE_PROJECT_REF")
              echo "LINT using DIRECT connection (db.<ref>.supabase.co:5432)"
            else
              echo "::error::No usable DB URL for lint. The action should have set SESSION_URL from DATABASE_URL."
              exit 1
            fi

            export LINT_DB_URL

            LINT_HOST=$(python3 -c "import os, urllib.parse as p; u=os.environ.get('LINT_DB_URL',''); print((p.urlparse(u).hostname or '') if u else '')" 2>/dev/null || true)
            echo "LINT_DB_HOST=$LINT_HOST"

            if [ -n "$LINT_HOST" ]; then
              echo "=== DNS + address family diagnosis for $LINT_HOST ==="
              getent hosts "$LINT_HOST" || {
                echo "::warning::getent failed for $LINT_HOST"
                nslookup "$LINT_HOST" || echo "::warning::nslookup also failed"
              }

              # Show IPv4 vs IPv6 addresses explicitly (helps confirm IPv6-only situation)
              echo "IPv4 addresses (A records):"
              getent ahosts "$LINT_HOST" 2>/dev/null | grep -E 'STREAM.*[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+' || echo "  (none or getent ahosts not available)"
              echo "IPv6 addresses (AAAA records):"
              getent ahosts "$LINT_HOST" 2>/dev/null | grep -i 'STREAM.*:' || echo "  (none visible)"
            fi

            # Hard timeout so a stuck connection doesn't burn Actions minutes.
            echo "Running supabase db lint with: $(echo "$LINT_DB_URL" | sed -E 's|:[^@]*@|://***@|')"
            lint_output=$(timeout --signal=TERM --kill-after=30s 240s \
              supabase db lint --db-url "$LINT_DB_URL" --level error --fail-on error </dev/null 2>&1) || {
              lint_exit=$?
              echo "$lint_output"
              echo "::error::supabase db lint failed using the selected LINT_DB_URL."
              echo "::error::Check the diagnosis output above. Ensure DATABASE_URL secret contains a working Session Pooler (port 5432) string."
              exit "$lint_exit"
            }
            echo "$lint_output"
