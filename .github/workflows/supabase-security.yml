# yaml-language-server: $schema=https://raw.githubusercontent.com/SchemaStore/schemastore/master/src/schemas/json/github-workflow.json
name: Supabase Security Check

# Fails the CI if any table is missing RLS or has a dangerous policy.
# Runs after Deploy Supabase (on main) and on PRs.
#
# IMPORTANT (confirmed via DNS):
#   The direct hostname db.<SUPABASE_PROJECT_REF>.supabase.co for this project
#   is IPv6-only (only AAAA records, no A records).
#   GitHub runners have unreliable IPv6 → always prefer Session Pooler (port 5432).
#
# Required secrets:
#   SUPABASE_ACCESS_TOKEN, SUPABASE_PROJECT_REF, DATABASE_URL (Session Pooler recommended)
#   SUPABASE_DB_PASSWORD (fallback for direct connection)

on:
  # On push to main, wait for Deploy Supabase to finish so the lint runs against
  # the just-applied migrations (avoids race conditions when a migration both
  # introduces and fixes a function in adjacent commits).
  workflow_run:
    workflows: ["Deploy Supabase"]
    types: [completed]
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}
  workflow_call:
    secrets:
      SUPABASE_ACCESS_TOKEN:
        required: false
      SUPABASE_PROJECT_REF:
        required: false
      DATABASE_URL:
        required: false
      SUPABASE_DB_PASSWORD:
        required: false

concurrency:
  group: supabase-security-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  advisor:
    name: RLS & security lint
    runs-on: ubuntu-latest
    timeout-minutes: 8
    permissions:
      contents: read
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - uses: actions/checkout@v5

      - name: Prefer IPv4 (gai.conf + diagnostics)
        run: |
          echo "Applying IPv4 precedence (only helps when both A and AAAA records exist)"
          sudo sed -i 's/^#precedence ::ffff:0:0\/96  100/precedence ::ffff:0:0\/96  100/' /etc/gai.conf || true
          echo "Current gai.conf precedence:"
          grep -E 'precedence|IPv4' /etc/gai.conf || true

      - name: Diagnose Supabase host resolution
        run: |
          echo "=== Supabase connectivity (confirmed: direct host is IPv6-only) ==="
          ref="${SUPABASE_PROJECT_REF:-}"
          if [ -z "$ref" ]; then
            echo "SUPABASE_PROJECT_REF not set — skipping diagnosis."
            exit 0
          fi
          echo "Direct host: db.${ref}.supabase.co → IPv6-only (no A records)"
          echo "Strongly recommended: Use Session Pooler (port 5432) in DATABASE_URL secret."
          echo "The supabase-link-run composite action resolves a safe SESSION_URL (Session Pooler preferred), exports it to GITHUB_ENV, and exposes it as \$SESSION_URL for commands."

      - name: Report upstream Deploy Supabase result
        if: github.event_name == 'workflow_run'
        run: |
          echo "Deploy Supabase completed with conclusion: ${{ github.event.workflow_run.conclusion }}"
          echo "Security lint will still run against the current linked remote database."

      - name: Validate Supabase security secrets
        id: validate
        run: |
          MISSING=()
          [ -z "$SUPABASE_ACCESS_TOKEN" ] && MISSING+=("SUPABASE_ACCESS_TOKEN")
          [ -z "$SUPABASE_PROJECT_REF" ] && MISSING+=("SUPABASE_PROJECT_REF")
          if [ -z "$DATABASE_URL" ] && [ -z "$SUPABASE_DB_PASSWORD" ]; then
            MISSING+=("DATABASE_URL or SUPABASE_DB_PASSWORD")
          fi
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "::warning::Supabase security check skipped — missing secrets: ${MISSING[*]}"
            echo "::warning::Configure them in GitHub Settings → Secrets and variables → Actions."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Supabase DB lint
        id: lint
        if: steps.validate.outputs.skip != 'true'
        timeout-minutes: 6
        uses: ./.github/actions/supabase-link-run
        with:
          project_ref: ${{ env.SUPABASE_PROJECT_REF }}
          supabase_access_token: ${{ env.SUPABASE_ACCESS_TOKEN }}
          database_url: ${{ env.DATABASE_URL }}
          supabase_db_password: ${{ env.SUPABASE_DB_PASSWORD }}
          skip_link: true
          command: |
            set -euo pipefail

            # The supabase-link-run action (skip_link=true) resolves SESSION_URL
            # before executing this command. Do not reference steps.lint.outputs here:
            # the lint step has not completed yet, so that expression is empty pre-run.
            LINT_DB_URL="${SESSION_URL:-}"

            if [ -z "${LINT_DB_URL:-}" ]; then
              echo "::error::supabase-link-run action did not provide a usable database URL (SESSION_URL missing)."
              echo "::error::Check DATABASE_URL secret or SUPABASE_DB_PASSWORD + SUPABASE_PROJECT_REF."
              exit 1
            fi

            echo "LINT using database URL from supabase-link-run action (Session Pooler recommended)"
            export LINT_DB_URL

            LINT_DB_HOST=$(python3 - <<'PY'
            import os
            from urllib.parse import urlparse

            parsed = urlparse(os.environ['LINT_DB_URL'])
            print(parsed.hostname or '')
            PY
            )

            if [ -z "$LINT_DB_HOST" ]; then
              echo "::error::Unable to parse database host from LINT_DB_URL."
              exit 1
            fi

            if ! getent hosts "$LINT_DB_HOST" >/dev/null 2>&1; then
              echo "::warning::Supabase security lint skipped because database host '$LINT_DB_HOST' does not resolve from this GitHub runner."
              echo "::warning::This is an infrastructure/DNS issue, not an RLS policy failure. Verify the DATABASE_URL host in repository secrets."
              {
                echo "### Supabase Security Lint Skipped"
                echo ""
                echo "Database host \`$LINT_DB_HOST\` did not resolve from the GitHub runner."
                echo "Confirm the DATABASE_URL secret uses a valid Supabase Session Pooler host before relying on this lint gate."
              } >> "$GITHUB_STEP_SUMMARY"
              exit 0
            fi

            # Hard timeout so a stuck connection doesn't burn Actions minutes.
            echo "Running supabase db lint with: $(echo "$LINT_DB_URL" | sed -E 's|:[^@]*@|://***@|')"
            # Use --level warning for visibility while failing only on Supabase lint errors.
            lint_output=$(timeout --signal=TERM --kill-after=30s 240s \
              supabase db lint --db-url "$LINT_DB_URL" --level warning --fail-on error </dev/null 2>&1) || {
              lint_exit=$?
              echo "$lint_output"
              if echo "$lint_output" | grep -Eiq 'hostname resolving error|no such host|temporary failure in name resolution|could not translate host name|name or service not known'; then
                echo "::warning::Supabase security lint skipped because the database host could not be resolved during lint execution."
                echo "::warning::This is an infrastructure/DNS issue, not an RLS policy failure. Verify the DATABASE_URL host in repository secrets."
                {
                  echo "### Supabase Security Lint Skipped"
                  echo ""
                  echo "The Supabase CLI reported a DNS resolution failure while connecting to the configured database host."
                  echo "Confirm the DATABASE_URL secret uses a valid Supabase Session Pooler host before relying on this lint gate."
                } >> "$GITHUB_STEP_SUMMARY"
                exit 0
              fi
              echo "::error::supabase db lint failed using the selected LINT_DB_URL."
              echo "::error::Check the diagnosis output above. Ensure DATABASE_URL secret contains a working Session Pooler (port 5432) string."
              exit "$lint_exit"
            }
            echo "$lint_output"

      - name: Security Lint Summary
        if: always()
        run: |
          echo "### Supabase Security Lint Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "This workflow runs \`supabase db lint --level warning --fail-on error\` against the remote database." >> "$GITHUB_STEP_SUMMARY"
          echo "It catches missing RLS policies and dangerous policy patterns without relying on pre-run step outputs." >> "$GITHUB_STEP_SUMMARY"
