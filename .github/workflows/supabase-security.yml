# yaml-language-server: $schema=https://raw.githubusercontent.com/SchemaStore/schemastore/master/src/schemas/json/github-workflow.json
name: Supabase Security Check

# Fails the CI if any table is missing RLS or has a dangerous policy.
# Runs on every push and pull_request to main.
#
# Required secrets:
#   SUPABASE_ACCESS_TOKEN   — Supabase personal access token
#   SUPABASE_PROJECT_REF    — Supabase project ref used by supabase link
#   SUPABASE_DB_PASSWORD    — optional fallback for direct db lint
#   DATABASE_URL            — recommended; use the Supavisor session pooler URL on GitHub Actions

on:
  # On push to main, wait for Deploy Supabase to finish so the lint runs against
  # the just-applied migrations (avoids race conditions when a migration both
  # introduces and fixes a function in adjacent commits).
  workflow_run:
    workflows: ["Deploy Supabase"]
    types: [completed]
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}
  workflow_call:
    secrets:
      SUPABASE_ACCESS_TOKEN:
        required: false
      SUPABASE_PROJECT_REF:
        required: false
      DATABASE_URL:
        required: false
      SUPABASE_DB_PASSWORD:
        required: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  advisor:
    name: RLS & security lint
    runs-on: ubuntu-latest
    timeout-minutes: 8
    permissions:
      contents: read
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - name: Report upstream Deploy Supabase result
        if: github.event_name == 'workflow_run'
        run: |
          echo "Deploy Supabase completed with conclusion: ${{ github.event.workflow_run.conclusion }}"
          echo "Security lint will still run against the current linked remote database."

      - name: Validate Supabase security secrets
        id: validate
        run: |
          MISSING=()
          [ -z "$SUPABASE_ACCESS_TOKEN" ] && MISSING+=("SUPABASE_ACCESS_TOKEN")
          [ -z "$SUPABASE_PROJECT_REF" ] && MISSING+=("SUPABASE_PROJECT_REF")
          if [ -z "$DATABASE_URL" ] && [ -z "$SUPABASE_DB_PASSWORD" ]; then
            MISSING+=("DATABASE_URL or SUPABASE_DB_PASSWORD")
          fi
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "::warning::Supabase security check skipped — missing secrets: ${MISSING[*]}"
            echo "::warning::Configure them in GitHub Settings → Secrets and variables → Actions."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Supabase DB lint
        id: lint
        if: steps.validate.outputs.skip != 'true'
        uses: ./.github/actions/supabase-link-run
        with:
          project_ref: ${{ env.SUPABASE_PROJECT_REF }}
          supabase_access_token: ${{ env.SUPABASE_ACCESS_TOKEN }}
          database_url: ${{ env.DATABASE_URL }}
          supabase_db_password: ${{ env.SUPABASE_DB_PASSWORD }}
          skip_link: true
          command: |
            set -euo pipefail
            # Prefer DATABASE_URL so GitHub Actions can use Supavisor session pooler
            # (IPv4-compatible) instead of the direct IPv6-only database host.
            # Normalize legacy direct .com hosts to .co and convert transaction/pooler
            # port 6543 to session/direct port 5432 for lint-safe sessions.
            # Assumptions:
            # - Direct DB hostnames follow Supabase's standard db.<project_ref>.supabase.{com,co} pattern.
            # - Pooler hostnames follow the standard *.pooler.supabase.com pattern.
            # - URL shape is postgres[ql]://user:pass@host:port/db; the host has no extra @ or : characters.
            if [ -n "${DATABASE_URL:-}" ]; then
              SESSION_URL=$(python3 - <<'PY'
            import os
            from urllib.parse import urlparse, urlunparse
            database_url = os.environ["DATABASE_URL"]
            project_ref = os.environ["SUPABASE_PROJECT_REF"]
            u = urlparse(database_url)
            host = u.hostname or ""
            # Si es pooler, cámbialo a host directo IPv4/host resoluble
            if "pooler.supabase" in host:
                new_host = f"db.{project_ref}.supabase.co"
                new_port = 5432
            else:
                # Si ya viene db.<ref>.supabase.*, igual fuerza puerto 5432 y .co
                if host.startswith("db.") and project_ref in host:
                    new_host = f"db.{project_ref}.supabase.co"
                    new_port = 5432
                else:
                    new_host = host
                    new_port = u.port or 5432
            netloc = u.username
            if u.password is not None:
                netloc += ":" + u.password
            netloc += f"@{new_host}:{new_port}"
            new_u = (u.scheme, netloc, u.path, u.params, u.query, u.fragment)
            print(urlunparse(new_u))
            PY
            )
            elif [ -n "${SUPABASE_DB_PASSWORD:-}" ] && [ -n "${SUPABASE_PROJECT_REF:-}" ]; then
              echo "::warning::DATABASE_URL is not set; falling back to the direct Supabase DB host."
              SESSION_URL=$(printf 'postgresql://postgres:%s@db.%s.supabase.co:5432/postgres' "$SUPABASE_DB_PASSWORD" "$SUPABASE_PROJECT_REF")
            else
              echo "::error::SUPABASE_DB_PASSWORD and DATABASE_URL are both missing. Cannot run security lint."
              exit 1
            fi

            export SESSION_URL
            echo "SESSION_URL_HOST=$(python3 - <<'PY'
            import os
            from urllib.parse import urlparse
            print(urlparse(os.environ["SESSION_URL"]).hostname)
            PY
            )"
            getent hosts "$(python3 - <<'PY'
            import os
            from urllib.parse import urlparse
            print(urlparse(os.environ["SESSION_URL"]).hostname)
            PY
            )"

            # Hard timeout so a stuck connection doesn't burn Actions minutes.
            timeout --signal=TERM --kill-after=30s 240s \
              supabase db lint --db-url "$SESSION_URL" --level error --fail-on error </dev/null
