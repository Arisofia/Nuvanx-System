# yaml-language-server: $schema=https://raw.githubusercontent.com/SchemaStore/schemastore/master/src/schemas/json/github-workflow.json
name: Supabase Security Check

# Fails the CI if any table is missing RLS or has a dangerous policy.
# Runs on every push and pull_request to main.
#
# Required secrets:
#   SUPABASE_ACCESS_TOKEN   — Supabase personal access token
#   SUPABASE_PROJECT_REF    — Supabase project ref used by supabase link
#   SUPABASE_DB_PASSWORD    — optional fallback for direct db lint
#   DATABASE_URL            — recommended; use the Supavisor session pooler URL on GitHub Actions

on:
  # On push to main, wait for Deploy Supabase to finish so the lint runs against
  # the just-applied migrations (avoids race conditions when a migration both
  # introduces and fixes a function in adjacent commits).
  workflow_run:
    workflows: ["Deploy Supabase"]
    types: [completed]
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}
  workflow_call:
    secrets:
      SUPABASE_ACCESS_TOKEN:
        required: false
      SUPABASE_PROJECT_REF:
        required: false
      DATABASE_URL:
        required: false
      SUPABASE_DB_PASSWORD:
        required: false
      VITE_MCP_API_KEY:
        required: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE22: true
  VITE_MCP_API_KEY: ${{ secrets.VITE_MCP_API_KEY }}

concurrency:
  group: supabase-security-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  advisor:
    name: RLS & security lint
    runs-on: ubuntu-latest
    timeout-minutes: 8
    permissions:
      contents: read
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - uses: actions/checkout@v4.2.2
      - name: Prefer IPv4 + hardened resolver
        run: |
          # Prefer IPv4 globally
          sudo sed -i 's/^#precedence ::ffff:0:0\/96  100/precedence ::ffff:0:0\/96  100/' /etc/gai.conf || true

          # Make getaddrinfo more aggressive about trying IPv4 first
          echo 'options single-request-reopen' | sudo tee -a /etc/resolv.conf >/dev/null || true
          echo 'options timeout:2' | sudo tee -a /etc/resolv.conf >/dev/null || true
          echo 'options attempts:3' | sudo tee -a /etc/resolv.conf >/dev/null || true
      - name: Report upstream Deploy Supabase result
        if: github.event_name == 'workflow_run'
        run: |
          echo "Deploy Supabase completed with conclusion: ${{ github.event.workflow_run.conclusion }}"
          echo "Security lint will still run against the current linked remote database."

      - name: Validate Supabase security secrets
        id: validate
        run: |
          MISSING=()
          [ -z "$SUPABASE_ACCESS_TOKEN" ] && MISSING+=("SUPABASE_ACCESS_TOKEN")
          [ -z "$SUPABASE_PROJECT_REF" ] && MISSING+=("SUPABASE_PROJECT_REF")
          if [ -z "$DATABASE_URL" ] && [ -z "$SUPABASE_DB_PASSWORD" ]; then
            MISSING+=("DATABASE_URL or SUPABASE_DB_PASSWORD")
          fi
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "::warning::Supabase security check skipped — missing secrets: ${MISSING[*]}"
            echo "::warning::Configure them in GitHub Settings → Secrets and variables → Actions."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Supabase DB lint
        id: lint
        if: steps.validate.outputs.skip != 'true'
        uses: ./.github/actions/supabase-link-run
        with:
          project_ref: ${{ env.SUPABASE_PROJECT_REF }}
          supabase_access_token: ${{ env.SUPABASE_ACCESS_TOKEN }}
          database_url: ${{ env.DATABASE_URL }}
          supabase_db_password: ${{ env.SUPABASE_DB_PASSWORD }}
          skip_link: true
          command: |
            set -euo pipefail
            if [ -z "${SESSION_URL:-}" ]; then
              echo "::error::SESSION_URL is required and should be prepared by supabase-link-run."
              exit 1
            fi

            SESSION_URL_HOST=$(python3 -c "import os, urllib.parse as p; u=os.environ.get('SESSION_URL',''); print((p.urlparse(u).hostname or '') if u else '')" 2>/dev/null || true)
            echo "SESSION_URL_HOST=$SESSION_URL_HOST"
            if [ -n "$SESSION_URL_HOST" ]; then
              echo "Checking resolution for $SESSION_URL_HOST..."
              getent hosts "$SESSION_URL_HOST" || {
                echo "::warning::Could not resolve $SESSION_URL_HOST via getent"
                nslookup "$SESSION_URL_HOST" || echo "::warning::Could not resolve $SESSION_URL_HOST via nslookup"
              }
            fi

            # Robust lint with retries for transient DNS / IPv6 / pooler hiccups common on GitHub runners.
            run_lint_with_retry() {
              local url="$1"
              local label="$2"
              local max_attempts=3
              local attempt=1

              while [ $attempt -le $max_attempts ]; do
                echo "Running supabase db lint against $label (attempt $attempt/$max_attempts)..."
                if timeout --signal=TERM --kill-after=30s 240s \
                     supabase db lint --db-url "$url" --level error --fail-on error </dev/null; then
                  return 0
                fi

                local exit_code=$?
                echo "::warning::Lint attempt $attempt against $label failed (exit=$exit_code)."

                if [ $attempt -lt $max_attempts ]; then
                  local sleep_time=$(( attempt * 8 ))
                  echo "Retrying in ${sleep_time}s..."
                  sleep "$sleep_time"
                fi
                attempt=$((attempt + 1))
              done

              return 1
            }

            # Try Session Pooler first (recommended for CI)
            if run_lint_with_retry "$SESSION_URL" "Session Pooler"; then
              echo "Supabase security lint passed on Session Pooler."
              exit 0
            fi

            # Fallback to direct database connection with retries
            if [ -n "${SUPABASE_DB_PASSWORD:-}" ] && [ -n "${SUPABASE_PROJECT_REF:-}" ]; then
              echo "::warning::Session Pooler attempts exhausted. Retrying with direct database host..."
              DIRECT_URL=$(printf 'postgresql://postgres:%s@db.%s.supabase.co:5432/postgres' "$SUPABASE_DB_PASSWORD" "$SUPABASE_PROJECT_REF")
              export DIRECT_URL

              if run_lint_with_retry "$DIRECT_URL" "Direct DB Host"; then
                echo "Supabase security lint passed on direct database host (after pooler failures)."
                exit 0
              fi
            fi

            echo "::error::Supabase db lint failed after all retries against both pooler and direct host."
            exit 1
