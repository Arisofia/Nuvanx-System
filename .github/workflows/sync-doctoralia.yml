# yaml-language-server: $schema=https://json.schemastore.org/github-workflow
name: Sync Doctoralia Financials

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Reads individual settlement rows from Google Sheets (Doctoralia export) and
# upserts them into the financial_settlements table.
#
# Required GitHub secrets:
#   GOOGLE_ADS_SERVICE_ACCOUNT  - Service account credentials (base64-encoded JSON OR raw JSON;
#                                  must have Sheets read scope, and the spreadsheet must be shared
#                                  with the client_email in that service account)
#   DOCTORALIA_SHEET_ID         - Spreadsheet ID from the Google Sheets URL
#   DOCTORALIA_DRIVE_FILE_ID    - Alias for DOCTORALIA_SHEET_ID
#   DATABASE_URL                - Direct Postgres connection string (Supabase)
#   CLINIC_ID                   - UUID of the clinic owning these settlements

on:
  schedule:
    - cron: '0 7 * * *'   # Daily at 07:00 UTC (09:00 Spain, before business hours)
  workflow_dispatch:       # Allow manual trigger from GitHub Actions UI

permissions:
  contents: read

jobs:
  sync:
    name: Google Sheets to financial_settlements
    runs-on: ubuntu-latest
    env:
      GOOGLE_ADS_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_ADS_SERVICE_ACCOUNT || '' }}
      DOCTORALIA_SHEET_ID: ${{ secrets.DOCTORALIA_SHEET_ID || '' }}
      DOCTORALIA_DRIVE_FILE_ID: ${{ secrets.DOCTORALIA_DRIVE_FILE_ID || '' }}
      DATABASE_URL: ${{ secrets.DATABASE_URL || '' }}
      CLINIC_ID: ${{ secrets.CLINIC_ID || '' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Preflight - validate required secrets and decode service account
        run: |
          MISSING=()
          [ -z "$GOOGLE_ADS_SERVICE_ACCOUNT" ] && MISSING+=("GOOGLE_ADS_SERVICE_ACCOUNT")
          [ -z "$DOCTORALIA_SHEET_ID" ] && [ -z "$DOCTORALIA_DRIVE_FILE_ID" ] && MISSING+=("DOCTORALIA_SHEET_ID or DOCTORALIA_DRIVE_FILE_ID")
          [ -z "$DATABASE_URL"         ] && MISSING+=("DATABASE_URL")
          [ -z "$CLINIC_ID"            ] && MISSING+=("CLINIC_ID")
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "::error::Missing secrets: ${MISSING[*]}"
            echo "::error::Add them at Settings -> Secrets and variables -> Actions"
            exit 1
          fi
          # Accept both formats for GOOGLE_ADS_SERVICE_ACCOUNT:
          #  1) base64(service-account.json)
          #  2) raw JSON object string
          if echo "$GOOGLE_ADS_SERVICE_ACCOUNT" | python3 -c "import sys,json; json.load(sys.stdin)" 2>/dev/null; then
            echo "GOOGLE_ADS_SERVICE_ACCOUNT format: raw JSON"
            # Mask the raw JSON to avoid accidental leakage in logs
            echo "::add-mask::$GOOGLE_ADS_SERVICE_ACCOUNT"
            echo "GOOGLE_SA_JSON<<EOF_GITHUB_ACTION" >> "$GITHUB_ENV"
            echo "$GOOGLE_ADS_SERVICE_ACCOUNT" >> "$GITHUB_ENV"
            echo "EOF_GITHUB_ACTION" >> "$GITHUB_ENV"
          else
            DECODED="$(echo "$GOOGLE_ADS_SERVICE_ACCOUNT" | base64 -d 2>/dev/null)" || true
            echo "$DECODED" | python3 -c "import sys,json; json.load(sys.stdin)" 2>/dev/null || {
              echo "::error::GOOGLE_ADS_SERVICE_ACCOUNT is invalid. Provide either raw JSON or base64-encoded JSON."
              exit 1
            }
            echo "GOOGLE_ADS_SERVICE_ACCOUNT format: base64 JSON"
            # Mask the decoded JSON to avoid accidental leakage in logs
            echo "::add-mask::$DECODED"
            echo "GOOGLE_SA_JSON<<EOF_GITHUB_ACTION" >> "$GITHUB_ENV"
            echo "$DECODED" >> "$GITHUB_ENV"
            echo "EOF_GITHUB_ACTION" >> "$GITHUB_ENV"
          fi

          echo "All required secrets present and valid."
        env:
          GOOGLE_ADS_SERVICE_ACCOUNT: ${{ env.GOOGLE_ADS_SERVICE_ACCOUNT }}
          DOCTORALIA_SHEET_ID: ${{ env.DOCTORALIA_SHEET_ID }}
          DOCTORALIA_DRIVE_FILE_ID: ${{ env.DOCTORALIA_DRIVE_FILE_ID }}
          DATABASE_URL:        ${{ env.DATABASE_URL }}
          CLINIC_ID:           ${{ env.CLINIC_ID }}

      - name: Install sync dependencies
        run: npm install --no-save googleapis pg

      - name: Run Doctoralia to DB sync
        run: node scripts/sync-doctoralia.js
        env:
          GOOGLE_SA_JSON:         ${{ env.GOOGLE_SA_JSON }}
          DOCTORALIA_SHEET_ID:    ${{ env.DOCTORALIA_SHEET_ID || env.DOCTORALIA_DRIVE_FILE_ID }}
          DOCTORALIA_DRIVE_FILE_ID: ${{ env.DOCTORALIA_DRIVE_FILE_ID || env.DOCTORALIA_SHEET_ID }}
          DATABASE_URL:           ${{ env.DATABASE_URL }}
          CLINIC_ID:              ${{ env.CLINIC_ID }}
          SHEET_RANGE:            'A1:Z5000'
          # SHEET_NAME: Sheet1   # Uncomment and set if data is on a specific tab
