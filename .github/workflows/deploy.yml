###############################################################################
# Deploy — runs after CI passes on main
# Deploys frontend to Vercel.
#
# Required secrets (set in GitHub → Settings → Secrets):
#   VERCEL_TOKEN            — Vercel personal access token
#   VERCEL_ORG_ID           — Vercel team/org ID
#   VERCEL_PROJECT_ID       — Vercel project ID (from .vercel/project.json)
###############################################################################

name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─── Frontend → Vercel ─────────────────────────────────────────────────────
  deploy-frontend:
    name: Deploy frontend to Vercel
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: read
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install backend dependencies
        working-directory: .
        run: npm ci --prefix backend

      - name: Run backend tests
        working-directory: .
        run: npm run test:backend
        env:
          CI: true

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy to Vercel
        continue-on-error: true
        env:
          VERCEL_TOKEN: "${{ secrets.VERCEL_TOKEN }}"
          VERCEL_ORG_ID: "${{ secrets.VERCEL_ORG_ID }}"
          VERCEL_PROJECT_ID: "${{ secrets.VERCEL_PROJECT_ID }}"
          VITE_SUPABASE_URL: "${{ secrets.VITE_SUPABASE_URL }}"
          VITE_SUPABASE_ANON_KEY: "${{ secrets.VITE_SUPABASE_ANON_KEY }}"
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "::warning::VERCEL_TOKEN secret is not set — skipping frontend deploy."
            echo "Set VERCEL_TOKEN, VERCEL_ORG_ID, and VERCEL_PROJECT_ID in GitHub → Settings → Secrets → Actions."
            exit 0
          fi
          vercel pull --yes --environment=production --token="$VERCEL_TOKEN" || true
          vercel build --prod --token="$VERCEL_TOKEN"

          # Retry deploy up to 3 times (Vercel occasionally returns transient errors)
          for attempt in 1 2 3; do
            echo "Deploy attempt $attempt/3..."
            if vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"; then
              echo "Deploy succeeded on attempt $attempt"
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              echo "::warning::Deploy attempt $attempt failed, retrying in 10s..."
              sleep 10
            fi
          done
          echo "::warning::All 3 deploy attempts failed — token may be expired. Renew VERCEL_TOKEN in GitHub Secrets."
          exit 1
