###############################################################################
# Deploy — runs after CI passes on main
# Deploys backend to Railway.
# Frontend is served locally or via manual hosting (no Vercel).
#
# Required secrets (set in GitHub → Settings → Secrets):
#   RAILWAY_TOKEN      — Railway project token (Project Settings → Tokens)
#   RAILWAY_SERVICE_ID — Railway service ID for the backend
###############################################################################

name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # ─── Backend → Railway ─────────────────────────────────────────────────────
  deploy-backend:
    name: Deploy backend to Railway
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: "${{ secrets.RAILWAY_TOKEN }}"
        run: |
          railway up --service "${{ secrets.RAILWAY_SERVICE_ID }}" --detach \
            || echo "::warning::Railway deploy returned non-zero. Check Railway dashboard."
