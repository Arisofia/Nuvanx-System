# yaml-language-server: $schema=https://raw.githubusercontent.com/SchemaStore/schemastore/master/src/schemas/json/github-workflow.json
name: Deploy Supabase

# IMPORTANT for GitHub Actions + Supabase connectivity:
#
# CONFIRMED (2026-06): The direct hostname db.<ref>.supabase.co for this project
# only resolves to IPv6 (AAAA record). No IPv4 A record exists.
#
# → Direct connections frequently fail or are extremely slow on GitHub runners.
# → ALWAYS use a Session Pooler connection string on port 5432 in the DATABASE_URL secret.
#
# The supabase-link-run action resolves a safe SESSION_URL (Session Pooler on 5432
# preferred, using Python urllib for reliable rewriting + full secret masking)
# and exposes it both as $SESSION_URL (inside commands) and as the `session_url`
# action output.
#
# This workflow splits migrations and functions into separate jobs so a broken
# schema does not cause function deploys to fail.

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 5 * * *'   # Daily at 05:00 UTC
  workflow_dispatch: {}

env:
  VITE_MCP_API_KEY: ${{ secrets.MCP_API_KEY }}

concurrency:
  group: deploy-supabase-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  supabase-migrate:
    name: Supabase - DB migrations
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      skip_supabase: ${{ steps.validate.outputs.skip_supabase }}
    env:
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Diagnose Supabase connectivity (DNS + IPv4/IPv6)
        run: |
          echo "=== Supabase host diagnosis for migrations (GitHub runner) ==="
          ref="${SUPABASE_PROJECT_REF:-}"
          if [ -z "$ref" ]; then
            echo "SUPABASE_PROJECT_REF not available, skipping detailed diagnosis."
          else
            echo ""
            echo "Direct host (confirmed IPv6-only in production):"
            echo "  db.${ref}.supabase.co"
            echo ""
            echo "Recommendation: Always prefer Session Pooler (port 5432) in DATABASE_URL secret."
            echo "Direct connections to this project resolve only to IPv6 and frequently fail on GitHub runners."
          fi
          echo ""
          echo "Tip: Store a Session Pooler (port 5432) connection string in DATABASE_URL for reliable CI/CD."

      - name: Validate Supabase deployment secrets
        id: validate
        run: |
          MISSING=()
          [ -z "$SUPABASE_ACCESS_TOKEN" ] && MISSING+=("SUPABASE_ACCESS_TOKEN")
          [ -z "$SUPABASE_PROJECT_REF" ] && MISSING+=("SUPABASE_PROJECT_REF")
          if [ -z "$DATABASE_URL" ] && [ -z "$SUPABASE_DB_PASSWORD" ]; then
            MISSING+=("DATABASE_URL or SUPABASE_DB_PASSWORD")
          fi
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "::warning::Supabase deploy skipped — missing secrets: ${MISSING[*]}"
            echo "skip_supabase=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Supabase DB migrations
        if: steps.validate.outputs.skip_supabase != 'true'
        # Hard timeout — the migration logic (in scripts/supabase-migrate.sh) has its own retry logic (up to 3 attempts).
        # The supabase-link-run action provides $SESSION_URL (and the `session_url` output) with proper pooler rewriting + masking.
        timeout-minutes: 25
        uses: ./.github/actions/supabase-link-run
        with:
          project_ref: ${{ env.SUPABASE_PROJECT_REF }}
          supabase_access_token: ${{ env.SUPABASE_ACCESS_TOKEN }}
          database_url: ${{ env.DATABASE_URL }}
          supabase_db_password: ${{ env.SUPABASE_DB_PASSWORD }}
          skip_link: true
          command: |
            # Heavy migration logic extracted to scripts/supabase-migrate.sh
            # (better maintainability, full shellcheck coverage, easier local testing).
            bash scripts/supabase-migrate.sh

      - name: Debug – list Supabase migrations
        if: always() && steps.validate.outputs.skip_supabase != 'true'
        timeout-minutes: 5
        uses: ./.github/actions/supabase-link-run
        with:
          project_ref: ${{ env.SUPABASE_PROJECT_REF }}
          supabase_access_token: ${{ env.SUPABASE_ACCESS_TOKEN }}
          database_url: ${{ env.DATABASE_URL }}
          supabase_db_password: ${{ env.SUPABASE_DB_PASSWORD }}
          skip_link: true
          command: |
            echo "Listing Supabase migrations..."
            # Uses $SESSION_URL (or the action's session_url output) provided by supabase-link-run
            supabase migration list --db-url "$SESSION_URL" --debug

      - name: Upload Supabase migration log
        if: always() && steps.validate.outputs.skip_supabase != 'true'
        uses: actions/upload-artifact@v4.3.3
        with:
          name: supabase-migrations-log
          path: supabase-migrations.log
          if-no-files-found: warn
          retention-days: 14

  supabase-functions:
    name: Supabase - Edge Functions
    needs: supabase-migrate
    if: needs.supabase-migrate.outputs.skip_supabase != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      # Edge Function deploys - kept as separate steps for granular visibility in logs.
      # Future improvement: convert to matrix strategy to reduce duplication.
      - name: Deploy Edge Functions
        continue-on-error: true
        id: deploy_functions
        timeout-minutes: 10
        uses: ./.github/actions/supabase-link-run
        with:
          project_ref: ${{ env.SUPABASE_PROJECT_REF }}
          supabase_access_token: ${{ env.SUPABASE_ACCESS_TOKEN }}
          database_url: ${{ env.DATABASE_URL }}
          supabase_db_password: ${{ env.SUPABASE_DB_PASSWORD }}
          skip_link: true
          command: |
            set -euo pipefail
            echo "Deploying Edge Functions..."
            supabase functions deploy api --no-verify-jwt --project-ref ${{ env.SUPABASE_PROJECT_REF }}
            supabase functions deploy mcp --no-verify-jwt --project-ref ${{ env.SUPABASE_PROJECT_REF }}
            supabase functions deploy daily-aggregates --no-verify-jwt --project-ref ${{ env.SUPABASE_PROJECT_REF }}

      - name: Summarize Edge Function Deploys
        if: always()
        run: |
          echo "### 🚀 Edge Functions Deploy Summary" >> $GITHUB_STEP_SUMMARY
          
          get_status_icon() {
            case "$1" in
              success) echo "✅" ;;
              failure) echo "❌" ;;
              *) echo "⚠️" ;;
            esac
          }

          echo "- **Edge Functions (api + mcp + daily-aggregates):** $(get_status_icon ${{ steps.deploy_functions.outcome }})" >> $GITHUB_STEP_SUMMARY

          if [[ "${{ steps.deploy_functions.outcome }}" == "failure" ]]; then
            echo "::error::Edge Functions deployment step failed. Check logs for which specific function failed."
          fi

      - name: Summarize Supabase function deploy permissions
        if: always()
        run: |
          echo "If any Edge Function deploy step failed with 403 list-functions, this indicates token access-control limits on the Supabase Management API endpoint." >> "$GITHUB_STEP_SUMMARY"
          echo "Database migrations are unaffected; function deployment needs a token/account with required project function-management privileges." >> "$GITHUB_STEP_SUMMARY"
