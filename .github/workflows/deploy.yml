# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
# Deploy Supabase - sequential pipeline on main
#
# Order: supabase-migrate -> supabase-functions
#
# Note:
#   Lint and Build are performed in ci.yml on PRs.
#   This workflow focuses on Supabase infrastructure.
#   Frontend production deploys are handled by Vercel GitHub integration.
#
# Required secrets (GitHub -> Settings -> Secrets -> Actions):
#   SUPABASE_ACCESS_TOKEN        - Supabase personal access token
#   SUPABASE_PROJECT_REF         - Supabase project ref used by supabase link
#   SUPABASE_DB_PASSWORD         - DB password for supabase db push
#   DATABASE_URL                 - Optional fallback DB URL to derive SUPABASE_DB_PASSWORD

name: Deploy Supabase

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-supabase-production
  cancel-in-progress: false

jobs:
  # 1. Supabase DB migrations
  supabase-migrate:
    name: Supabase - DB migrations
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      skip_supabase: ${{ steps.validate.outputs.skip_supabase || steps.migrate.outputs.skipped }}
    env:
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      MIGRATIONS_LOG: supabase-migrations.log
      REDACT_ENV_NAMES: "SUPABASE_ACCESS_TOKEN,SUPABASE_DB_PASSWORD,DATABASE_URL,SESSION_URL"
    steps:
      - uses: actions/checkout@v4

      - name: Initialize migration log and sanitizer
        run: |
          touch "$MIGRATIONS_LOG"
          chmod 600 "$MIGRATIONS_LOG"

          # Create Python sanitizer script (streaming line-by-line)
          cat << 'EOF' > sanitize_logs.py
          import sys, re, os

          env_names = os.environ.get('REDACT_ENV_NAMES', '').split(',')
          secrets = [os.environ.get(name.strip()) for name in env_names if os.environ.get(name.strip())]

          # Regex for Postgres URLs and common sensitive key patterns
          url_pattern = re.compile(r'((?:postgres|postgresql)://[^:\s]+:)([^@\s]+)(@)')
          kv_pattern = re.compile(r'(password|token|key|secret|auth)\s*[:=]\s*([^\s&"\'<>]+)', re.IGNORECASE)

          def sanitize(text):
              if not text:
                  return text
              # Redact known env values
              for secret in secrets:
                  if secret and len(secret) > 3:
                      text = text.replace(secret, "[REDACTED]")
              # Redact URL passwords
              text = url_pattern.sub(lambda match: f'{match.group(1)}[REDACTED]{match.group(3)}', text)
              # Redact key-value pairs
              text = kv_pattern.sub(r'\1=[REDACTED]', text)
              return text

          for line in sys.stdin:
              sys.stdout.write(sanitize(line))
          EOF

      - name: Validate Supabase deployment secrets
        id: validate
        run: |
          sanitize_log() {
            python3 sanitize_logs.py
          }

          log_and_print() {
            local label="$1"
            echo "--- $label ---" | tee -a "$MIGRATIONS_LOG"
            cat - | sanitize_log | tee -a "$MIGRATIONS_LOG"
          }

          MISSING=()
          [ -z "$SUPABASE_ACCESS_TOKEN" ] && MISSING+=("SUPABASE_ACCESS_TOKEN")
          [ -z "$SUPABASE_PROJECT_REF" ] && MISSING+=("SUPABASE_PROJECT_REF")
          if [ -z "$DATABASE_URL" ] && [ -z "$SUPABASE_DB_PASSWORD" ]; then
            MISSING+=("DATABASE_URL or SUPABASE_DB_PASSWORD")
          fi
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "::warning::Supabase deploy skipped — missing secrets: ${MISSING[*]}"
            echo "skip_supabase=true" >> "$GITHUB_OUTPUT"
            echo "skip_supabase=true" | log_and_print "Validation"
          fi

      - name: Supabase DB migrations
        id: migrate
        if: steps.validate.outputs.skip_supabase != 'true'
        uses: ./.github/actions/supabase-link-run
        with:
          project_ref: ${{ env.SUPABASE_PROJECT_REF }}
          supabase_access_token: ${{ env.SUPABASE_ACCESS_TOKEN }}
          database_url: ${{ env.DATABASE_URL }}
          supabase_db_password: ${{ env.SUPABASE_DB_PASSWORD }}
          command: |
            set -uo pipefail

            sanitize_log() {
              python3 sanitize_logs.py
            }

            log_and_print() {
              local label="$1"
              echo "--- $label ---" | tee -a "$MIGRATIONS_LOG"
              cat - | sanitize_log | tee -a "$MIGRATIONS_LOG"
            }

            # Build direct session URL (port 5432) — avoids prepared statement conflicts with the pooler.
            # Prefer DATABASE_URL; fall back to constructing from project ref + password.
            if [ -n "${DATABASE_URL:-}" ]; then
              SESSION_URL=$(python3 - <<'PY'
            import os
            from urllib.parse import urlparse, urlunparse
            database_url = os.environ["DATABASE_URL"]
            project_ref = os.environ["SUPABASE_PROJECT_REF"]
            u = urlparse(database_url)
            host = u.hostname or ""
            # Si es pooler, cámbialo a host directo IPv4/host resoluble
            if "pooler.supabase" in host:
                new_host = f"db.{project_ref}.supabase.co"
                new_port = 5432
            else:
                # Si ya viene db.<ref>.supabase.*, igual fuerza puerto 5432 y .co
                if host.startswith("db.") and project_ref in host:
                    new_host = f"db.{project_ref}.supabase.co"
                    new_port = 5432
                else:
                    new_host = host
                    new_port = u.port or 5432
            netloc = u.username
            if u.password is not None:
                netloc += ":" + u.password
            netloc += f"@{new_host}:{new_port}"
            new_u = (u.scheme, netloc, u.path, u.params, u.query, u.fragment)
            print(urlunparse(new_u))
            PY
            )
            elif [ -n "${SUPABASE_DB_PASSWORD:-}" ] && [ -n "${SUPABASE_PROJECT_REF:-}" ]; then
              SESSION_URL=$(printf '%s://%s:%s@db.%s.supabase.co:5432/postgres' 'postgresql' 'postgres' "$SUPABASE_DB_PASSWORD" "$SUPABASE_PROJECT_REF")
            else
              echo "::error::Cannot connect to database. Set DATABASE_URL or both SUPABASE_DB_PASSWORD and SUPABASE_PROJECT_REF."
              exit 1
            fi
            echo "::add-mask::$SESSION_URL"

            # Retry transient Supabase Preview failures while surfacing deterministic SQL errors.
            is_deterministic_migration_error() {
              local output="$1"
              local pattern='syntax error|permission denied|not a valid migration|SQLSTATE (42P01|42703|42P07|23505)|could not find valid entry for job|relation .* does not exist|column .* does not exist|function .* does not exist|type .* does not exist|invalid input syntax|duplicate key value violates unique constraint|violates (foreign key|not-null|check) constraint|checksum|failed to parse|error parsing|Unexpected HTTP response: 404|relation "public\..*" does not exist'
              echo "$output" | grep -Eiq "$pattern"
            }

            print_migration_failure_summary() {
              local output="$1"
              local summary sanitized_summary
              summary=$(printf '%s\n' "$output" | awk '
                BEGIN { remaining = 0; found = 0 }
                /ERROR:|SQLSTATE|ErrorResponse|cannot change return type|duplicate key|permission denied|failed to connect|network is unreachable|password authentication failed|could not find valid entry for job|relation .* does not exist|column .* does not exist|function .* does not exist|type .* does not exist|invalid input syntax|checksum|failed to parse|error parsing/ {
                  if (!found) { found = 1; remaining = 40 }
                }
                found && remaining > 0 { print; remaining-- }
              ')

              if [ -n "$summary" ]; then
                sanitized_summary=$(printf '%s\n' "$summary" | sanitize_log)
                echo "::group::First Supabase migration failure block"
                printf '%s\n' "$sanitized_summary"
                echo "::endgroup::"
                {
                  echo
                  echo "#### First Supabase migration failure block"
                  echo '```text'
                  printf '%s\n' "$sanitized_summary"
                  echo '```'
                } >> "$GITHUB_STEP_SUMMARY"
              else
                echo "::warning::No ERROR, SQLSTATE, ErrorResponse, connection, or known SQL failure marker was found in the Supabase CLI output. Review the full --debug output above or download supabase-migration-logs artifact."
              fi
            }

            run_db_push_once() {
              local output exit_code ghosts dup_version
              DB_PUSH_RETRYABLE=true

              output=$(supabase db push --include-all --db-url "$SESSION_URL" --debug 2>&1 | log_and_print "DB Push Attempt")
              exit_code=$?

              if [ "$exit_code" -eq 0 ]; then
                return 0
              fi

              # Case 1: ghost / reverted migrations.
              ghosts=$(echo "$output" | grep "supabase migration repair --status reverted" | sed 's/.*reverted //' || true)
              if [ -n "$ghosts" ]; then
                for version in $ghosts; do
                  echo "Repairing ghost migration $version" | log_and_print "Repair Action"
                  supabase migration repair --status reverted "$version" --db-url "$SESSION_URL" --debug 2>&1 | log_and_print "Repair Output"
                done
                supabase db push --include-all --db-url "$SESSION_URL" --debug 2>&1 | log_and_print "Post-Repair Push"
                return $?
              fi

              # Duplicate schema_migrations versions indicate local migration history is not aligned
              # with the remote database. Do not auto-repair or retry: that can re-run the same file
              # and fail again. Surface the exact version so migration filename/history can be fixed.
              dup_version=$(echo "$output" | grep -oE 'Key \(version\)=\([0-9]+\) already exists' | grep -oE '[0-9]+' || true)
              if [ -n "$dup_version" ]; then
                echo "::error::Migration version $dup_version already exists. Conflict detected." | log_and_print "Conflict"
                DB_PUSH_RETRYABLE=false
                return "$exit_code"
              fi

              if is_deterministic_migration_error "$output"; then
                echo "::error::Non-transient Supabase migration error detected. Not retrying; fix the SQL/CLI error shown above."
                print_migration_failure_summary "$output"
                DB_PUSH_RETRYABLE=false
                return "$exit_code"
              fi

              return "$exit_code"
            }

            run_with_retry() {
              local max_attempts=3
              local delay_seconds=10
              local attempt=1

              while true; do
                echo "Running Supabase migrations (attempt $attempt/$max_attempts)..."
                if run_db_push_once; then
                  return 0
                fi

                if [ "${DB_PUSH_RETRYABLE:-true}" = "false" ]; then
                  return 1
                fi

                if [ "$attempt" -ge "$max_attempts" ]; then
                  echo "::error::Supabase migrations failed after $max_attempts attempts. Review the --debug output above for the failing endpoint or SQL error."
                  return 1
                fi

                attempt=$((attempt + 1))
                echo "::warning::Supabase migrations failed, retrying in ${delay_seconds}s in case this was a transient upstream/proxy error."
                sleep "$delay_seconds"
              done
            }

            run_with_retry

      - name: Upload migration logs
        if: always() && steps.validate.outputs.skip_supabase != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: supabase-migration-logs
          path: ${{ env.MIGRATIONS_LOG }}
          retention-days: 14
          if-no-files-found: warn

  # 2. Supabase Edge Functions
  supabase-functions:
    name: Supabase - Edge Functions
    needs: supabase-migrate
    if: needs.supabase-migrate.outputs.skip_supabase != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Deploy API Edge Function
        uses: ./.github/actions/supabase-link-run
        with:
          project_ref: ${{ env.SUPABASE_PROJECT_REF }}
          supabase_access_token: ${{ env.SUPABASE_ACCESS_TOKEN }}
          command: supabase functions deploy api --use-api

      - name: Deploy MCP Edge Function
        # --no-verify-jwt is used because this function handles its own
        # internal API key validation or provides a public health check.
        uses: ./.github/actions/supabase-link-run
        with:
          project_ref: ${{ env.SUPABASE_PROJECT_REF }}
          supabase_access_token: ${{ env.SUPABASE_ACCESS_TOKEN }}
          command: supabase functions deploy mcp --project-ref ${{ env.SUPABASE_PROJECT_REF }} --no-verify-jwt

      - name: Deploy Daily Aggregates Edge Function
        # --no-verify-jwt is required as this is typically triggered
        # by a cron service/webhook that doesn't provide a Supabase User JWT.
        uses: ./.github/actions/supabase-link-run
        with:
          project_ref: ${{ env.SUPABASE_PROJECT_REF }}
          supabase_access_token: ${{ env.SUPABASE_ACCESS_TOKEN }}
          command: supabase functions deploy daily-aggregates --no-verify-jwt
