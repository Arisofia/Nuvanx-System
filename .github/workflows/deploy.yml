# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
# Deploy Supabase - sequential pipeline on main
#
# Order: supabase-migrate -> supabase-functions
#
# Note:
#   Lint and Build are performed in ci.yml on PRs.
#   This workflow focuses on Supabase infrastructure.
#   Frontend production deploys are handled by Vercel GitHub integration.
#
# Required secrets (GitHub -> Settings -> Secrets -> Actions):
#   SUPABASE_ACCESS_TOKEN        - Supabase personal access token
#   SUPABASE_PROJECT_REF         - Supabase project ref used by supabase link
#   SUPABASE_DB_PASSWORD         - Optional DB password fallback for direct db push
#   DATABASE_URL                 - Recommended DB URL; use the Supavisor session pooler URL on GitHub Actions

name: Deploy Supabase

on:
  push:
    branches: [main]
  workflow_dispatch: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: deploy-supabase-production
  cancel-in-progress: false

jobs:
  # 1. Supabase DB migrations
  supabase-migrate:
    name: Supabase - DB migrations
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      skip_supabase: ${{ steps.validate.outputs.skip_supabase }}
    env:
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - uses: actions/checkout@v4 # v4

      - name: Validate Supabase deployment secrets
        id: validate
        run: |
          MISSING=()
          [ -z "$SUPABASE_ACCESS_TOKEN" ] && MISSING+=("SUPABASE_ACCESS_TOKEN")
          [ -z "$SUPABASE_PROJECT_REF" ] && MISSING+=("SUPABASE_PROJECT_REF")
          if [ -z "$DATABASE_URL" ] && [ -z "$SUPABASE_DB_PASSWORD" ]; then
            MISSING+=("DATABASE_URL or SUPABASE_DB_PASSWORD")
          fi
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "::warning::Supabase deploy skipped — missing secrets: ${MISSING[*]}"
            echo "skip_supabase=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Supabase DB migrations
        if: steps.validate.outputs.skip_supabase != 'true'
        uses: ./.github/actions/supabase-link-run
        with:
          project_ref: ${{ env.SUPABASE_PROJECT_REF }}
          supabase_access_token: ${{ env.SUPABASE_ACCESS_TOKEN }}
          database_url: ${{ env.DATABASE_URL }}
          supabase_db_password: ${{ env.SUPABASE_DB_PASSWORD }}
          skip_link: true
          command: |
            set -uo pipefail

            # Prefer DATABASE_URL so GitHub Actions can use Supavisor session pooler
            # (IPv4-compatible) instead of the direct IPv6-only database host.
            # Normalize legacy direct .com hosts to .co and convert transaction/pooler
            # port 6543 to session/direct port 5432 for migration-safe sessions.
            # Assumptions:
            # - Direct DB hostnames follow Supabase's standard db.<project_ref>.supabase.{com,co} pattern.
            # - Pooler hostnames follow the standard *.pooler.supabase.com pattern.
            # - URL shape is postgres[ql]://user:pass@host:port/db; the host has no extra @ or : characters.
            if [ -n "${DATABASE_URL:-}" ]; then
              SESSION_URL=$(printf '%s' "$DATABASE_URL" | sed -E 's#(db\.[^/@:]+\.supabase)\.com:#\1.co:#g' | sed -E 's#(pooler\.supabase\.com):6543/#\1:5432/#g' | sed -E 's#(db\.[^/@:]+\.supabase\.co):6543/#\1:5432/#g')
            elif [ -n "${SUPABASE_DB_PASSWORD:-}" ] && [ -n "${SUPABASE_PROJECT_REF:-}" ]; then
              echo "::warning::DATABASE_URL is not set; falling back to the direct Supabase DB host. GitHub Actions may need a Supavisor session pooler DATABASE_URL because direct Supabase DB hosts are IPv6-only by default."
              SESSION_URL="postgresql://postgres:${SUPABASE_DB_PASSWORD}@db.${SUPABASE_PROJECT_REF}.supabase.co:5432/postgres"
            else
              echo "::error::Cannot connect to database. Set DATABASE_URL or both SUPABASE_DB_PASSWORD and SUPABASE_PROJECT_REF."
              exit 1
            fi
            echo "::add-mask::$SESSION_URL"

            MIGRATIONS_LOG="${GITHUB_WORKSPACE:-$PWD}/supabase-migrations.log"
            SANITIZER_SCRIPT="${RUNNER_TEMP:-/tmp}/sanitize-supabase-migration-output.py"
            # Centralized redaction list for migration diagnostics. Add future
            # connection strings, API keys, or tokens here before printing or
            # uploading Supabase CLI output.
            REDACT_ENV_NAMES=$(cat <<'EOF'
            SESSION_URL
            DATABASE_URL
            SUPABASE_DB_PASSWORD
            SUPABASE_ACCESS_TOKEN
            SUPABASE_SERVICE_ROLE_KEY
            NUVANX_SUPABASE_SERVICE_ROLE_KEY
            SUPABASE_ANON_KEY
            VITE_SUPABASE_ANON_KEY
            POSTGRES_URL
            POSTGRES_PRISMA_URL
            POSTGRES_URL_NON_POOLING
            DIRECT_URL
            PGDATABASE_URL
            EOF
            )
            export REDACT_ENV_NAMES
            : > "$MIGRATIONS_LOG"
            chmod 600 "$MIGRATIONS_LOG"
            cat > "$SANITIZER_SCRIPT" <<'PY'
            import os
            import re
            import sys


            def redact_environment_values(text: str) -> str:
                names = re.split(r'[\s,]+', os.environ.get('REDACT_ENV_NAMES', '').strip())
                for name in names:
                    value = os.environ.get(name)
                    if value:
                        text = text.replace(value, f'<redacted:{name}>')
                return text


            def redact_postgres_passwords(text: str) -> str:
                return re.sub(
                    r'(postgres(?:ql)?://[^:/@\s]+:)[^@\s]+(@)',
                    r'\1<redacted-password>\2',
                    text,
                )


            def redact_token_like_values(text: str) -> str:
                token_patterns = [
                    r'((?:access|refresh|service_role|anon|api)[_-]?token["\']?\s*[:=]\s*["\']?)[^"\'\s,}]+',
                    r'((?:password|passwd|pwd)["\']?\s*[:=]\s*["\']?)[^"\'\s,}]+',
                ]
                for pattern in token_patterns:
                    text = re.sub(pattern, r'\1<redacted-secret>', text, flags=re.IGNORECASE)
                return text


            content = sys.stdin.read()
            content = redact_environment_values(content)
            content = redact_postgres_passwords(content)
            content = redact_token_like_values(content)
            sys.stdout.write(content)
            PY
            {
              echo "### Supabase migration diagnostics"
              echo
              echo "Sanitized Supabase CLI output is attached as \`supabase-migrations.log\`."
              echo "Search the artifact for \`Running Supabase migrations (attempt 1/3)...\`, then copy the first \`ERROR:\`, \`SQLSTATE\`, or \`ErrorResponse\` block."
            } >> "$GITHUB_STEP_SUMMARY"

            sanitize_migration_output() {
              python3 "$SANITIZER_SCRIPT"
            }

            append_migration_log() {
              sanitize_migration_output >> "$MIGRATIONS_LOG"
            }

            print_migration_output() {
              sanitize_migration_output | tee -a "$MIGRATIONS_LOG"
            }

            # Retry transient Supabase Preview failures while surfacing deterministic SQL errors.
            print_migration_failure_summary() {
              local output="$1"
              local summary sanitized_summary
              summary=$(printf '%s\n' "$output" | awk '
                BEGIN { remaining = 0; found = 0 }
                /ERROR:|SQLSTATE|ErrorResponse|cannot change return type|duplicate key|permission denied|failed to connect|network is unreachable|password authentication failed|relation .* does not exist|column .* does not exist|function .* does not exist|type .* does not exist|invalid input syntax|checksum|failed to parse|error parsing/ {
                  if (!found) { found = 1; remaining = 40 }
                }
                found && remaining > 0 { print; remaining-- }
              ')

              if [ -n "$summary" ]; then
                sanitized_summary=$(printf '%s\n' "$summary" | sanitize_migration_output)
                echo "::group::First Supabase migration failure block"
                printf '%s\n' "$sanitized_summary"
                echo "::endgroup::"
                {
                  echo
                  echo "#### First Supabase migration failure block"
                  echo '```text'
                  printf '%s\n' "$sanitized_summary"
                  echo '```'
                } >> "$GITHUB_STEP_SUMMARY"
              else
                echo "::warning::No ERROR, SQLSTATE, ErrorResponse, connection, or known SQL failure marker was found in the Supabase CLI output. Review the full --debug output above or download supabase-migrations.log."
              fi
            }

            is_deterministic_migration_error() {
              local output="$1"
              local pattern='syntax error|permission denied|not a valid migration|SQLSTATE 42P01|relation .* does not exist|column .* does not exist|function .* does not exist|type .* does not exist|invalid input syntax|duplicate key value violates unique constraint|violates (foreign key|not-null|check) constraint|checksum|failed to parse|error parsing'
              echo "$output" | grep -Eiq "$pattern"
            }

            run_db_push_once() {
              local output exit_code ghosts dup_version
              DB_PUSH_RETRYABLE=true

              output=$(supabase db push --include-all --db-url "$SESSION_URL" --debug 2>&1)
              exit_code=$?
              printf '%s\n' "$output" | print_migration_output

              if [ "$exit_code" -eq 0 ]; then
                return 0
              fi

              print_migration_failure_summary "$output"

              # Case 1: ghost / reverted migrations.
              ghosts=$(echo "$output" | grep "supabase migration repair --status reverted" | sed 's/.*reverted //' || true)
              if [ -n "$ghosts" ]; then
                for version in $ghosts; do
                  echo "::warning::Repairing ghost migration $version"
                  printf '%s\n' "Repairing ghost migration $version" | append_migration_log
                  output=$(supabase migration repair --status reverted "$version" --db-url "$SESSION_URL" --debug 2>&1)
                  exit_code=$?
                  printf '%s\n' "$output" | print_migration_output
                  if [ "$exit_code" -ne 0 ]; then
                    return "$exit_code"
                  fi
                done
                output=$(supabase db push --include-all --db-url "$SESSION_URL" --debug 2>&1)
                exit_code=$?
                printf '%s\n' "$output" | print_migration_output
                return "$exit_code"
              fi

              # Duplicate schema_migrations versions indicate local migration history is not aligned
              # with the remote database. Do not auto-repair or retry: that can re-run the same file
              # and fail again. Surface the exact version so migration filename/history can be fixed.
              dup_version=$(echo "$output" | grep -oE 'Key \(version\)=\([0-9]+\) already exists' | grep -oE '[0-9]+' || true)
              if [ -n "$dup_version" ]; then
                echo "::error::Migration version $dup_version already exists in supabase_migrations.schema_migrations. Check for duplicate local migration prefixes or a remote history mismatch before retrying."
                DB_PUSH_RETRYABLE=false
                return "$exit_code"
              fi

              if is_deterministic_migration_error "$output"; then
                echo "::error::Non-transient Supabase migration error detected. Not retrying; fix the SQL/CLI error shown above."
                DB_PUSH_RETRYABLE=false
                return "$exit_code"
              fi

              return "$exit_code"
            }

            run_with_retry() {
              local max_attempts=3
              local delay_seconds=10
              local attempt=1

              while true; do
                echo "Running Supabase migrations (attempt $attempt/$max_attempts)..."
                printf '%s\n' "Running Supabase migrations (attempt $attempt/$max_attempts)..." | append_migration_log
                if run_db_push_once; then
                  return 0
                fi

                if [ "${DB_PUSH_RETRYABLE:-true}" = "false" ]; then
                  return 1
                fi

                if [ "$attempt" -ge "$max_attempts" ]; then
                  echo "::error::Supabase migrations failed after $max_attempts attempts. Review the --debug output above for the failing endpoint or SQL error."
                  return 1
                fi

                attempt=$((attempt + 1))
                echo "::warning::Supabase migrations failed, retrying in ${delay_seconds}s in case this was a transient upstream/proxy error."
                sleep "$delay_seconds"
              done
            }

            run_with_retry

      - name: Upload Supabase migration log
        if: always() && steps.validate.outputs.skip_supabase != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: supabase-migrations-log
          path: supabase-migrations.log
          if-no-files-found: warn
          retention-days: 14

  # 2. Supabase Edge Functions
  supabase-functions:
    name: Supabase - Edge Functions
    needs: supabase-migrate
    if: needs.supabase-migrate.outputs.skip_supabase != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v4 # v4

      - name: Deploy API Edge Function
        uses: ./.github/actions/supabase-link-run
        with:
          project_ref: ${{ env.SUPABASE_PROJECT_REF }}
          supabase_access_token: ${{ env.SUPABASE_ACCESS_TOKEN }}
          skip_link: true
          command: supabase functions deploy api --use-api --project-ref ${{ env.SUPABASE_PROJECT_REF }}

      - name: Deploy MCP Edge Function
        uses: ./.github/actions/supabase-link-run
        with:
          project_ref: ${{ env.SUPABASE_PROJECT_REF }}
          supabase_access_token: ${{ env.SUPABASE_ACCESS_TOKEN }}
          skip_link: true
          command: supabase functions deploy mcp --project-ref ${{ env.SUPABASE_PROJECT_REF }} --no-verify-jwt

      - name: Deploy Daily Aggregates Edge Function
        uses: ./.github/actions/supabase-link-run
        with:
          project_ref: ${{ env.SUPABASE_PROJECT_REF }}
          supabase_access_token: ${{ env.SUPABASE_ACCESS_TOKEN }}
          skip_link: true
          command: supabase functions deploy daily-aggregates --no-verify-jwt --project-ref ${{ env.SUPABASE_PROJECT_REF }}
