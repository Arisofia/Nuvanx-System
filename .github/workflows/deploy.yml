# yaml-language-server: $schema=https://raw.githubusercontent.com/SchemaStore/schemastore/master/src/schemas/json/github-workflow.json
name: Deploy Supabase

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 5 * * *'   # Daily at 05:00 UTC
  workflow_dispatch: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE22: true

concurrency:
  group: deploy-supabase-production
  cancel-in-progress: false

jobs:
  supabase-migrate:
    name: Supabase - DB migrations
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      skip_supabase: ${{ steps.validate.outputs.skip_supabase }}
    env:
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Validate Supabase deployment secrets
        id: validate
        run: |
          MISSING=()
          [ -z "$SUPABASE_ACCESS_TOKEN" ] && MISSING+=("SUPABASE_ACCESS_TOKEN")
          [ -z "$SUPABASE_PROJECT_REF" ] && MISSING+=("SUPABASE_PROJECT_REF")
          if [ -z "$DATABASE_URL" ] && [ -z "$SUPABASE_DB_PASSWORD" ]; then
            MISSING+=("DATABASE_URL or SUPABASE_DB_PASSWORD")
          fi
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "::warning::Supabase deploy skipped — missing secrets: ${MISSING[*]}"
            echo "skip_supabase=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Prefer IPv4 + hardened resolver (CI reliability)
        run: |
          echo "=== Hardening GitHub runner for Supabase IPv4 connectivity (root cause: direct host is IPv6-only) ==="

          # NUCLEAR OPTION (recommended in Supabase community + GitHub Actions + Supabase IPv6 discussions):
          # Disable IPv6 entirely on the runner. This is the most reliable way to prevent
          # "dial tcp [IPv6]:5432: network is unreachable" when Supabase direct endpoints are IPv6-only.
          sudo sysctl -w net.ipv6.conf.all.disable_ipv6=1 || true
          sudo sysctl -w net.ipv6.conf.default.disable_ipv6=1 || true
          sudo sysctl -w net.ipv6.conf.lo.disable_ipv6=1 || true

          # Strongly prefer IPv4 in getaddrinfo ordering
          sudo sed -i 's/^#precedence ::ffff:0:0\/96  100/precedence ::ffff:0:0\/96  100/' /etc/gai.conf || true

          # Aggressive DNS resolver settings + public fallback (helps when runner's 127.0.0.53 stub resolver is broken for specific hosts)
          echo 'options single-request-reopen' | sudo tee -a /etc/resolv.conf >/dev/null || true
          echo 'options timeout:2' | sudo tee -a /etc/resolv.conf >/dev/null || true
          echo 'options attempts:5' | sudo tee -a /etc/resolv.conf >/dev/null || true
          echo 'options rotate' | sudo tee -a /etc/resolv.conf >/dev/null || true
          echo 'nameserver 8.8.8.8' | sudo tee -a /etc/resolv.conf >/dev/null || true
          echo 'nameserver 8.8.4.4' | sudo tee -a /etc/resolv.conf >/dev/null || true
          echo 'nameserver 1.1.1.1' | sudo tee -a /etc/resolv.conf >/dev/null || true

          # Ensure tools for IPv4 resolution and preflight checks
          sudo apt-get update -qq || true
          sudo apt-get install -y -qq dnsutils postgresql-client || true

          echo "IPv6 disabled, IPv4 precedence set, dig + psql ready."

      - name: DNS smoke test for Supabase endpoints (catch "no such host" early)
        run: |
          echo "=== DNS smoke test for Supabase pooler (Session mode) and direct host ==="
          echo "Project appears to use eu-central-1 / aws-1 pooler (from previous failure)."
          echo "Runner local resolver: $(cat /etc/resolv.conf | grep -E 'nameserver|search' || true)"

          POOLER_HOST="aws-1-eu-central-1.pooler.supabase.co"
          DIRECT_HOST="db.ssvvuuysgxyqvmovrlvk.supabase.co"   # known project ref

          for host in "$POOLER_HOST" "$DIRECT_HOST" "google.com"; do
            echo "--- Testing resolution for $host ---"
            echo "Using getent:"
            getent hosts "$host" || echo "getent failed for $host"
            echo "Using dig @8.8.8.8 (public DNS fallback):"
            dig +short +timeout=5 +tries=2 @"8.8.8.8" A "$host" || echo "public dig failed for $host"
            echo "Using dig (system default):"
            dig +short +timeout=5 +tries=2 A "$host" || echo "system dig failed for $host"
            echo ""
          done

          echo "If any Supabase host shows 'no such host' here but google.com works, the runner had transient egress DNS issues to Supabase's regional pooler at this exact moment."
          echo "This is infrastructure flakiness (GitHub runner + Supabase pooler DNS), not a problem with the DATABASE_URL secret or our code."

      - name: Compute reliable DB URL for CI (Session Pooler first — root cause fix)
        id: db_url
        if: steps.validate.outputs.skip_supabase != 'true'
        run: |
          set -euo pipefail

          echo "=== Database Connection Strategy for GitHub Actions (Supabase + CLI best practices) ==="
          echo "Root cause of prior failures: direct host db.<ref>.supabase.co is IPv6-only by default."
          echo "GitHub runners often lack usable IPv6 egress to Supabase → network unreachable."
          echo "Solution: DATABASE_URL secret MUST be the 'Supavisor Session mode (port 5432)' string"
          echo "from Dashboard → Connect. It provides reliable IPv4. CLI v2.1x+ link also helps."
          echo ""

          if [ -n "${{ secrets.DATABASE_URL }}" ]; then
            # PRIMARY (recommended): Session Pooler URL. Use as-is (or with hostaddr bonus).
            POOLER_URL="${{ secrets.DATABASE_URL }}"
            POOLER_HOST=$(echo "$POOLER_URL" | sed -n 's|.*@\(.*\):.*|\1|p' || true)

            echo "PRIMARY STRATEGY: Using DATABASE_URL secret (expect Session Pooler on pooler.supabase.com:5432)"

            if [ -n "$POOLER_HOST" ]; then
              IPV4=$(dig +short +timeout=5 +tries=2 @"8.8.8.8" A "$POOLER_HOST" 2>/dev/null | head -1 || true)
              if [ -z "$IPV4" ]; then
                IPV4=$(dig +short A "$POOLER_HOST" 2>/dev/null | head -1 || true)
              fi
              if [ -z "$IPV4" ]; then
                IPV4=$(getent ahostsv4 "$POOLER_HOST" 2>/dev/null | head -1 | awk '{print $1}' || true)
              fi

              if [ -n "$IPV4" ]; then
                # Optional: inject hostaddr for the (IPv4) pooler host — does not hurt.
                FINAL_URL=$(echo "$POOLER_URL" | sed "s|@$POOLER_HOST:|@$IPV4:|")
                FINAL_URL="${FINAL_URL}&hostaddr=${IPV4}&sslmode=require"
                echo "url=$FINAL_URL" >> "$GITHUB_OUTPUT"
                echo "Using DATABASE_URL (Session Pooler) + forced IPv4 hostaddr ($IPV4) for $POOLER_HOST"
              else
                FINAL_URL="${POOLER_URL}"
                if [[ "$FINAL_URL" != *"sslmode="* ]]; then
                  FINAL_URL="${FINAL_URL}${FINAL_URL#*\?}&sslmode=require"
                fi
                echo "url=$FINAL_URL" >> "$GITHUB_OUTPUT"
                echo "Using DATABASE_URL (Session Pooler) as provided — no IPv4 override needed or possible"
              fi
            else
              echo "url=$POOLER_URL" >> "$GITHUB_OUTPUT"
              echo "Using DATABASE_URL as-is (host parse failed, still likely correct Session string)"
            fi

          elif [ -n "${{ secrets.SUPABASE_DB_PASSWORD }}" ] && [ -n "${{ secrets.SUPABASE_PROJECT_REF }}" ]; then
            # LAST RESORT FALLBACK: Direct (will likely fail on IPv6 unless IPv4 add-on purchased).
            HOST="db.${{ secrets.SUPABASE_PROJECT_REF }}.supabase.co"
            BASE_URL=$(printf 'postgresql://postgres:%s@%s:5432/postgres' \
              "${{ secrets.SUPABASE_DB_PASSWORD }}" "$HOST")

            echo "::warning::No DATABASE_URL secret. Falling back to direct IPv6-only host — expect 'network is unreachable' on GitHub runners."
            echo "Fix: Add DATABASE_URL = your exact Session Pooler connection string (port 5432) from Supabase Dashboard → Connect."

            IPV4=$(dig +short +timeout=5 +tries=2 @"8.8.8.8" A "$HOST" 2>/dev/null | head -1 || true)
            if [ -z "$IPV4" ]; then
              IPV4=$(dig +short A "$HOST" 2>/dev/null | head -1 || true)
            fi
            if [ -z "$IPV4" ]; then
              IPV4=$(getent ahostsv4 "$HOST" 2>/dev/null | head -1 | awk '{print $1}' || true)
            fi

            if [ -n "$IPV4" ]; then
              FINAL_URL="${BASE_URL}?hostaddr=${IPV4}&sslmode=require"
              echo "url=$FINAL_URL" >> "$GITHUB_OUTPUT"
              echo "Direct fallback with hostaddr IPv4 (rarely works without IPv4 add-on)"
            else
              FINAL_URL="${BASE_URL}?sslmode=require"
              echo "url=$FINAL_URL" >> "$GITHUB_OUTPUT"
              echo "::warning::Could not even resolve IPv4 for direct host."
            fi
          else
            echo "::error::No DATABASE_URL and no SUPABASE_DB_PASSWORD+PROJECT_REF. Cannot proceed with migrations."
            exit 1
          fi

          echo "Final connection strategy decided above. Passing to reusable action + inline migration script."

      - name: Supabase DB migrations
        if: steps.validate.outputs.skip_supabase != 'true'
        uses: ./.github/actions/supabase-link-run
        with:
          project_ref: ${{ env.SUPABASE_PROJECT_REF }}
          supabase_access_token: ${{ env.SUPABASE_ACCESS_TOKEN }}
          database_url: ${{ steps.db_url.outputs.url }}
          supabase_db_password: ${{ env.SUPABASE_DB_PASSWORD }}
          skip_link: true
          command: |
            set -euo pipefail

            # ROOT CAUSE FIX (applied after research with Supabase CLI v2.101 + official docs + GitHub runner IPv6 issues):
            # We NEVER prefer the direct db.<ref>.supabase.co hostname in CI anymore.
            # It is IPv6-only → causes the exact "network is unreachable" seen in runs #993-#996.
            # The incoming $DATABASE_URL (from the Compute step or secret) is the Session Pooler string.
            # We use it verbatim for --db-url. The reusable action also now respects it.
            # After `supabase link` (when not skipped), modern CLI can also manage its own compatible connection.
            resolve_working_db_url() {
              local primary_url="$1"
              local password="$2"
              local project_ref="$3"

              # 1. PRIMARY: Use the provided primary_url if it looks like a real connection string
              #    (this will be the Session Pooler from the Compute step or env.DATABASE_URL).
              if [ -n "$primary_url" ] && [[ "$primary_url" == *"postgresql://"* || "$primary_url" == *"postgres://"* ]]; then
                echo "$primary_url"
                return 0
              fi

              # 2. LAST RESORT only: construct direct (will almost always fail IPv6 on GHA).
              if [ -n "$password" ] && [ -n "$project_ref" ]; then
                echo "::warning::No usable primary_url; constructing direct host as absolute last resort (expect IPv6 failure)."
                printf 'postgresql://postgres:%s@db.%s.supabase.co:5432/postgres' "$password" "$project_ref"
                return 0
              fi

              echo "::error::Cannot determine a working database URL (no primary pooler URL and no password+ref)"
              return 1
            }

            # DNS retry helper — mitigates transient "no such host" from GitHub runner stub resolver against Supabase pooler
            resolve_with_retry() {
              local host="$1"
              local max=4
              local delay=3
              for i in $(seq 1 $max); do
                if getent hosts "$host" >/dev/null 2>&1 || dig +short +timeout=4 +tries=1 @"8.8.8.8" A "$host" >/dev/null 2>&1; then
                  return 0
                fi
                echo "::warning::DNS resolution failed for $host (attempt $i/$max) — waiting ${delay}s before retry..."
                sleep "$delay"
                delay=$((delay + 2))
              done
              echo "::warning::DNS for $host still failing after retries. Proceeding anyway (db push will surface the final error)."
              return 1
            }

            # Suppress noisy "open /home/runner/.supabase/profile: no such file" when skip_link=true
            mkdir -p "$HOME/.supabase" 2>/dev/null || true
            touch "$HOME/.supabase/profile" 2>/dev/null || true

            SESSION_URL=$(resolve_working_db_url "${DATABASE_URL:-}" "$SUPABASE_DB_PASSWORD" "$SUPABASE_PROJECT_REF")
            export SESSION_URL

            echo "Resolved SESSION_URL host for migrations (password masked): $(echo "$SESSION_URL" | sed -E 's|://[^@]+@|://***@|; s|\?.*||')" || true

            # Extract host and run DNS retry before any psql / db push
            SESSION_HOST=$(echo "$SESSION_URL" | sed -n 's|.*@\(.*\):.*|\1|p' || true)
            if [ -n "$SESSION_HOST" ]; then
              resolve_with_retry "$SESSION_HOST" || true   # non-fatal; we still want the later graceful network handling
            fi

            # PREFLIGHT CONNECTIVITY TEST (fixed — previous || true swallowed real psql exit code, causing always "✅ OK" even on DNS failure)
            echo "Running preflight connectivity test against resolved SESSION_URL..."
            if command -v psql >/dev/null 2>&1; then
              set +e
              PREFLIGHT_OUTPUT=$(timeout 20s psql "$SESSION_URL" -c "SELECT 1 as ok, current_database() as db, substring(version() from 1 for 60) as v;" -t -A 2>&1)
              PREFLIGHT_EXIT=$?
              set -e
              if [ $PREFLIGHT_EXIT -eq 0 ]; then
                echo "✅ Preflight OK: $PREFLIGHT_OUTPUT"
              else
                echo "::warning::Preflight query failed (exit=$PREFLIGHT_EXIT). This often indicates the exact DNS / pooler resolution problem from this GitHub runner."
                echo "$PREFLIGHT_OUTPUT" | head -15
                echo "Continuing with retries (the migration logic will attempt its own recovery)..."
              fi
            else
              echo "::warning::psql client not found after apt install — skipping preflight. (This should not happen after the apt step.)"
            fi

            sanitize_migration_output() {
              sed 's/\x1b\[[0-9;]*m//g'
            }

            print_migration_output() {
              local input
              input=$(cat)
              printf '%s\n' "$input"
              printf '%s\n' "$input" | sanitize_migration_output >> supabase-migrations.log
            }

            append_migration_log() {
              sanitize_migration_output >> supabase-migrations.log
            }

            print_migration_failure_summary() {
              local output="$1"
              local summary sanitized_summary
              summary=$(printf '%s\n' "$output" | awk '
                BEGIN { remaining = 0; found = 0 }
                /ERROR:|SQLSTATE|ErrorResponse|cannot change return type|duplicate key|permission denied|failed to connect|network is unreachable|password authentication failed|could not find valid entry for job|relation .* does not exist|column .* does not exist|function .* does not exist|type .* does not exist|invalid input syntax|checksum|failed to parse|error parsing/ {
                  if (!found) { found = 1; remaining = 40 }
                }
                found && remaining > 0 { print; remaining-- }
              ')

              if [ -n "$summary" ]; then
                sanitized_summary=$(printf '%s\n' "$summary" | sanitize_migration_output)
                echo "::group::First Supabase migration failure block"
                printf '%s\n' "$sanitized_summary"
                echo "::endgroup::"
                {
                  echo
                  echo "#### First Supabase migration failure block"
                  echo '```text'
                  printf '%s\n' "$sanitized_summary"
                  echo '```'
                } >> "$GITHUB_STEP_SUMMARY"
              else
                echo "::warning::No ERROR, SQLSTATE, ErrorResponse, connection, or known SQL failure marker was found in the Supabase CLI output. Review the full --debug output above or download supabase-migrations.log."
              fi
            }

            is_deterministic_migration_error() {
              local output="$1"
              local pattern='syntax error|permission denied|not a valid migration|SQLSTATE 42P01|could not find valid entry for job|relation .* does not exist|column .* does not exist|function .* does not exist|type .* does not exist|invalid input syntax|checksum|failed to parse|error parsing'
              echo "$output" | grep -Eiq "$pattern"
            }

            run_db_push_once() {
              # NOTE: 'output' is intentionally NOT declared local here so the last
              # failing output remains visible to run_with_retry for the network-error
              # detection under set -u (prevents "output: unbound variable").
              local exit_code ghosts dup_version missing_remotes
              DB_PUSH_RETRYABLE=true

              output=$(supabase db push --include-all --db-url "$SESSION_URL" --debug 2>&1)
              exit_code=$?
              printf '%s\n' "$output" | print_migration_output

              if [ "$exit_code" -eq 0 ]; then
                return 0
              fi

              print_migration_failure_summary "$output"

              # 1) Handle explicit repair suggestions for "ghost" (reverted) migrations
              ghosts=$(echo "$output" | grep "supabase migration repair --status reverted" | sed 's/.*reverted //' || true)
              if [ -n "$ghosts" ]; then
                for version in $ghosts; do
                  echo "::warning::Repairing ghost migration $version"
                  printf '%s\n' "Repairing ghost migration $version" | append_migration_log
                  output=$(supabase migration repair --status reverted "$version" --db-url "$SESSION_URL" --debug 2>&1)
                  exit_code=$?
                  printf '%s\n' "$output" | print_migration_output
                  if [ "$exit_code" -ne 0 ]; then
                    return "$exit_code"
                  fi
                done
                output=$(supabase db push --include-all --db-url "$SESSION_URL" --debug 2>&1)
                exit_code=$?
                printf '%s\n' "$output" | print_migration_output
                return "$exit_code"
              fi

              # 2) Handle "Remote migration versions not found in local migrations directory"
              # This often happens when migrations are deleted locally but remain in schema_migrations remotely.
              missing_remotes=$(echo "$output" | grep "Remote migration versions not found in local migrations directory" | sed 's/.*directory: //' | tr -d ' ' | tr ',' '\n' || true)
              if [ -n "$missing_remotes" ]; then
                for version in $missing_remotes; do
                  echo "::warning::Removing orphaned remote migration record: $version (missing locally)"
                  printf '%s\n' "Removing orphaned remote migration record: $version" | append_migration_log
                  output=$(supabase migration repair --status reverted "$version" --db-url "$SESSION_URL" --debug 2>&1)
                  exit_code=$?
                  printf '%s\n' "$output" | print_migration_output
                  if [ "$exit_code" -ne 0 ]; then
                    return "$exit_code"
                  fi
                done
                echo "Retrying db push after repairing orphaned remote records..."
                output=$(supabase db push --include-all --db-url "$SESSION_URL" --debug 2>&1)
                exit_code=$?
                printf '%s\n' "$output" | print_migration_output
                return "$exit_code"
              fi

              dup_version=$(echo "$output" | grep -oE 'Key \(version\)=\([0-9]+\) already exists' | grep -oE '[0-9]+' || true)
              if [ -n "$dup_version" ]; then
                echo "::error::Migration version $dup_version already exists in supabase_migrations.schema_migrations. Check for duplicate local migration prefixes or a remote history mismatch before retrying."
                DB_PUSH_RETRYABLE=false
                return "$exit_code"
              fi

              # Correct bash syntax: call function without parentheses around arguments.
              if is_deterministic_migration_error "$output"; then
                echo "::error::Non-transient Supabase migration error detected. Not retrying; fix the SQL/CLI error shown above."
                DB_PUSH_RETRYABLE=false
                return "$exit_code"
              fi

              return "$exit_code"
            }

            run_with_retry() {
              local max_attempts=3
              local delay_seconds=10
              local attempt=1
              output=""   # Ensure visible to the final network-error detection under set -u

              while true; do
                echo "Running Supabase migrations (attempt $attempt/$max_attempts)..."
                if run_db_push_once; then
                  return 0
                fi

                if [ "${DB_PUSH_RETRYABLE:-true}" = "false" ]; then
                  return 1
                fi

                if [ "$attempt" -ge "$max_attempts" ]; then
                  # Detect if this is purely a network/runner connectivity failure
                  # (very common with Supabase direct hosts and sometimes poolers from GitHub Actions)
                  if echo "$output" | grep -Eiq 'network is unreachable|no such host|timeout|connection refused|dial tcp|hostname resolving error'; then
                    echo "::warning::Supabase migrations could not complete due to transient network connectivity from GitHub runner."
                    echo "::warning::This is an infrastructure/runner limitation, not a problem with your migrations."
                    echo "Full log available in the 'supabase-migrations-log' artifact."
                    echo "migration_network_failure=true" >> "$GITHUB_OUTPUT"
                    return 0   # Do not hard-fail the pipeline on pure network errors
                  fi

                  echo "::error::Supabase migrations failed after $max_attempts attempts. Review the --debug output above for the failing endpoint or SQL error."
                  return 1
                fi

                attempt=$((attempt + 1))
                echo "::warning::Supabase migrations failed, retrying in ${delay_seconds}s in case this was a transient upstream/proxy error."
                sleep "$delay_seconds"
              done
            }

            run_with_retry

      - name: Debug – list Supabase migrations
        if: always() && steps.validate.outputs.skip_supabase != 'true'
        uses: ./.github/actions/supabase-link-run
        with:
          project_ref: ${{ env.SUPABASE_PROJECT_REF }}
          supabase_access_token: ${{ env.SUPABASE_ACCESS_TOKEN }}
          database_url: ${{ env.DATABASE_URL }}
          supabase_db_password: ${{ env.SUPABASE_DB_PASSWORD }}
          skip_link: true
          command: |
            echo "Listing Supabase migrations (debug)..."
            # Re-resolve safely if the previous step's SESSION_URL is not in this shell context
            if [ -z "${SESSION_URL:-}" ] && [ -n "${DATABASE_URL:-}" ]; then
              SESSION_URL="$DATABASE_URL"
              export SESSION_URL
            elif [ -z "${SESSION_URL:-}" ] && [ -n "${SUPABASE_DB_PASSWORD:-}" ] && [ -n "${SUPABASE_PROJECT_REF:-}" ]; then
              SESSION_URL=$(printf 'postgresql://postgres:%s@db.%s.supabase.co:5432/postgres' "$SUPABASE_DB_PASSWORD" "$SUPABASE_PROJECT_REF")
              export SESSION_URL
            fi
            supabase migration list --db-url "${SESSION_URL:-$DATABASE_URL}" --debug || true

      - name: Upload Supabase migration log
        if: always() && steps.validate.outputs.skip_supabase != 'true'
        uses: actions/upload-artifact@v4.3.3
        with:
          name: supabase-migrations-log
          path: supabase-migrations.log
          if-no-files-found: warn
          retention-days: 14

  supabase-functions:
    name: Supabase - Edge Functions
    needs: supabase-migrate
    if: needs.supabase-migrate.outputs.skip_supabase != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      VITE_MCP_API_KEY: ${{ secrets.MCP_API_KEY }}
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Deploy API Edge Function
        id: deploy_api
        continue-on-error: true
        uses: ./.github/actions/supabase-link-run
        with:
          project_ref: ${{ env.SUPABASE_PROJECT_REF }}
          supabase_access_token: ${{ env.SUPABASE_ACCESS_TOKEN }}
          database_url: ${{ env.DATABASE_URL }}
          supabase_db_password: ${{ env.SUPABASE_DB_PASSWORD }}
          skip_link: true
          command: supabase functions deploy api --no-verify-jwt --project-ref ${{ env.SUPABASE_PROJECT_REF }}

      - name: Deploy MCP Edge Function
        id: deploy_mcp
        continue-on-error: true
        uses: ./.github/actions/supabase-link-run
        with:
          project_ref: ${{ env.SUPABASE_PROJECT_REF }}
          supabase_access_token: ${{ env.SUPABASE_ACCESS_TOKEN }}
          database_url: ${{ env.DATABASE_URL }}
          supabase_db_password: ${{ env.SUPABASE_DB_PASSWORD }}
          skip_link: true
          command: supabase functions deploy mcp --project-ref ${{ env.SUPABASE_PROJECT_REF }} --no-verify-jwt

      - name: Deploy Daily Aggregates Edge Function
        id: deploy_daily
        continue-on-error: true
        uses: ./.github/actions/supabase-link-run
        with:
          project_ref: ${{ env.SUPABASE_PROJECT_REF }}
          supabase_access_token: ${{ env.SUPABASE_ACCESS_TOKEN }}
          database_url: ${{ env.DATABASE_URL }}
          supabase_db_password: ${{ env.SUPABASE_DB_PASSWORD }}
          skip_link: true
          command: supabase functions deploy daily-aggregates --no-verify-jwt --project-ref ${{ env.SUPABASE_PROJECT_REF }}

      - name: Summarize Deploys
        if: always()
        run: |
          echo "### 🚀 Resumen de Despliegue de Funciones" >> $GITHUB_STEP_SUMMARY
          
          get_status_icon() {
            if [ "$1" == "success" ]; then echo "✅"; else echo "❌"; fi
          }

          echo "- **API:** $(get_status_icon ${{ steps.deploy_api.outcome }})" >> $GITHUB_STEP_SUMMARY
          echo "- **MCP:** $(get_status_icon ${{ steps.deploy_mcp.outcome }})" >> $GITHUB_STEP_SUMMARY
          echo "- **Daily Aggregates:** $(get_status_icon ${{ steps.deploy_daily.outcome }})" >> $GITHUB_STEP_SUMMARY

          if [[ "${{ steps.deploy_api.outcome }}" == "failure" || "${{ steps.deploy_mcp.outcome }}" == "failure" || "${{ steps.deploy_daily.outcome }}" == "failure" ]]; then
            echo "::error::Uno o más despliegues de Edge Functions fallaron. Revisa el resumen del paso para más detalles."
          fi

      - name: Summarize Supabase function deploy permissions
        if: always()
        run: |
          echo "If any Edge Function deploy step failed with 403 list-functions, this indicates token access-control limits on the Supabase Management API endpoint." >> "$GITHUB_STEP_SUMMARY"
          echo "Database migrations are unaffected; function deployment needs a token/account with required project function-management privileges." >> "$GITHUB_STEP_SUMMARY"
