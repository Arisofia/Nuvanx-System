###############################################################################
# Deploy — sequential pipeline triggered after CI passes on main
#
# Order: lint → build → supabase-migrate → supabase-functions
#
# Required secrets (GitHub → Settings → Secrets → Actions):
#   SUPABASE_ACCESS_TOKEN   — Supabase personal access token
#   SUPABASE_DB_PASSWORD    — DB password for supabase db push
#   VITE_SUPABASE_URL       — https://ssvvuuysgxyqvmovrlvk.supabase.co
#   VITE_SUPABASE_ANON_KEY  — public anon key
###############################################################################

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  # ─── 1. Lint ───────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint

  # ─── 2. Build ──────────────────────────────────────────────────────────────
  build:
    name: Build
    needs: lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
        env:
          NODE_ENV: production
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://example.supabase.co' }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || 'ci-anon-key-placeholder' }}

  # ─── 3. Supabase DB migrations ─────────────────────────────────────────────
  supabase-migrate:
    name: Supabase — DB migrations
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Push migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets['SUPABASE_ACCESS_TOKEN'] }}
          SUPABASE_DB_PASSWORD: ${{ secrets['SUPABASE_DB_PASSWORD'] }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_DB_PASSWORD" ]; then
            echo "::warning::Skipping migrations. Set SUPABASE_ACCESS_TOKEN and SUPABASE_DB_PASSWORD in GitHub secrets."
            exit 0
          fi
          supabase db push --project-ref ssvvuuysgxyqvmovrlvk --password "$SUPABASE_DB_PASSWORD"

  # ─── 4. Supabase Edge Functions ────────────────────────────────────────────
  supabase-functions:
    name: Supabase — Edge Functions
    needs: supabase-migrate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Deploy Edge Functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets['SUPABASE_ACCESS_TOKEN'] }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::warning::Skipping functions deploy. Set SUPABASE_ACCESS_TOKEN in GitHub secrets."
            exit 0
          fi
          supabase functions deploy api --no-verify-jwt --project-ref ssvvuuysgxyqvmovrlvk --use-api

