# yaml-language-server: $schema=https://raw.githubusercontent.com/SchemaStore/schemastore/master/src/schemas/json/github-workflow.json
name: Deploy Supabase

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch: {}

env:
  NODE_ENV: production

concurrency:
  group: deploy-supabase-production
  cancel-in-progress: false

jobs:
  supabase-migrate:
    name: Supabase - DB migrations
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v5

      - name: Validate real Supabase deployment secrets
        shell: bash
        run: |
          set -euo pipefail
          [ -n "${SUPABASE_ACCESS_TOKEN:-}" ] || { echo "::error::SUPABASE_ACCESS_TOKEN is required"; exit 1; }
          [[ "${SUPABASE_ACCESS_TOKEN:-}" =~ ^sbp_[A-Za-z0-9]+$ ]] || { echo "::error::SUPABASE_ACCESS_TOKEN format is invalid"; exit 1; }
          [ -n "${SUPABASE_PROJECT_REF:-}" ] || { echo "::error::SUPABASE_PROJECT_REF is required"; exit 1; }
          [[ "${SUPABASE_PROJECT_REF:-}" =~ ^[a-z0-9]{20}$ ]] || { echo "::error::SUPABASE_PROJECT_REF format is invalid"; exit 1; }
          if [ -z "${DATABASE_URL:-}" ] && [ -z "${SUPABASE_DB_PASSWORD:-}" ]; then
            echo "::error::DATABASE_URL or SUPABASE_DB_PASSWORD is required"
            exit 1
          fi

      - name: Verify Supabase migration workspace
        shell: bash
        run: |
          set -euo pipefail
          echo "Working directory: $PWD"
          test -d supabase/migrations
          test -f supabase/config.toml
          find supabase/migrations -maxdepth 1 -type f \
            | rg '20260611130207|20260620122925|20260620125300|20260620133905|20260620134035|20260620140312|20260620140559|20260620144808|20260620154159|20260620154852|20260620155515' \
            | sort
          sed -n '/^\[db.migrations\]/,/^\[/p' supabase/config.toml

      - name: Supabase DB migrations
        uses: ./.github/actions/supabase-link-run
        with:
          project_ref: ${{ env.SUPABASE_PROJECT_REF }}
          supabase_access_token: ${{ env.SUPABASE_ACCESS_TOKEN }}
          database_url: ${{ env.DATABASE_URL }}
          supabase_db_password: ${{ env.SUPABASE_DB_PASSWORD }}
          skip_link: true
          command: |
            set -euo pipefail
            node scripts/validate-sql-migrations.js
            # Use SESSION_URL if the action exports it; otherwise fall back to DATABASE_URL.
            supabase db push --include-all --db-url "${SESSION_URL:-$DATABASE_URL}" --debug

      - name: List Supabase migrations
        uses: ./.github/actions/supabase-link-run
        with:
          project_ref: ${{ env.SUPABASE_PROJECT_REF }}
          supabase_access_token: ${{ env.SUPABASE_ACCESS_TOKEN }}
          database_url: ${{ env.DATABASE_URL }}
          supabase_db_password: ${{ env.SUPABASE_DB_PASSWORD }}
          skip_link: true
          command: |
            set -euo pipefail
            supabase migration list --db-url "${SESSION_URL:-$DATABASE_URL}" --debug

  supabase-functions:
    name: Supabase - Edge Functions
    needs: supabase-migrate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      FALLBACK_META_AD_ACCOUNT_ID: ${{ secrets.FALLBACK_META_AD_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v5

      - name: Validate real Edge Function deploy secrets
        shell: bash
        run: |
          set -euo pipefail
          for key in SUPABASE_PROJECT_REF SUPABASE_ACCESS_TOKEN FALLBACK_META_AD_ACCOUNT_ID; do
            value="${!key:-}"
            [ -n "$value" ] || { echo "::error::$key is required"; exit 1; }
          done
          [[ "${SUPABASE_PROJECT_REF:-}" =~ ^[a-z0-9]{20}$ ]] || { echo "::error::SUPABASE_PROJECT_REF format is invalid"; exit 1; }
          [[ "${SUPABASE_ACCESS_TOKEN:-}" =~ ^sbp_[A-Za-z0-9]+$ ]] || { echo "::error::SUPABASE_ACCESS_TOKEN format is invalid"; exit 1; }
          [[ "${FALLBACK_META_AD_ACCOUNT_ID:-}" =~ ^[0-9]+$ ]] || { echo "::error::FALLBACK_META_AD_ACCOUNT_ID must be numeric"; exit 1; }
          echo "FALLBACK_META_AD_ACCOUNT_ID=${FALLBACK_META_AD_ACCOUNT_ID}" >> "$GITHUB_ENV"

          if [ -z "${DATABASE_URL:-}" ] && [ -z "${SUPABASE_DB_PASSWORD:-}" ]; then
            echo "::error::DATABASE_URL or SUPABASE_DB_PASSWORD is required"
            exit 1
          fi

      - name: Deploy API Edge Function
        uses: ./.github/actions/supabase-link-run
        with:
          project_ref: ${{ env.SUPABASE_PROJECT_REF }}
          supabase_access_token: ${{ env.SUPABASE_ACCESS_TOKEN }}
          database_url: ${{ env.DATABASE_URL }}
          supabase_db_password: ${{ env.SUPABASE_DB_PASSWORD }}
          skip_link: true
          command: |
            set -euo pipefail
            export FALLBACK_META_AD_ACCOUNT_ID="$FALLBACK_META_AD_ACCOUNT_ID"
            supabase functions deploy api --no-verify-jwt --project-ref "$SUPABASE_PROJECT_REF"

      - name: Deploy MCP Edge Function
        uses: ./.github/actions/supabase-link-run
        with:
          project_ref: ${{ env.SUPABASE_PROJECT_REF }}
          supabase_access_token: ${{ env.SUPABASE_ACCESS_TOKEN }}
          database_url: ${{ env.DATABASE_URL }}
          supabase_db_password: ${{ env.SUPABASE_DB_PASSWORD }}
          skip_link: true
          command: |
            set -euo pipefail
            export FALLBACK_META_AD_ACCOUNT_ID="$FALLBACK_META_AD_ACCOUNT_ID"
            supabase functions deploy mcp --project-ref "$SUPABASE_PROJECT_REF" --no-verify-jwt

      - name: Deploy Daily Aggregates Edge Function
        uses: ./.github/actions/supabase-link-run
        with:
          project_ref: ${{ env.SUPABASE_PROJECT_REF }}
          supabase_access_token: ${{ env.SUPABASE_ACCESS_TOKEN }}
          database_url: ${{ env.DATABASE_URL }}
          supabase_db_password: ${{ env.SUPABASE_DB_PASSWORD }}
          skip_link: true
          command: |
            set -euo pipefail
            export FALLBACK_META_AD_ACCOUNT_ID="$FALLBACK_META_AD_ACCOUNT_ID"
            supabase functions deploy daily-aggregates --project-ref "$SUPABASE_PROJECT_REF" --no-verify-jwt
