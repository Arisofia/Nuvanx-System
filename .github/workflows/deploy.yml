# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
# Deploy Supabase - sequential pipeline on main
#
# Order: supabase-migrate -> supabase-functions
#
# Note:
#   Lint and Build are performed in ci.yml on PRs.
#   This workflow focuses on Supabase infrastructure.
#   Frontend production deploys are handled by Vercel GitHub integration.
#
# Required secrets (GitHub -> Settings -> Secrets -> Actions):
#   SUPABASE_ACCESS_TOKEN        - Supabase personal access token
#   SUPABASE_PROJECT_REF         - Supabase project ref used by supabase link
#   SUPABASE_DB_PASSWORD         - DB password for supabase db push
#   DATABASE_URL                 - Optional fallback DB URL to derive SUPABASE_DB_PASSWORD

name: Deploy Supabase

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-supabase-production
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # 1. Supabase DB migrations
  supabase-migrate:
    name: Supabase - DB migrations
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      skip_supabase: ${{ steps.validate.outputs.skip_supabase }}
    env:
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - uses: actions/checkout@v5 # v5

      - name: Validate Supabase deployment secrets
        id: validate
        run: |
          MISSING=()
          [ -z "$SUPABASE_ACCESS_TOKEN" ] && MISSING+=("SUPABASE_ACCESS_TOKEN")
          [ -z "$SUPABASE_PROJECT_REF" ] && MISSING+=("SUPABASE_PROJECT_REF")
          if [ -z "$DATABASE_URL" ] && [ -z "$SUPABASE_DB_PASSWORD" ]; then
            MISSING+=("DATABASE_URL or SUPABASE_DB_PASSWORD")
          fi
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "::warning::Supabase deploy skipped — missing secrets: ${MISSING[*]}"
            echo "skip_supabase=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Supabase DB migrations
        if: steps.validate.outputs.skip_supabase != 'true'
        uses: ./.github/actions/supabase-link-run
        with:
          project_ref: ${{ env.SUPABASE_PROJECT_REF }}
          supabase_access_token: ${{ env.SUPABASE_ACCESS_TOKEN }}
          database_url: ${{ env.DATABASE_URL }}
          supabase_db_password: ${{ env.SUPABASE_DB_PASSWORD }}
          command: |
            # Build direct session URL (port 5432) — avoids prepared statement conflicts with the pooler.
            # Prefer DATABASE_URL; fall back to constructing from project ref + password.
            if [ -n "$DATABASE_URL" ]; then
              SESSION_URL=$(echo "$DATABASE_URL" | sed 's/:6543\//:5432\//')
            elif [ -n "$SUPABASE_DB_PASSWORD" ] && [ -n "$SUPABASE_PROJECT_REF" ]; then
              SESSION_URL="postgresql://postgres:${SUPABASE_DB_PASSWORD}@db.${SUPABASE_PROJECT_REF}.supabase.co:5432/postgres"
            else
              echo "::error::Cannot connect to database. Set DATABASE_URL or both SUPABASE_DB_PASSWORD and SUPABASE_PROJECT_REF."
              exit 1
            fi
            output=$(supabase db push --include-all --db-url "$SESSION_URL" 2>&1)
            exit_code=$?
            echo "$output"
            if [ $exit_code -ne 0 ]; then
              # Case 1: ghost / reverted migrations
              ghosts=$(echo "$output" | grep -oE 'supabase migration repair --status reverted [0-9]+' | grep -oE '[0-9]+$' || true)
              if [ -n "$ghosts" ]; then
                for version in $ghosts; do
                  echo "::warning::Repairing ghost migration $version"
                  supabase migration repair --status reverted "$version" --db-url "$SESSION_URL"
                done
                supabase db push --include-all --db-url "$SESSION_URL"
                exit $?
              fi
              # Case 2: version already recorded in schema_migrations (duplicate key)
              dup_version=$(echo "$output" | grep -oE 'Key \(version\)=\([0-9]+\) already exists' | grep -oE '[0-9]+' || true)
              if [ -n "$dup_version" ]; then
                echo "::warning::Migration $dup_version already recorded in schema_migrations. Marking as applied and retrying."
                supabase migration repair --status applied "$dup_version" --db-url "$SESSION_URL"
                supabase db push --include-all --db-url "$SESSION_URL"
                exit $?
              fi
              exit $exit_code
            fi

  # 2. Supabase Edge Functions
  supabase-functions:
    name: Supabase - Edge Functions
    needs: supabase-migrate
    if: needs.supabase-migrate.outputs.skip_supabase != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v5 # v5

      - name: Deploy Edge Functions
        uses: ./.github/actions/supabase-link-run
        with:
          project_ref: ${{ env.SUPABASE_PROJECT_REF }}
          supabase_access_token: ${{ env.SUPABASE_ACCESS_TOKEN }}
          command: supabase functions deploy api --use-api

      - name: Deploy MCP function
        run: |
          echo "Deploying MCP function..."
          supabase functions deploy mcp --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} --no-verify-jwt
          echo "MCP function deployed successfully ✓"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
