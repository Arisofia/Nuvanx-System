###############################################################################
# Deploy Supabase - sequential pipeline on main
#
# Order: lint -> build -> supabase-migrate -> supabase-functions
#
# Note:
#   This workflow does not run Vercel deploy commands.
#   Frontend production deploys should be handled by Vercel GitHub integration.
#
# Required secrets (GitHub -> Settings -> Secrets -> Actions):
#   SUPABASE_ACCESS_TOKEN        - Supabase personal access token
#   SUPABASE_DB_PASSWORD         - DB password for supabase db push
#   VITE_SUPABASE_URL            - https://ssvvuuysgxyqvmovrlvk.supabase.co
#   VITE_SUPABASE_PUBLISHABLE_KEY - Supabase publishable key from Supabase Connect
#   VITE_SUPABASE_ANON_KEY       - legacy public anon key
###############################################################################

name: Deploy Supabase

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-supabase-production
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # 1. Lint
  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci --include=dev
      - name: Run frontend lint
        run: npm run lint

  # 2. Build
  build:
    name: Build
    needs: lint
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    defaults:
      run:
        working-directory: frontend
    env:
      NODE_ENV: production
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci --include=dev
      - name: Build frontend
        run: |
          export NODE_ENV=production
          export VITE_SUPABASE_URL="${VITE_SUPABASE_URL:-}"
          export VITE_SUPABASE_PUBLISHABLE_KEY="${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}"
          export VITE_SUPABASE_PUBLISHABLE_KEY="${VITE_SUPABASE_PUBLISHABLE_KEY:-${VITE_SUPABASE_ANON_KEY:-}}"
          export VITE_SUPABASE_ANON_KEY="${VITE_SUPABASE_ANON_KEY:-}"
          npm run build

  # 3. Supabase DB migrations
  supabase-migrate:
    name: Supabase - DB migrations
    needs: build
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v2
        with:
          version: latest
      - name: Push migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_DB_PASSWORD" ]; then
            echo "::warning::Skipping migrations. Set SUPABASE_ACCESS_TOKEN and SUPABASE_DB_PASSWORD in GitHub secrets."
            exit 0
          fi
          supabase db push --project-ref ssvvuuysgxyqvmovrlvk --password "$SUPABASE_DB_PASSWORD"

  # 4. Supabase Edge Functions
  supabase-functions:
    name: Supabase - Edge Functions
    needs: supabase-migrate
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v2
        with:
          version: latest
      - name: Deploy Edge Functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::warning::Skipping functions deploy. Set SUPABASE_ACCESS_TOKEN in GitHub secrets."
            exit 0
          fi
          supabase functions deploy api --no-verify-jwt --project-ref ssvvuuysgxyqvmovrlvk --use-api
