###############################################################################
# Deploy — runs after CI passes on main
# Deploys frontend to Vercel.
#
# Required secrets (set in GitHub → Settings → Secrets):
#   VERCEL_TOKEN            — Vercel personal access token
#   VERCEL_ORG_ID           — Vercel team/org ID
#   VERCEL_PROJECT_ID       — Vercel project ID (from .vercel/project.json)
###############################################################################

name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # ─── Frontend → Vercel ─────────────────────────────────────────────────────
  deploy-frontend:
    name: Deploy frontend to Vercel
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: read
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: "${{ secrets.VERCEL_TOKEN }}"
          VERCEL_ORG_ID: "${{ secrets.VERCEL_ORG_ID }}"
          VERCEL_PROJECT_ID: "${{ secrets.VERCEL_PROJECT_ID }}"
          VITE_SUPABASE_URL: "${{ secrets.VITE_SUPABASE_URL }}"
          VITE_SUPABASE_ANON_KEY: "${{ secrets.VITE_SUPABASE_ANON_KEY }}"
        run: |
          echo "Running Vercel preflight checks..."

          missing_vars=""
          [ -z "$VERCEL_TOKEN" ] && missing_vars="${missing_vars} VERCEL_TOKEN"
          [ -z "$VERCEL_ORG_ID" ] && missing_vars="${missing_vars} VERCEL_ORG_ID"
          [ -z "$VERCEL_PROJECT_ID" ] && missing_vars="${missing_vars} VERCEL_PROJECT_ID"

          if [ -n "$missing_vars" ]; then
            echo "::warning::Skipping deploy. Missing required Vercel secrets:${missing_vars}. Configure them in GitHub -> Settings -> Secrets -> Actions."
            exit 0
          fi

          if ! vercel whoami --token="$VERCEL_TOKEN" >/dev/null 2>&1; then
            echo "::warning::Skipping deploy. VERCEL_TOKEN is invalid or expired."
            exit 0
          fi

          echo "Preflight checks passed. Deploying to Vercel (remote build)..."

          # Pull project settings / env linkage
          vercel pull --yes --environment=production --token="$VERCEL_TOKEN" || {
            echo "::warning::Skipping deploy. vercel pull failed — check VERCEL_ORG_ID / VERCEL_PROJECT_ID secrets."
            exit 0
          }

          # Deploy: Vercel builds on their servers using vercel.json (buildCommand + outputDirectory).
          # VITE_ vars are forwarded as build-env so the remote build has them.
          vercel deploy --prod --token="$VERCEL_TOKEN" \
            --build-env VITE_SUPABASE_URL="$VITE_SUPABASE_URL" \
            --build-env VITE_SUPABASE_ANON_KEY="$VITE_SUPABASE_ANON_KEY" || {
            echo "::warning::Vercel deployment failed. See output above. Resolve in the Vercel dashboard if this is a billing/quota issue."
            exit 0
          }
