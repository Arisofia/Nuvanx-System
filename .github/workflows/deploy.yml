###############################################################################
# Deploy Supabase - sequential pipeline on main
#
# Order: lint -> build -> supabase-migrate -> supabase-functions
#
# Note:
#   This workflow does not run Vercel deploy commands.
#   Frontend production deploys should be handled by Vercel GitHub integration.
#
# Required secrets (GitHub -> Settings -> Secrets -> Actions):
#   SUPABASE_ACCESS_TOKEN        - Supabase personal access token
#   SUPABASE_PROJECT_REF         - Supabase project ref used by supabase link
#   SUPABASE_DB_PASSWORD         - DB password for supabase db push
#                                 (optional if DATABASE_URL is available)
#   DATABASE_URL                 - Optional fallback DB URL to derive SUPABASE_DB_PASSWORD
#   VITE_SUPABASE_URL            - Frontend Supabase URL (e.g. https://<project-ref>.supabase.co)
#   VITE_SUPABASE_PUBLISHABLE_KEY - Supabase publishable key from Supabase Connect
#   VITE_SUPABASE_ANON_KEY       - legacy public anon key
###############################################################################

name: Deploy Supabase

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-supabase-production
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # 1. Lint
  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Validate frontend secrets
        run: |
          MISSING=()
          [ -z "$VITE_SUPABASE_URL" ] && MISSING+=("VITE_SUPABASE_URL")
          if [ -z "$VITE_SUPABASE_PUBLISHABLE_KEY" ] && [ -z "$VITE_SUPABASE_ANON_KEY" ]; then
            MISSING+=("VITE_SUPABASE_PUBLISHABLE_KEY or VITE_SUPABASE_ANON_KEY")
          fi
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "::error::Missing required secrets: ${MISSING[*]}"
            exit 1
          fi
      - name: Install frontend dependencies
        run: npm ci --include=dev
      - name: Run frontend lint
        run: npm run lint

  # 2. Build
  build:
    name: Build
    needs: lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: frontend
    env:
      NODE_ENV: production
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci --include=dev
      - name: Build frontend
        run: |
          export NODE_ENV=production
          export VITE_SUPABASE_URL="${VITE_SUPABASE_URL:-}"
          export VITE_SUPABASE_PUBLISHABLE_KEY="${VITE_SUPABASE_PUBLISHABLE_KEY:-${VITE_SUPABASE_ANON_KEY:-}}"
          export VITE_SUPABASE_ANON_KEY="${VITE_SUPABASE_ANON_KEY:-}"
          npm run build

  # 3. Supabase DB migrations
  supabase-migrate:
    name: Supabase - DB migrations
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF || 'ssvvuuysgxyqvmovrlvk' }}
    steps:
      - uses: actions/checkout@v5
      - name: Validate Supabase deployment secrets
        run: |
          MISSING=()
          [ -z "$SUPABASE_ACCESS_TOKEN" ] && MISSING+=("SUPABASE_ACCESS_TOKEN")
          if [ -z "$DATABASE_URL" ] && [ -z "$SUPABASE_DB_PASSWORD" ]; then
            MISSING+=("DATABASE_URL or SUPABASE_DB_PASSWORD")
          fi
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "::error::Missing required secrets: ${MISSING[*]}"
            exit 1
          fi
      - name: Debug Supabase connection (safe)
        run: |
          echo "SUPABASE_PROJECT_REF=$SUPABASE_PROJECT_REF"
          echo "SUPABASE_URL=$SUPABASE_URL"
          echo "SUPABASE_DB_PASSWORD is set? $([[ -z \"$SUPABASE_DB_PASSWORD\" ]] && echo no || echo yes)"
          if [ -n "$DATABASE_URL" ]; then
            echo "DATABASE_URL is set"
            echo "$DATABASE_URL" | sed -E 's#^postgres(ql)?://([^:@/]+):[^@]+@#postgresql://\2:***@#'
          else
            echo "DATABASE_URL is empty"
          fi
      - name: Supabase DB migrations
        uses: ./.github/actions/supabase-link-run
        with:
          project_ref: ${{ secrets.SUPABASE_PROJECT_REF || 'ssvvuuysgxyqvmovrlvk' }}
          supabase_access_token: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          database_url: ${{ secrets.DATABASE_URL }}
          supabase_db_password: ${{ secrets.SUPABASE_DB_PASSWORD }}
          command: |
            if [ -n "$DATABASE_URL" ]; then
              supabase db push --db-url "$DATABASE_URL"
            else
              if [ -z "$SUPABASE_DB_PASSWORD" ]; then
                echo "::error::Supabase migration secret SUPABASE_DB_PASSWORD is missing. Set it in GitHub secrets or provide DATABASE_URL."
                exit 1
              fi
              supabase db push --linked --password "$SUPABASE_DB_PASSWORD"
            fi

  # 4. Supabase Edge Functions
  supabase-functions:
    name: Supabase - Edge Functions
    needs: supabase-migrate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF || 'ssvvuuysgxyvmovrlvk' }}
    steps:
      - uses: actions/checkout@v5
      - name: Deploy Edge Functions
        uses: ./.github/actions/supabase-link-run
        with:
          project_ref: ${{ env.SUPABASE_PROJECT_REF }}
          supabase_access_token: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          command: supabase functions deploy api --no-verify-jwt --use-api

