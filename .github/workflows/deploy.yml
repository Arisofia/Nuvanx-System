###############################################################################
# Deploy — runs after CI passes on main
#
# Backend → Render (free tier)
# Frontend → Vercel
#
# Required secrets (set in GitHub → Settings → Secrets):
#   RENDER_DEPLOY_HOOK_URL — Render deploy hook URL
#                            (Render Dashboard → Service → Settings → Deploy Hook)
#   VERCEL_TOKEN           — Vercel personal access token
#                            (Vercel → Account Settings → Tokens)
#   VERCEL_ORG_ID          — Vercel team/org ID
#                            (Vercel → Account Settings → General → Your ID or Team ID)
#   VERCEL_PROJECT_ID      — Vercel project ID
#                            (Vercel → Project → Settings → General)
###############################################################################

name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─── Backend → Render ──────────────────────────────────────────────────────
  deploy-backend:
    name: Deploy backend to Render
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Trigger Render deploy
        run: |
          curl -s -o /dev/null -w "%{http_code}" "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

  # ─── Frontend → Vercel ─────────────────────────────────────────────────────
  deploy-frontend:
    name: Deploy frontend to Vercel
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: read
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Deploy to Vercel (production)
        run: npx vercel --token "${{ secrets.VERCEL_TOKEN }}" --prod --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
