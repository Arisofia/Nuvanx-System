###############################################################################
# Deploy — runs after CI passes on main
# Deploys backend to Render and frontend to Vercel.
#
# Required secrets (set in GitHub → Settings → Secrets):
#   RENDER_DEPLOY_HOOK_URL  — Render deploy hook URL
#                             (Dashboard → Service → Settings → Deploy Hook)
#   VERCEL_TOKEN            — Vercel personal access token
#   VERCEL_ORG_ID           — Vercel team/org ID
#   VERCEL_PROJECT_ID       — Vercel project ID (from .vercel/project.json)
###############################################################################

name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─── Backend → Render ──────────────────────────────────────────────────────
  deploy-backend:
    name: Deploy backend to Render
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Trigger Render deploy
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "::warning::RENDER_DEPLOY_HOOK_URL secret is not set — skipping deploy."
            echo "Set it in GitHub → Settings → Secrets → Actions."
            exit 0
          fi
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$RENDER_DEPLOY_HOOK_URL")
          echo "Render responded with HTTP $STATUS"
          if [ "$STATUS" -lt 200 ] || [ "$STATUS" -ge 400 ]; then
            echo "::error::Render deploy hook returned HTTP $STATUS"
            exit 1
          fi

  # ─── Frontend → Vercel ─────────────────────────────────────────────────────
  deploy-frontend:
    name: Deploy frontend to Vercel
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: read
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "::warning::VERCEL_TOKEN secret is not set — skipping frontend deploy."
            echo "Set VERCEL_TOKEN, VERCEL_ORG_ID, and VERCEL_PROJECT_ID in GitHub → Settings → Secrets → Actions."
            exit 0
          fi
          vercel deploy --prod --token="$VERCEL_TOKEN" --yes
