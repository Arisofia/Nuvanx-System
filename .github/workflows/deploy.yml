###############################################################################
# Deploy — runs after CI passes on main
# Deploys backend to Render (free tier).
#
# Required secrets (set in GitHub → Settings → Secrets):
#   RENDER_DEPLOY_HOOK_URL — Render deploy hook URL
#                            (Dashboard → Service → Settings → Deploy Hook)
###############################################################################

name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─── Backend → Render ──────────────────────────────────────────────────────
  deploy-backend:
    name: Deploy backend to Render
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Trigger Render deploy
        run: |
          curl -s -o /dev/null -w "%{http_code}" "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
