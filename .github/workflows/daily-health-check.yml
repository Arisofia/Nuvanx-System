# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Daily Health Check

on:
  workflow_dispatch: {}
  schedule:
    - cron: '0 4 * * *'  # 4am UTC (6am Madrid)

permissions:
  contents: read

jobs:
  health-check:
    name: Health Check — Production Endpoints
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Setup Deno
        uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2
        with:
          deno-version: v2.x

      - name: Run Health Check
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || secrets.SUPABASE_URL }}
          MCP_API_KEY: ${{ secrets.MCP_API_KEY }}
          NUVANX_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.NUVANX_SUPABASE_SERVICE_ROLE_KEY }}
          REPORT_USER_ID: ${{ secrets.REPORT_USER_ID }}
        run: |
          if [ -z "$VITE_SUPABASE_URL" ]; then
            echo "::error::VITE_SUPABASE_URL or SUPABASE_URL secret is missing"
            exit 1
          fi
          if [ -z "$MCP_API_KEY" ]; then
            echo "::warning::MCP_API_KEY secret is missing. MCP health check may fail."
          fi
          if [ -z "$NUVANX_SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "::warning::NUVANX_SUPABASE_SERVICE_ROLE_KEY secret is missing. API route health checks may fail."
          fi
          if [ -z "$REPORT_USER_ID" ]; then
            echo "::warning::REPORT_USER_ID secret is missing. x-user-id header will not be sent for service role auth."
          fi
          deno run --allow-net --allow-env scripts/health-check-nuvanx.ts
