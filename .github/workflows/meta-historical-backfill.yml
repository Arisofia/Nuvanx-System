name: Meta Historical Backfill

on:
  workflow_dispatch:
    inputs:
      days:
        description: 'Number of days to back-fill (max 365)'
        required: false
        default: '365'
      since:
        description: 'Start date YYYY-MM-DD (overrides days if set)'
        required: false
        default: ''
      until:
        description: 'End date YYYY-MM-DD (default: yesterday)'
        required: false
        default: ''

permissions:
  contents: read

jobs:
  backfill:
    name: Back-fill meta_daily_insights
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment:
      name: production
    env:
      META_ACCESS_TOKEN:   ${{ secrets.META_ACCESS_TOKEN }}
      META_AD_ACCOUNT_ID:  ${{ secrets.META_AD_ACCOUNT_ID }}
      META_APP_SECRET:     ${{ secrets.META_APP_SECRET }}
      DATABASE_URL:        ${{ secrets.DATABASE_URL }}
      BACKFILL_DAYS:       ${{ github.event.inputs.days }}
      BACKFILL_SINCE:      ${{ github.event.inputs.since }}
      BACKFILL_UNTIL:      ${{ github.event.inputs.until }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      - name: Validate required secrets
        run: |
          MISSING=()
          [ -z "$META_ACCESS_TOKEN" ]  && MISSING+=("META_ACCESS_TOKEN")
          [ -z "$META_AD_ACCOUNT_ID" ] && MISSING+=("META_AD_ACCOUNT_ID")
          [ -z "$DATABASE_URL" ]       && MISSING+=("DATABASE_URL")
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "::error::Missing required secrets: ${MISSING[*]}"
            exit 1
          fi
      - name: Install pg dependency
        run: npm install --no-save pg
      - name: Run historical backfill
        run: node scripts/meta-backfill.js
