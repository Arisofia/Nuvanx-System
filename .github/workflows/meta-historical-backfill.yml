# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Meta Historical Backfill

on:
  workflow_dispatch:
    inputs:
      days:
        description: 'Number of days to back-fill (max 365)'
        required: false
        default: '365'
      since:
        description: 'Start date YYYY-MM-DD (overrides days if set)'
        required: false
        default: ''
      until:
        description: 'End date YYYY-MM-DD (default: yesterday)'
        required: false
        default: ''

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  backfill:
    name: Back-fill meta_daily_insights
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment:
      name: production
    env:
      META_ACCESS_TOKEN:   ${{ secrets.META_ACCESS_TOKEN }}
      META_AD_ACCOUNT_ID:  ${{ secrets.META_AD_ACCOUNT_ID }}
      META_APP_SECRET:     ${{ secrets.META_APP_SECRET }}
      DATABASE_URL:        ${{ secrets.DATABASE_URL }}
      REPORT_USER_ID:      ${{ secrets.REPORT_USER_ID }}
      BACKFILL_DAYS:       ${{ github.event.inputs.days }}
      BACKFILL_SINCE:      ${{ github.event.inputs.since }}
      BACKFILL_UNTIL:      ${{ github.event.inputs.until }}

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
      - name: Validate required secrets
        run: |
          MISSING=()
          [ -z "$META_ACCESS_TOKEN" ]  && MISSING+=("META_ACCESS_TOKEN")
          [ -z "$META_AD_ACCOUNT_ID" ] && MISSING+=("META_AD_ACCOUNT_ID")
          [ -z "$DATABASE_URL" ]       && MISSING+=("DATABASE_URL")
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "::error::Missing required secrets: ${MISSING[*]}"
            exit 1
          fi
      - name: Validate backfill date inputs
        run: |
          is_date() { [[ "$1" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]]; }
          if [ -n "$BACKFILL_SINCE" ] && ! is_date "$BACKFILL_SINCE" ]; then
            echo "::error::since must be YYYY-MM-DD (got: $BACKFILL_SINCE)"
            exit 1
          fi
          if [ -n "$BACKFILL_UNTIL" ] && ! is_date "$BACKFILL_UNTIL" ]; then
            echo "::error::until must be YYYY-MM-DD (got: $BACKFILL_UNTIL)"
            exit 1
          fi
          if [ -n "$BACKFILL_DAYS" ] && ! [[ "$BACKFILL_DAYS" =~ ^[0-9]+$ ]]; then
            echo "::error::days must be a positive integer (got: $BACKFILL_DAYS)"
            exit 1
          fi
      - name: Install pg dependency
        run: npm install --no-save pg
      - name: Run historical backfill
        run: node scripts/meta-backfill.js
