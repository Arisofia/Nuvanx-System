# yaml-language-server: $schema=https://json.schemastore.org/github-workflow
name: E2E Only

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

# Run only the production E2E validation.
# Required secrets:
#   PRODUCTION_E2E_URL
#   PRODUCTION_E2E_TOKEN

on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * *'  # 10am Madrid

jobs:
  production-e2e:
    name: Production E2E
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      PRODUCTION_E2E_URL: ${{ secrets.PRODUCTION_E2E_URL || '' }}
      PRODUCTION_E2E_TOKEN: ${{ secrets.PRODUCTION_E2E_TOKEN || '' }}

    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm ci --include=dev
      - name: Validate E2E secrets
        run: |
          MISSING=()
          [ -z "$PRODUCTION_E2E_URL" ] && MISSING+=("PRODUCTION_E2E_URL")
          [ -z "$PRODUCTION_E2E_TOKEN" ] && MISSING+=("PRODUCTION_E2E_TOKEN")
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "::error::Missing required secrets: ${MISSING[*]}"
            exit 1
          fi
      - name: Run production E2E
        run: npm run production:e2e
