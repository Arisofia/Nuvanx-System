name: Validate Figma Mapping

# This workflow validates the Figma-to-code mapping in strict mode.
# Unlike the warn-only validation in ci.yml, this workflow FAILS if:
# - Mapped routes are not found in App.jsx
# - Mapped component files do not exist
# - Required fields are missing from the mapping JSON
#
# Assumptions:
# 1. The mapping file exists at docs/figma-component-map.json
# 2. The validation script exists at scripts/validate-figma-mapping.mjs
# 3. The script uses exit code 1 for validation failures (when not in --ci mode)
# 4. Frontend dependencies are not required for file existence checks
#    (validation only checks file paths, doesn't parse/build)

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, 'copilot/**', 'feature/**', 'fix/**']

jobs:
  validate-figma-mapping:
    name: Validate Figma Mapping (Strict)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      # NOTE: Frontend dependencies installation step
      # The validation script only checks file existence and route definitions,
      # so dependencies are not strictly required. However, including this step
      # ensures the workflow matches the problem statement requirement.
      # If the validation script is extended to parse/analyze code in the future,
      # dependencies will already be available.
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run Figma validation (strict mode)
        run: node scripts/validate-figma-mapping.mjs

      - name: Validation passed
        if: success()
        run: echo "✅ All Figma mappings are valid - routes and components exist"
