name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─── Backend: lint, test ────────────────────────────────────────────────────
  backend:
    name: Backend — test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install rolldown linux binding (CI runner workaround)
        run: npm install --no-save @rolldown/binding-linux-x64-gnu

      - name: Run tests
        run: npm test
        env:
          NODE_ENV: test
          JWT_SECRET: ci-jwt-secret-minimum-32-characters!
          ENCRYPTION_KEY: ci-encryption-key-minimum-32-chars!
          SUPABASE_URL: http://localhost:54321
          SUPABASE_ANON_KEY: ci-supabase-anon-key-placeholder-32-chars
          SUPABASE_SERVICE_ROLE_KEY: ci-supabase-service-role-key-placeholder-32-chars
          SUPABASE_FIGMA_URL: http://localhost:54321
          SUPABASE_FIGMA_ANON_KEY: ci-supabase-figma-anon-key-placeholder-32-chars
          SUPABASE_FIGMA_SERVICE_ROLE: ci-supabase-figma-service-role-key-placeholder-32-chars

  # ─── Frontend: lint ──────────────────────────────────────────────────────
  frontend-lint:
    name: Frontend — ESLint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install rolldown linux binding (CI runner workaround)
        run: npm install --no-save @rolldown/binding-linux-x64-gnu

      - name: Run ESLint
        run: npm run lint

  # ─── Frontend: install, build ───────────────────────────────────────────────
  frontend:
    name: Frontend — build
    runs-on: ubuntu-latest
    needs: frontend-lint
    permissions:
      contents: read
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production
          VITE_SUPABASE_URL: https://ssvvuuysgxyqvmovrlvk.supabase.co
