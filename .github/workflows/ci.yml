# yaml-language-server: $schema=https://raw.githubusercontent.com/SchemaStore/schemastore/master/src/schemas/json/github-workflow.json
name: CI

# Part of the project's hardened CI/CD pipeline.
# Focuses on security, build quality, and early detection of issues before they reach production workflows (deploy, daily-sync, etc.).

on:
  pull_request:
    branches: [main]

# Cancel any in-progress runs of this workflow for the same PR/branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Default minimal permissions for the entire workflow (principle of least privilege)
permissions:
  contents: read

env:
  NODE_ENV: production

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # 1. YAML & Configuration Safety (runs first, no external dependencies)
  # ─────────────────────────────────────────────────────────────────────────────
  yaml-safety:
    name: YAML — conflict & parse guard
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Report main synchronization status
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main --quiet
          MERGE_BASE=$(git merge-base HEAD origin/main)
          LATEST_MAIN=$(git rev-parse origin/main)
          if [ "$MERGE_BASE" != "$LATEST_MAIN" ]; then
            echo "::warning::This PR is stale. It does not include the latest commits from 'main'. Consider merging main into this branch."
            echo "Main sync status: STALE" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Main sync status: UP-TO-DATE" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Fail on merge conflict markers in CI-critical config
        run: |
          python3 - <<'PY'
          from pathlib import Path

          targets = [Path('.github'), Path('supabase/config.toml')]
          markers = ('<<<<<<<', '=======', '>>>>>>>')
          found = False

          for target in targets:
              files = sorted(target.rglob('*')) if target.is_dir() else [target]
              for file_path in files:
                  if not file_path.is_file():
                      continue
                  for line_number, line in enumerate(file_path.read_text(errors='ignore').splitlines(), 1):
                      if line.startswith(markers):
                          print(f'{file_path}:{line_number}:{line}')
                          found = True

          if found:
              print('::error::Merge conflict markers detected in CI-critical config files.')
              raise SystemExit(1)
          PY

      - name: Ensure Supabase migration versions are unique
        run: |
          python3 - <<'PY'
          from collections import defaultdict
          from pathlib import Path

          migrations_dir = Path('supabase/migrations')
          versions = defaultdict(list)

          for migration in sorted(migrations_dir.glob('*.sql')):
              version = migration.name.split('_', 1)[0]
              versions[version].append(migration.name)

          duplicates = {
              version: names
              for version, names in versions.items()
              if len(names) > 1
          }

          if duplicates:
              for version, names in duplicates.items():
                  print(f'::error::Duplicate Supabase migration version {version}: {", ".join(names)}')
              raise SystemExit(1)

          print(f'OK {len(versions)} unique Supabase migration versions')
          PY

      - name: Validate Supabase SQL migration safety
        run: node scripts/validate-sql-migrations.js

      - name: Parse GitHub YAML files
        run: |
          ruby - <<'RUBY'
          require 'yaml'

          files = Dir.glob('.github/**/*.{yml,yaml}').sort
          if files.empty?
            warn 'No GitHub YAML files found.'
            exit 1
          end

          failed = false
          files.each do |f|
            begin
              # Use safe_load to avoid instantiating arbitrary objects from YAML files.
              YAML.safe_load(File.read(f), permitted_classes: [], permitted_symbols: [], aliases: true)
              puts "OK #{f}"
            rescue Psych::SyntaxError => e
              failed = true
              warn "::error file=#{f},line=#{e.line},col=#{e.column}::#{e.problem}"
            end
          end

          exit 1 if failed
          RUBY

      - name: Run offline workflow validator
        run: ruby scripts/validate-github-workflows.rb

      - name: Run actionlint
        uses: reviewdog/action-actionlint@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: ShellCheck (standalone scripts + critical embedded bash)
        # This provides PR annotations for shell issues found in .github/ (including the complex
        # bash inside supabase-link-run/action.yml and other workflow run: blocks).
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: '.github'
        env:
          SHELLCHECK_OPTS: -e SC1091 -e SC2086 -e SC2155 --severity=warning

      - name: Fallback shellcheck on standalone .sh scripts
        shell: bash
        run: |
          set -euo pipefail
          # Some repos keep critical logic in separate .sh files for easier linting.
          # This now includes scripts/supabase-migrate.sh (extracted from deploy.yml).
          find . -name '*.sh' \
            -not -path './node_modules/*' \
            -not -path './frontend/node_modules/*' \
            -not -path './.git/*' \
            -exec shellcheck --severity=warning {} +

      - name: Validate Supabase config function blocks
        run: |
          python3 - <<'PY'
          import sys
          import subprocess
          from pathlib import Path

          def get_tomllib():
              try:
                  import tomllib
                  return tomllib
              except ImportError:
                  try:
                      import tomli
                      return tomli
                  except ImportError:
                      print("tomli not found, attempting to install with --break-system-packages for PEP 668 compatibility...")
                      try:
                          subprocess.check_call([sys.executable, "-m", "pip", "install", "--break-system-packages", "tomli"])
                      except subprocess.CalledProcessError:
                          print("pip install with --break-system-packages failed, trying regular install...")
                          subprocess.check_call([sys.executable, "-m", "pip", "install", "tomli"])
                      import tomli
                      return tomli

          tomllib = get_tomllib()
          config = tomllib.loads(Path('supabase/config.toml').read_text())
          functions = config.get('functions', {})
          expected = {
              'api': 'functions/deno.json',
              'mcp': 'functions/mcp/deno.json',
              'daily-aggregates': 'functions/deno.json',
          }
          invalid_keys = {'s3_access_key', 's3_host', 's3_region', 's3_secret_key'}

          for function_name, import_map in expected.items():
              block = functions.get(function_name)
              if not isinstance(block, dict):
                  raise SystemExit(f'missing [functions.{function_name}] block')
              if block.get('import_map') != import_map:
                  raise SystemExit(f'[functions.{function_name}] import_map must be {import_map}')
              if block.get('verify_jwt') is not False:
                  raise SystemExit(f'[functions.{function_name}] verify_jwt must be false')

              # Ensure S3 keys are NOT in the function block (they belong in [experimental])
              leaked_keys = invalid_keys.intersection(block)
              if leaked_keys:
                  raise SystemExit(
                      f'[functions.{function_name}] has invalid S3 keys: {sorted(leaked_keys)}'
                  )

          print('OK supabase/config.toml function blocks')
          PY

  # ─────────────────────────────────────────────────────────────────────────────
  # 2. Frontend Pipeline (lint → test → build → optional E2E smoke)
  # ─────────────────────────────────────────────────────────────────────────────
  frontend-lint:
    needs: yaml-safety
    name: Frontend — ESLint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v5

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install --include=dev --ignore-scripts --legacy-peer-deps

      - name: Run ESLint
        run: npm run lint

  frontend-test:
    needs: frontend-lint
    name: Frontend — unit tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v5

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install --include=dev --ignore-scripts --legacy-peer-deps

      - name: Run frontend unit tests
        run: npm run test:ci

  # ─── Frontend: install, build ───────────────────────────────────────────────
  frontend:
    name: Frontend — build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: frontend-lint
    permissions:
      contents: read
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v5

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install --include=dev --ignore-scripts --legacy-peer-deps

      - name: Build
        run: |
          export NODE_ENV=production
          export VITE_SUPABASE_URL="${VITE_SUPABASE_URL:-}"
          export VITE_SUPABASE_PUBLISHABLE_KEY="${VITE_SUPABASE_PUBLISHABLE_KEY:-${VITE_SUPABASE_ANON_KEY:-}}"
          export VITE_SUPABASE_ANON_KEY="${VITE_SUPABASE_ANON_KEY:-}"
          npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_MCP_API_KEY: ${{ secrets.MCP_API_KEY }}

  frontend-e2e-smoke:
    needs: frontend
    name: Frontend — Playwright smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      # No other permissions needed for smoke tests
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v5

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install --include=dev --ignore-scripts --legacy-peer-deps

      - name: Install Playwright browsers
        run: npm exec playwright install --with-deps

      - name: Validate E2E secrets
        run: |
          if [ -z "${{ secrets.PRODUCTION_E2E_URL }}" ] || [ -z "${{ secrets.E2E_EMAIL }}" ]; then
            echo "::error::E2E smoke tests require PRODUCTION_E2E_URL and E2E_EMAIL secrets"
            exit 1
          fi

      - name: Run Playwright smoke tests
        run: npm run test:e2e
        env:
          E2E_EMAIL: ${{ secrets.E2E_EMAIL }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
          PRODUCTION_E2E_URL: ${{ secrets.PRODUCTION_E2E_URL }}
          PLAYWRIGHT_REQUIRE_BROWSERS: 'true'

  # ─────────────────────────────────────────────────────────────────────────────
  # 3. Shared libraries + Edge Functions (Deno)
  # ─────────────────────────────────────────────────────────────────────────────
  shared-functions-test:
    needs: yaml-safety
    name: Shared & Functions — Vitest
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        id: install-deps
        run: |
          set -euo pipefail
          max_attempts=3
          attempt=1
          while [ $attempt -le $max_attempts ]; do
            if npm install --include=dev --ignore-scripts --legacy-peer-deps; then
              exit 0
            fi
            if [ $attempt -eq $max_attempts ]; then
              echo "::error::npm install failed after ${max_attempts} attempts"
              exit 1
            fi
            attempt=$((attempt + 1))
            sleep 10
          done

      - name: Run shared and functions tests
        run: npm test
        env:
          NODE_ENV: test
          # Use repository secrets for CI test credentials to avoid hardcoding sensitive values.
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY || '' }}
          MCP_API_KEY: ${{ secrets.MCP_API_KEY || '' }}
          FALLBACK_META_AD_ACCOUNT_ID: ${{ secrets.FALLBACK_META_AD_ACCOUNT_ID || '' }}
          # Doctoralia webhook secrets (guarded; real values from GH secrets for setup flows)
          SHEETS_WEBHOOK_URL_DOCTORALIA: ${{ secrets.SHEETS_WEBHOOK_URL_DOCTORALIA || '' }}
          SHEETS_WEBHOOK_SECRET_DOCTORALIA: ${{ secrets.SHEETS_WEBHOOK_SECRET_DOCTORALIA || '' }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || '' }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || '' }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY || '' }}
          DEFAULT_PHONE_COUNTRY_CODE: '34'

  # (continues in the same section as above)
  edge-deno-check:
    needs: yaml-safety
    name: Edge Function — deno check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - name: Setup Deno
        uses: denoland/setup-deno@v2 # Pin to latest v2.x
        with:
          deno-version: v2.x

      - name: Run Deno type check
        continue-on-error: false
        run: |
          if [ ! -f supabase/functions/deno.json ]; then
            echo "deno.json not found in supabase/functions/ — skipping Deno check."
            exit 0
          fi
          echo "Checking all Supabase Edge Function sources..."
          deno check --config=supabase/functions/deno.json $(find supabase/functions -name '*.ts' | sort)
        env:
          # Keep type checks wired to repository configuration without embedding account identifiers.
          FALLBACK_META_AD_ACCOUNT_ID: ${{ vars.FALLBACK_META_AD_ACCOUNT_ID || secrets.FALLBACK_META_AD_ACCOUNT_ID || '' }}
          # Doctoralia webhook values are optional during CI type checking.
          SHEETS_WEBHOOK_URL_DOCTORALIA: ''
          SHEETS_WEBHOOK_SECRET_DOCTORALIA: ''
          SUPABASE_URL: ''
          SUPABASE_SERVICE_ROLE_KEY: ''
          SUPABASE_ANON_KEY: ''
          ENCRYPTION_KEY: ''
