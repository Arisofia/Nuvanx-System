name: CI

on:
  pull_request:
    branches: [main]

jobs:
  # ─── Frontend: lint ──────────────────────────────────────────────────────
  frontend-lint:
    name: Frontend — ESLint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Run ESLint
        run: npm run lint

  # ─── Frontend: install, build ───────────────────────────────────────────────
  frontend:
    name: Frontend — build
    runs-on: ubuntu-latest
    needs: frontend-lint
    permissions:
      contents: read
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Validate production frontend env
        run: |
          test -n "$VITE_SUPABASE_URL" || (echo "Missing secret: VITE_SUPABASE_URL" && exit 1)
          test -n "$VITE_SUPABASE_ANON_KEY" || (echo "Missing secret: VITE_SUPABASE_ANON_KEY" && exit 1)
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

  # ─── Backend: tests (includes CAPI parity contract) ───────────────────────
  backend-tests:
    name: Backend — Jest
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Run backend tests
        run: npm test
        env:
          NODE_ENV: test
          JWT_SECRET: ci-jwt-secret-32-characters-minimum!!
          ENCRYPTION_KEY: ci-encryption-key-32-characters-minimum!!
          DEFAULT_PHONE_COUNTRY_CODE: '34'

  # ─── Edge Function: type-check ─────────────────────────────────────────────
  edge-deno-check:
    name: Edge Function — deno check
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v2.x

      - name: Deno cache npm modules
        run: deno cache supabase/functions/api/index.ts

      - name: Type-check Edge Function
        run: deno check --config supabase/functions/deno.json supabase/functions/api/index.ts

  # ─── Edge Function: cache Deno deps — new job from fix(ci)
  edge-cache-deno:
    name: Edge Function — cache Deno deps
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
      - name: Setup Deno
        uses: denoland/setup-deno@v1
      - name: Cache Edge Function dependencies
        run: deno cache supabase/functions/api/index.ts

