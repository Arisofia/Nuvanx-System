name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  pull_request:
    branches: [main]

jobs:
  yaml-safety:
    name: YAML — conflict & parse guard
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - name: Fail on merge conflict markers in .github
        run: |
          if grep -R -nE "^(<<<<<<<|=======|>>>>>>>)" .github; then
            echo "::error::Merge conflict markers detected in .github YAML files."
            exit 1
          fi

      - name: Parse workflow and action YAML files
        run: |
          ruby - <<'RUBY'
          require 'yaml'
          files = Dir.glob('.github/workflows/*.{yml,yaml}') + Dir.glob('.github/actions/**/action.yml')
          if files.empty?
            warn 'No workflow/action YAML files found.'
            exit 1
          end
          files.each do |f|
            YAML.load_file(f)
            puts "OK #{f}"
          end
          RUBY

  # ─── Frontend: lint ──────────────────────────────────────────────────────
  frontend-lint:
    needs: yaml-safety
    name: Frontend — ESLint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v5

      - name: Use Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Run ESLint
        run: npm run lint

  # ─── Frontend: install, build ───────────────────────────────────────────────
  frontend:
    name: Frontend — build
    runs-on: ubuntu-latest
    needs: frontend-lint
    permissions:
      contents: read
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v5

      - name: Use Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Prepare frontend env for PR validation
        run: |
          if [ -z "$VITE_SUPABASE_URL" ]; then
            echo "::warning::VITE_SUPABASE_URL is not set; frontend build will continue for PR validation."
          fi
          if [ -z "$VITE_SUPABASE_PUBLISHABLE_KEY" ] && [ -z "$VITE_SUPABASE_ANON_KEY" ]; then
            echo "::warning::VITE_SUPABASE_PUBLISHABLE_KEY and VITE_SUPABASE_ANON_KEY are not set; frontend build will continue with fallback values."
          fi
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Build
        run: |
          export NODE_ENV=production
          export VITE_SUPABASE_URL="${VITE_SUPABASE_URL:-}"
          export VITE_SUPABASE_PUBLISHABLE_KEY="${VITE_SUPABASE_PUBLISHABLE_KEY:-${VITE_SUPABASE_ANON_KEY:-}}"
          export VITE_SUPABASE_ANON_KEY="${VITE_SUPABASE_ANON_KEY:-}"
          npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

  # ─── Backend: tests (includes CAPI parity contract) ───────────────────────
  backend-tests:
    needs: yaml-safety
    name: Backend — Jest
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v5

      - name: Use Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Run backend tests
        run: npm test
        env:
          NODE_ENV: test
          JWT_SECRET: ci-jwt-secret-32-characters-minimum!!
          ENCRYPTION_KEY: ci-encryption-key-32-characters-minimum!!
          DEFAULT_PHONE_COUNTRY_CODE: '34'

  # ─── Edge Function: type-check ─────────────────────────────────────────────
  edge-deno-check:
    needs: yaml-safety
    name: Edge Function — deno check
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v5

      - name: Setup Deno
        uses: denoland/setup-deno@4606d5cc6fb3f673efd4f594850e3f4b3e9d29cd
        with:
          deno-version: v2.x

      - name: Cache dependencies
        run: deno cache --config supabase/functions/deno.json supabase/functions/api/index.ts

      - name: Type-check Edge Function
        run: deno check --config supabase/functions/deno.json supabase/functions/api/index.ts
