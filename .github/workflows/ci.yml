# yaml-language-server: $schema=https://raw.githubusercontent.com/SchemaStore/schemastore/master/src/schemas/json/github-workflow.json
name: CI

on:
  pull_request:
    branches: [main]

jobs:
  yaml-safety:
    name: YAML — conflict & parse guard
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6 # v6

      - name: Fail on merge conflict markers in CI-critical config
        run: |
          if grep -R -nE "^(<<<<<<<|=======|>>>>>>>)" .github supabase/config.toml; then
            echo "::error::Merge conflict markers detected in CI-critical config files."
            exit 1
          fi

      - name: Parse workflow and action YAML files
        run: |
          ruby - <<'RUBY'
          require 'yaml'
          files = Dir.glob('.github/workflows/*.{yml,yaml}') + Dir.glob('.github/actions/**/action.yml')
          if files.empty?
            warn 'No workflow/action YAML files found.'
            exit 1
          end
          files.each do |f|
            # Use safe_load to avoid instantiating arbitrary objects from YAML files
            YAML.safe_load(File.read(f), permitted_classes: [], permitted_symbols: [], aliases: true)
            puts "OK #{f}"
          end
          RUBY

      - name: Validate Supabase config function blocks
        run: |
          python3 - <<'PY'
          import sys
          try:
              import tomllib
          except ImportError:
              # Fallback for Python < 3.11 if somehow still running on older version
              import subprocess
              subprocess.check_call([sys.executable, "-m", "pip", "install", "tomli"])
              import tomli as tomllib
          from pathlib import Path

          config = tomllib.loads(Path('supabase/config.toml').read_text())
          functions = config.get('functions', {})
          expected = {
              'api': 'functions/deno.json',
              'mcp': 'functions/mcp/deno.json',
              'daily-aggregates': 'functions/deno.json',
          }
          invalid_keys = {'s3_access_key', 's3_host', 's3_region', 's3_secret_key'}

          for function_name, import_map in expected.items():
              block = functions.get(function_name)
              if not isinstance(block, dict):
                  raise SystemExit(f'missing [functions.{function_name}] block')
              if block.get('import_map') != import_map:
                  raise SystemExit(f'[functions.{function_name}] import_map must be {import_map}')
              if block.get('verify_jwt') is not False:
                  raise SystemExit(f'[functions.{function_name}] verify_jwt must be false')
              leaked_keys = invalid_keys.intersection(block)
              if leaked_keys:
                  raise SystemExit(
                      f'[functions.{function_name}] has invalid S3 keys: {sorted(leaked_keys)}'
                  )

          print('OK supabase/config.toml function blocks')
          PY

  # ─── Frontend: lint ──────────────────────────────────────────────────────
  frontend-lint:
    needs: yaml-safety
    name: Frontend — ESLint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v6 # v6

      - name: Use Node.js
        uses: actions/setup-node@v6 # v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --include=dev --ignore-scripts

      - name: Run ESLint
        run: npm run lint

  frontend-test:
    needs: frontend-lint
    name: Frontend — unit tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v6 # v6

      - name: Use Node.js
        uses: actions/setup-node@v6 # v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --include=dev --ignore-scripts

      - name: Run frontend unit tests
        run: npm run test:ci

  # ─── Frontend: install, build ───────────────────────────────────────────────
  frontend:
    name: Frontend — build
    runs-on: ubuntu-latest
    needs: frontend-lint
    permissions:
      contents: read
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v6 # v6

      - name: Use Node.js
        uses: actions/setup-node@v6 # v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --include=dev --ignore-scripts

      - name: Prepare frontend env for PR validation
        run: |
          if [ -z "$VITE_SUPABASE_URL" ]; then
            echo "::warning::VITE_SUPABASE_URL is not set; frontend build will continue for PR validation."
          fi
          if [ -z "$VITE_SUPABASE_PUBLISHABLE_KEY" ] && [ -z "$VITE_SUPABASE_ANON_KEY" ]; then
            echo "::warning::VITE_SUPABASE_PUBLISHABLE_KEY and VITE_SUPABASE_ANON_KEY are not set; frontend build will continue with fallback values."
          fi
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Build
        run: |
          export NODE_ENV=production
          export VITE_SUPABASE_URL="${VITE_SUPABASE_URL:-}"
          export VITE_SUPABASE_PUBLISHABLE_KEY="${VITE_SUPABASE_PUBLISHABLE_KEY:-${VITE_SUPABASE_ANON_KEY:-}}"
          export VITE_SUPABASE_ANON_KEY="${VITE_SUPABASE_ANON_KEY:-}"
          npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

  frontend-e2e-smoke:
    needs: frontend
    name: Frontend — Playwright smoke
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v6 # v6

      - name: Use Node.js
        uses: actions/setup-node@v6 # v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --include=dev --ignore-scripts

      - name: Install Playwright browsers
        run: npm exec playwright install --with-deps

      - name: Validate E2E secrets
        id: check-e2e-secrets
        run: |
          MISSING=()
          [ -z "$E2E_EMAIL" ] && MISSING+=("E2E_EMAIL")
          [ -z "$E2E_PASSWORD" ] && MISSING+=("E2E_PASSWORD")
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "::warning::E2E smoke tests skipped — missing secrets: ${MISSING[*]}."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          E2E_EMAIL: ${{ secrets['E2E_EMAIL'] || '' }}
          E2E_PASSWORD: ${{ secrets['E2E_PASSWORD'] || '' }}

      - name: Run Playwright smoke tests
        if: steps.check-e2e-secrets.outputs.skip == 'false'
        run: npm run test:e2e
        env:
          E2E_EMAIL: ${{ secrets['E2E_EMAIL'] || '' }}
          E2E_PASSWORD: ${{ secrets['E2E_PASSWORD'] || '' }}

  # ─── Shared & Functions: tests ──────────────────────────────────────────────
  shared-functions-test:
    needs: yaml-safety
    name: Shared & Functions — Vitest
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6 # v6

      - name: Use Node.js
        uses: actions/setup-node@v6 # v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --include=dev --ignore-scripts

      - name: Run shared and functions tests
        run: npm test
        env:
          NODE_ENV: test
          # Use repository secrets for CI test credentials to avoid hardcoding sensitive values.
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          MCP_API_KEY: ${{ secrets['MCP_API_KEY'] }}
          DEFAULT_PHONE_COUNTRY_CODE: '34'

  # ─── Edge Function: type-check ─────────────────────────────────────────────
  edge-deno-check:
    needs: yaml-safety
    name: Edge Function — deno check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6 # v6

      - name: Setup Deno
        uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2
        with:
          deno-version: v2.x

      - name: Cache dependencies
        run: |
          if [ ! -f supabase/functions/deno.json ]; then
            echo "::error::supabase/functions/deno.json not found; skipping deno cache step."
            exit 1
          fi
          echo "Caching API function..."
          deno cache --config supabase/functions/deno.json supabase/functions/api/index.ts
          
          if [ -f supabase/functions/mcp/deno.json ]; then
            echo "Caching MCP function with local config..."
            deno cache --config supabase/functions/mcp/deno.json supabase/functions/mcp/index.ts
          else
            echo "Caching MCP function with shared config..."
            deno cache --config supabase/functions/deno.json supabase/functions/mcp/index.ts
          fi

          if [ -f supabase/functions/daily-aggregates/index.ts ]; then
            echo "Caching daily-aggregates function..."
            deno cache --config supabase/functions/deno.json supabase/functions/daily-aggregates/index.ts
          fi

      - name: Type-check Edge Functions
        run: |
          echo "Checking API function..."
          deno check --config supabase/functions/deno.json supabase/functions/api/index.ts
          
          if [ -f supabase/functions/mcp/deno.json ]; then
            echo "Checking MCP function with local config..."
            deno check --config supabase/functions/mcp/deno.json supabase/functions/mcp/index.ts
          else
            echo "Checking MCP function with shared config..."
            deno check --config supabase/functions/deno.json supabase/functions/mcp/index.ts
          fi

          if [ -f supabase/functions/daily-aggregates/index.ts ]; then
            echo "Checking daily-aggregates function..."
            deno check --config supabase/functions/deno.json supabase/functions/daily-aggregates/index.ts
          fi

      - name: Validate MCP function existence
        run: |
          echo "Validating supabase/functions/mcp/index.ts..."
          if [ -f supabase/functions/mcp/index.ts ]; then
            echo "MCP file exists ✓"
          else
            echo "ERROR: supabase/functions/mcp/index.ts not found"
            exit 1
          fi
          echo "MCP validation passed"
