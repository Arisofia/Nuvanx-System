name: CI

on:
  push:
    branches: [main, 'copilot/**', 'feature/**', 'fix/**']
  pull_request:
    branches: [main]

jobs:
  # ─── Backend: lint, test ────────────────────────────────────────────────────
  backend:
    name: Backend — test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
        env:
          NODE_ENV: test
          JWT_SECRET: ci-jwt-secret-minimum-32-characters!
          ENCRYPTION_KEY: ci-encryption-key-minimum-32-chars!

  # ─── Frontend: install, build ───────────────────────────────────────────────
  frontend:
    name: Frontend — build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production

  # ─── Figma: validate design-to-code mapping ──────────────────────────────────
  figma-validation:
    name: Figma — validate mapping
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write  # For posting validation report as PR comment

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Run Figma validation (warn-only)
        id: validate
        run: node scripts/validate-figma-mapping.js --ci
        continue-on-error: true  # Phase 0: warnings only, don't block merge

      - name: Post validation report as PR comment
        if: github.event_name == 'pull_request' && !github.event.pull_request.head.repo.fork && always()
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const { execSync } = require('child_process');

            // Run validation again to capture output
            let output;
            try {
              output = execSync('node scripts/validate-figma-mapping.js --ci', { encoding: 'utf8' });
            } catch (err) {
              output = err.stdout || err.message;
            }

            const comment = `## 🎨 Figma Validation Report

            \`\`\`
            ${output}
            \`\`\`

            **Note:** Figma validation is currently in **warn-only mode** (Phase 0). Errors will not block this PR.

            See \`docs/figma-validation-spec.md\` for details.`;

            // Find existing validation comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('🎨 Figma Validation Report')
            );

            if (botComment) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: comment,
              });
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: comment,
              });
            }
