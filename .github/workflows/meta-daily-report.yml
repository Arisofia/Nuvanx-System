# yaml-language-server: $schema=https://json.schemastore.org/github-workflow
name: Daily Unified Automation

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

# Daily automated pipeline for report generation, Doctoralia sync, and production E2E validation.
# Required secrets:
#   META_ACCESS_TOKEN
#   META_AD_ACCOUNT_ID
#   DOCTORALIA_SHEET_ID or DOCTORALIA_DRIVE_FILE_ID
#   GOOGLE_ADS_SERVICE_ACCOUNT
#   DATABASE_URL
#   CLINIC_ID
#   PRODUCTION_E2E_URL
#   PRODUCTION_E2E_TOKEN

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'  # 8am Madrid

jobs:
  report:
    name: Report — Meta Ads + Google Ads
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment: production
    env:
      REPORT_DAYS: 30
      META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN || '' }}
      META_AD_ACCOUNT_ID: ${{ secrets.META_AD_ACCOUNT_ID || '' }}
      GOOGLE_ADS_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_ADS_SERVICE_ACCOUNT || '' }}
      GOOGLE_ADS_DEVELOPER_TOKEN: ${{ secrets.GOOGLE_ADS_DEVELOPER_TOKEN || '' }}
      GOOGLE_ADS_CUSTOMER_ID: ${{ secrets.GOOGLE_ADS_CUSTOMER_ID || '' }}
      DATABASE_URL: ${{ secrets.DATABASE_URL || '' }}
      CLINIC_ID: ${{ secrets.CLINIC_ID || '' }}
      REPORT_USER_ID: ${{ secrets.REPORT_USER_ID || '' }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Validate required secrets
        run: |
          MISSING=()
          [ -z "$META_ACCESS_TOKEN" ] && MISSING+=("META_ACCESS_TOKEN")
          [ -z "$META_AD_ACCOUNT_ID" ] && MISSING+=("META_AD_ACCOUNT_ID")
          [ -z "$GOOGLE_ADS_SERVICE_ACCOUNT" ] && MISSING+=("GOOGLE_ADS_SERVICE_ACCOUNT")
          [ -z "$DATABASE_URL" ] && MISSING+=("DATABASE_URL")
          [ -z "$CLINIC_ID" ] && MISSING+=("CLINIC_ID")
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "::error::Missing required secrets: ${MISSING[*]}"
            echo "::error::Configure them in GitHub Settings → Secrets and variables → Actions"
            exit 1
          fi
      - run: npm install --no-save pg
      - run: node scripts/meta-daily-report.js
      - uses: actions/upload-artifact@v4.6.0
        with:
          name: daily-ads-unified-report
          path: reports/
          if-no-files-found: warn

  doctoralia-sync:
    name: Doctoralia — Google Sheets financial sync
    needs: report
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      GOOGLE_ADS_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_ADS_SERVICE_ACCOUNT || '' }}
      DOCTORALIA_SHEET_ID: ${{ secrets.DOCTORALIA_SHEET_ID || '' }}
      DOCTORALIA_DRIVE_FILE_ID: ${{ secrets.DOCTORALIA_DRIVE_FILE_ID || '' }}
      DATABASE_URL: ${{ secrets.DATABASE_URL || '' }}
      CLINIC_ID: ${{ secrets.CLINIC_ID || '' }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Validate Doctoralia sync secrets
        run: |
          MISSING=()
          [ -z "$GOOGLE_ADS_SERVICE_ACCOUNT" ] && MISSING+=("GOOGLE_ADS_SERVICE_ACCOUNT")
          if [ -z "$DOCTORALIA_SHEET_ID" ] && [ -z "$DOCTORALIA_DRIVE_FILE_ID" ]; then
            MISSING+=("DOCTORALIA_SHEET_ID or DOCTORALIA_DRIVE_FILE_ID")
          fi
          [ -z "$DATABASE_URL" ] && MISSING+=("DATABASE_URL")
          [ -z "$CLINIC_ID" ] && MISSING+=("CLINIC_ID")
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "::error::Missing required secrets: ${MISSING[*]}"
            echo "::error::Configure them in GitHub Settings → Secrets and variables → Actions"
            exit 1
          fi
      - name: Install Doctoralia sync dependencies
        run: npm install --no-save googleapis pg
      - name: Run Doctoralia sync
        run: |
          if echo "$GOOGLE_ADS_SERVICE_ACCOUNT" | python3 -c "import sys,json; json.load(sys.stdin)" 2>/dev/null; then
            echo "GOOGLE_SA_JSON<<EOF_GITHUB_ACTION" >> "$GITHUB_ENV"
            echo "$GOOGLE_ADS_SERVICE_ACCOUNT" >> "$GITHUB_ENV"
            echo "EOF_GITHUB_ACTION" >> "$GITHUB_ENV"
          else
            DECODED="$(echo "$GOOGLE_ADS_SERVICE_ACCOUNT" | base64 -d 2>/dev/null)" || true
            echo "$DECODED" | python3 -c "import sys,json; json.load(sys.stdin)" 2>/dev/null || {
              echo "::error::GOOGLE_ADS_SERVICE_ACCOUNT is invalid. Provide raw JSON or base64 JSON."
              exit 1
            }
            echo "GOOGLE_SA_JSON<<EOF_GITHUB_ACTION" >> "$GITHUB_ENV"
            echo "$DECODED" >> "$GITHUB_ENV"
            echo "EOF_GITHUB_ACTION" >> "$GITHUB_ENV"
          fi
          node scripts/sync-doctoralia.js
        env:
          GOOGLE_SA_JSON: ${{ env.GOOGLE_SA_JSON }}
          DOCTORALIA_SHEET_ID: ${{ env.DOCTORALIA_SHEET_ID || env.DOCTORALIA_DRIVE_FILE_ID }}
          DOCTORALIA_DRIVE_FILE_ID: ${{ env.DOCTORALIA_DRIVE_FILE_ID || env.DOCTORALIA_SHEET_ID }}
          DATABASE_URL: ${{ env.DATABASE_URL }}
          CLINIC_ID: ${{ env.CLINIC_ID }}

  supabase-security:
    name: Supabase Security
    needs:
      - doctoralia-sync
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN || '' }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF || '' }}
      DATABASE_URL: ${{ secrets.DATABASE_URL || '' }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD || '' }}

    steps:
      - uses: actions/checkout@v4
      - name: Validate Supabase security secrets
        run: |
          MISSING=()
          [ -z "$SUPABASE_ACCESS_TOKEN" ] && MISSING+=("SUPABASE_ACCESS_TOKEN")
          [ -z "$SUPABASE_PROJECT_REF" ] && MISSING+=("SUPABASE_PROJECT_REF")
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "::warning::Supabase security lint skipped — missing secrets: ${MISSING[*]}"
            echo "::warning::Configure them in GitHub Settings → Secrets and variables → Actions to enable RLS enforcement."
            echo "SKIP_LINT=true" >> "$GITHUB_ENV"
          fi
      - name: Debug Supabase connection (safe)
        run: |
          echo "SUPABASE_PROJECT_REF=$SUPABASE_PROJECT_REF"
          echo "SUPABASE_DB_PASSWORD is set? $([[ -z \"$SUPABASE_DB_PASSWORD\" ]] && echo no || echo yes)"
          if [ -n "$DATABASE_URL" ]; then
            echo "DATABASE_URL is set"
            echo "$DATABASE_URL" | sed -E 's#^postgres(ql)?://([^:@/]+):[^@]+@#postgresql://\2:***@#'
          else
            echo "DATABASE_URL is empty"
          fi
      - name: Run Supabase Security Lint
        if: env.SKIP_LINT != 'true'
        uses: ./.github/actions/supabase-link-run
        with:
          project_ref: ${{ env.SUPABASE_PROJECT_REF }}
          supabase_access_token: ${{ env.SUPABASE_ACCESS_TOKEN }}
          database_url: ${{ env.DATABASE_URL }}
          supabase_db_password: ${{ env.SUPABASE_DB_PASSWORD }}
          command: |
            if [ -n "$DATABASE_URL" ]; then
              supabase db lint --db-url "$DATABASE_URL" --level error --fail-on error
            elif [ -n "$SUPABASE_DB_PASSWORD" ]; then
              supabase db lint --linked --password "$SUPABASE_DB_PASSWORD" --level error --fail-on error
            else
              echo "::warning::SUPABASE_DB_PASSWORD and DATABASE_URL are both missing — skipping security lint."
              exit 0
            fi

  production-e2e:
    name: Production E2E
    needs:
      - report
      - doctoralia-sync
      - supabase-security
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      PRODUCTION_E2E_URL: ${{ secrets.PRODUCTION_E2E_URL || '' }}
      PRODUCTION_E2E_TOKEN: ${{ secrets.PRODUCTION_E2E_TOKEN || '' }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm ci --include=dev
      - name: Validate E2E secrets
        run: |
          MISSING=()
          [ -z "$PRODUCTION_E2E_URL" ] && MISSING+=("PRODUCTION_E2E_URL")
          [ -z "$PRODUCTION_E2E_TOKEN" ] && MISSING+=("PRODUCTION_E2E_TOKEN")
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "::error::Missing required secrets: ${MISSING[*]}"
            exit 1
          fi
      - name: Run production E2E
        run: npm run production:e2e
