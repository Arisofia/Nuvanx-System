# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Daily Unified Automation

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  actions: write # Required to trigger other workflows

on:
  workflow_dispatch: {}
  schedule:
    - cron: '0 6 * * *'  # 8am Madrid

jobs:
  report:
    name: Report — Meta Ads + Google Ads
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment:
      name: production
    env:
      REPORT_DAYS: 30
      META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
      META_AD_ACCOUNT_ID: ${{ secrets.META_AD_ACCOUNT_ID }}
      META_APP_SECRET: ${{ secrets.META_APP_SECRET }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      CLINIC_ID: ${{ secrets.CLINIC_ID }}
      REPORT_USER_ID: ${{ vars.REPORT_USER_ID || secrets.REPORT_USER_ID }}
      GOOGLE_ADS_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_ADS_SERVICE_ACCOUNT }}
      GOOGLE_ADS_DEVELOPER_TOKEN: ${{ secrets.GOOGLE_ADS_DEVELOPER_TOKEN }}
      GOOGLE_ADS_CUSTOMER_ID: ${{ secrets.GOOGLE_ADS_CUSTOMER_ID }}

    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: '22'
      - name: Validate required secrets
        run: |
          MISSING=()
          [ -z "$META_ACCESS_TOKEN" ] && MISSING+=("META_ACCESS_TOKEN")
          [ -z "$META_AD_ACCOUNT_ID" ] && MISSING+=("META_AD_ACCOUNT_ID")
          [ -z "$META_APP_SECRET" ]    && MISSING+=("META_APP_SECRET")
          [ -z "$DATABASE_URL" ]       && MISSING+=("DATABASE_URL")
          [ -z "$CLINIC_ID" ]          && MISSING+=("CLINIC_ID")
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "::error::Missing required secrets: ${MISSING[*]}"
            exit 1
          fi
      - name: Install pg dependency
        run: npm install --no-save pg
      - name: Backfill Meta daily insights (ads, last 90 days)
        env:
          BACKFILL_DAYS: 90
        run: node scripts/meta-backfill.js
      - name: Backfill Meta organic insights (Page, last 90 days)
        env:
          BACKFILL_DAYS: 90
        run: node scripts/meta-organic-backfill.js
      - name: Backfill Instagram insights (IG, last 90 days)
        env:
          BACKFILL_DAYS: 90
        run: node scripts/meta-ig-backfill.js
      - name: Run Meta daily report
        run: node scripts/meta-daily-report.js
      - name: Upload report artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: daily-ads-unified-report
          path: reports/
          if-no-files-found: warn

  # Trigger independent sync workflow
  doctoralia-sync:
    needs: report
    uses: ./.github/workflows/sync-doctoralia.yml
    secrets: inherit

  # Trigger independent security workflow
  supabase-security:
    needs: doctoralia-sync
    uses: ./.github/workflows/supabase-security.yml
    secrets: inherit

  # Trigger independent E2E workflow
  production-e2e:
    needs: supabase-security
    uses: ./.github/workflows/e2e-only.yml
    secrets: inherit
