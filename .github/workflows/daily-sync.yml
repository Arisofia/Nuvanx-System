# yaml-language-server: $schema=https://raw.githubusercontent.com/SchemaStore/schemastore/master/src/schemas/json/github-workflow.json
name: Daily Sync Orchestrator

on:
  schedule:
    - cron: '0 7 * * *'   # Daily at 07:00 UTC
  workflow_run:
    workflows: ["Supabase Security Check"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      days:
        description: 'Days of Meta insights to fetch'
        required: false
        default: '2'

# Ya no usamos FORCE_JAVASCRIPT_ACTIONS_TO_NODE22; Node se configura en setup-node
env: {}

jobs:
  daily-sync:
    name: Run Daily Sync Orchestrator
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL || secrets.VITE_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      GOOGLE_ADS_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_ADS_SERVICE_ACCOUNT }}
      DOCTORALIA_SHEET_ID: ${{ secrets.DOCTORALIA_SHEET_ID }}
      CLINIC_ID: ${{ secrets.CLINIC_ID }}
      ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
      META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
      META_AD_ACCOUNT_ID: ${{ secrets.META_AD_ACCOUNT_ID }}
      META_AD_ACCOUNT_IDS: ${{ secrets.META_AD_ACCOUNT_IDS }}
      META_APP_SECRET: ${{ secrets.META_APP_SECRET }}
      # Usa el secreto si existe; si no, este env quedará vacío y pondremos default en el paso
      META_GRAPH_VERSION: ${{ secrets.META_GRAPH_VERSION }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@v4.1.0
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --include=dev --ignore-scripts --legacy-peer-deps

      - name: Run Orchestrator Script
        run: node scripts/run-daily-sync.js
        env:
          # run-daily-sync.js needs these for sync-doctoralia and supabase deploy
          SUPABASE_ACCESS_TOKEN: ${{ env.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ env.SUPABASE_PROJECT_REF }}
          DATABASE_URL: ${{ env.DATABASE_URL }}
          GOOGLE_ADS_SERVICE_ACCOUNT: ${{ env.GOOGLE_ADS_SERVICE_ACCOUNT }}
          DOCTORALIA_SHEET_ID: ${{ env.DOCTORALIA_SHEET_ID }}
          CLINIC_ID: ${{ env.CLINIC_ID }}
          ENCRYPTION_KEY: ${{ env.ENCRYPTION_KEY }}
          META_ACCESS_TOKEN: ${{ env.META_ACCESS_TOKEN }}
          META_AD_ACCOUNT_ID: ${{ env.META_AD_ACCOUNT_ID }}
          META_AD_ACCOUNT_IDS: ${{ env.META_AD_ACCOUNT_IDS }}
          META_APP_SECRET: ${{ env.META_APP_SECRET }}
          # si no hay secreto, usa 'v20.0' como default
          META_GRAPH_VERSION: ${{ env.META_GRAPH_VERSION || 'v20.0' }}

      - name: Fetch Meta Daily Insights
        run: |
          DAYS="${{ github.event.inputs.days || '2' }}"
          echo "Fetching Meta insights for last $DAYS days..."

          RESPONSE=$(curl -s -X POST "${SUPABASE_URL}/functions/v1/daily-aggregates" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Content-Type: application/json" \
            -d "{\"action\": \"fetch_meta_insights\", \"days\": $DAYS}")

          echo "Response: $RESPONSE"
          if echo "$RESPONSE" | grep -q '"success":true'; then
            echo "Meta insights fetched successfully."
          else
            echo "::error::Failed to fetch Meta insights."
            exit 1
          fi
