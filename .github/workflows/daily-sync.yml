# yaml-language-server: $schema=https://raw.githubusercontent.com/SchemaStore/schemastore/master/src/schemas/json/github-workflow.json
name: Daily Sync Orchestrator

permissions:
  contents: read

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:
    inputs:
      from_date:
        description: 'Start date for Meta insights (YYYY-MM-DD)'
        required: false
      to_date:
        description: 'End date for Meta insights (YYYY-MM-DD)'
        required: false

concurrency:
  group: daily-sync-orchestrator-${{ github.ref }}
  cancel-in-progress: true

env:
  META_GRAPH_VERSION: v22.0
  FALLBACK_META_AD_ACCOUNT_ID: ${{ secrets.FALLBACK_META_AD_ACCOUNT_ID }}
  SHEETS_WEBHOOK_URL_DOCTORALIA: ${{ secrets.SHEETS_WEBHOOK_URL_DOCTORALIA }}
  SHEETS_WEBHOOK_SECRET_DOCTORALIA: ${{ secrets.SHEETS_WEBHOOK_SECRET_DOCTORALIA }}

jobs:
  daily-sync:
    name: Run Daily Sync Orchestrator
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 30
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      NUVANX_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.NUVANX_SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      GOOGLE_ADS_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_ADS_SERVICE_ACCOUNT }}
      GOOGLE_ADS_DEVELOPER_TOKEN: ${{ secrets.GOOGLE_ADS_DEVELOPER_TOKEN }}
      GOOGLE_ADS_CUSTOMER_ID: ${{ secrets.GOOGLE_ADS_CUSTOMER_ID }}
      GOOGLE_DOCTORALIA_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_DOCTORALIA_SERVICE_ACCOUNT }}
      DOCTORALIA_SHEET_ID: ${{ secrets.DOCTORALIA_SHEET_ID }}
      DOCTORALIA_APPOINTMENTS_SHEET_ID: 1GAJoASGdjsKB7bTtC5hXPFkWbB7S4fVXhKD_cZoDwPw
      CLINIC_ID: ${{ secrets.CLINIC_ID }}
      ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
      REPORT_USER_ID: ${{ secrets.REPORT_USER_ID }}
      META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
      META_AD_ACCOUNT_IDS: ${{ secrets.META_AD_ACCOUNT_IDS }}
      META_APP_SECRET: ${{ secrets.META_APP_SECRET }}
      SHEET_NAME: "Doctoralia"
      SHEET_RANGE: "A1:T5000"
      DOCTORALIA_APPOINTMENTS_SHEET_NAME: "Doctoralia"
      DOCTORALIA_APPOINTMENTS_SHEET_RANGE: "A1:T5000"
      DOCTORALIA_APPOINTMENTS_MIN_ROWS: "1800"
      DOCTORALIA_APPOINTMENTS_PERMISSION_MODE: "fail"
      DOCTORALIA_APPOINTMENTS_REPLACE_MODE: "true"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --include=dev --ignore-scripts --legacy-peer-deps

      - name: Validate real daily sync prerequisites
        run: node scripts/validate-daily-sync-config.js

      - name: Validate Doctoralia appointments ingestion schema
        run: node scripts/validate-doctoralia-appointments-ready.js

      - name: Run Orchestrator Script
        run: node scripts/run-daily-sync.js

      - name: Fetch Meta Daily Insights
        shell: bash
        run: |
          set -euo pipefail

          FROM_DATE="${{ github.event.inputs.from_date }}"
          TO_DATE="${{ github.event.inputs.to_date }}"

          if [ -z "$FROM_DATE" ]; then
            FROM_DATE=$(date -u +"%Y-%m-01")
          fi

          if [ -z "$TO_DATE" ]; then
            TO_DATE=$(date -u +"%Y-%m-%d")
          fi

          if ! [[ "$FROM_DATE" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]] || ! [[ "$TO_DATE" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]]; then
            echo "::error::Dates must be in YYYY-MM-DD format. Received FROM_DATE: $FROM_DATE, TO_DATE: $TO_DATE"
            exit 1
          fi

          echo "Fetching Meta insights from $FROM_DATE to $TO_DATE"

          RESPONSE=$(curl --fail-with-body --show-error --silent --max-time 60 -X POST "${SUPABASE_URL}/functions/v1/daily-aggregates" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Content-Type: application/json" \
            -d "{\"action\": \"fetch_meta_insights\", \"from\": \"$FROM_DATE\", \"to\": \"$TO_DATE\"}")

          echo "Response: $RESPONSE"

          if echo "$RESPONSE" | grep -q '"success":true'; then
            echo "Meta insights sync completed successfully"
          else
            echo "::error::Meta insights sync failed"
            exit 1
          fi
