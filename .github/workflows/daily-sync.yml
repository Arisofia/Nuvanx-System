# yaml-language-server: $schema=https://raw.githubusercontent.com/SchemaStore/schemastore/master/src/schemas/json/github-workflow.json
name: Daily Sync Orchestrator

permissions:
  contents: read

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:
    inputs:
      days:
        description: 'Days of Meta insights to fetch'
        required: false
        default: '2'

env:
  META_GRAPH_VERSION: ${{ secrets.META_GRAPH_VERSION }}
  FALLBACK_META_AD_ACCOUNT_ID: ${{ secrets.FALLBACK_META_AD_ACCOUNT_ID }}
  SHEETS_WEBHOOK_URL_DOCTORALIA: ${{ secrets.SHEETS_WEBHOOK_URL_DOCTORALIA }}
  SHEETS_WEBHOOK_SECRET_DOCTORALIA: ${{ secrets.SHEETS_WEBHOOK_SECRET_DOCTORALIA }}

jobs:
  daily-sync:
    name: Run Daily Sync Orchestrator
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      GOOGLE_ADS_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_ADS_SERVICE_ACCOUNT }}
      GOOGLE_ADS_DEVELOPER_TOKEN: ${{ secrets.GOOGLE_ADS_DEVELOPER_TOKEN }}
      GOOGLE_ADS_CUSTOMER_ID: ${{ secrets.GOOGLE_ADS_CUSTOMER_ID }}
      GOOGLE_DOCTORALIA_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_DOCTORALIA_SERVICE_ACCOUNT }}
      DOCTORALIA_SHEET_ID: ${{ secrets.DOCTORALIA_SHEET_ID }}
      CLINIC_ID: ${{ secrets.CLINIC_ID }}
      ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
      REPORT_USER_ID: ${{ secrets.REPORT_USER_ID }}
      META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
      META_AD_ACCOUNT_ID: ${{ secrets.META_AD_ACCOUNT_ID }}
      META_AD_ACCOUNT_IDS: ${{ secrets.META_AD_ACCOUNT_IDS }}
      META_APP_SECRET: ${{ secrets.META_APP_SECRET }}
      SHEET_NAME: "Doctoralia"
      SHEET_RANGE: "A1:T5000"
      DOCTORALIA_APPOINTMENTS_SHEET_NAME: "Doctoralia"
      DOCTORALIA_APPOINTMENTS_SHEET_RANGE: "A1:Z5000"
      DOCTORALIA_APPOINTMENTS_MIN_ROWS: "2200"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --include=dev --ignore-scripts --legacy-peer-deps

      - name: Validate real daily sync prerequisites
        run: node scripts/validate-daily-sync-config.js

      - name: Validate Doctoralia appointments ingestion schema
        run: node scripts/validate-doctoralia-appointments-ready.js

      - name: Run Orchestrator Script
        run: node scripts/run-daily-sync.js

      - name: Fetch Meta Daily Insights
        shell: bash
        run: |
          set -euo pipefail
          DAYS="${{ github.event.inputs.days || '2' }}"
          if ! [[ "$DAYS" =~ ^[0-9]+$ ]] || [ "$DAYS" -lt 1 ] || [ "$DAYS" -gt 90 ]; then
            echo "::error::days must be an integer between 1 and 90. Received: $DAYS"
            exit 1
          fi
          RESPONSE=$(curl --fail-with-body --show-error --silent --max-time 60 -X POST "${SUPABASE_URL}/functions/v1/daily-aggregates" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Content-Type: application/json" \
            -d "{\"action\": \"fetch_meta_insights\", \"days\": $DAYS}")
          echo "Response: $RESPONSE"
          if echo "$RESPONSE" | grep -q '"success":true'; then
            echo "Meta insights fetched successfully."
          else
            echo "::error::Failed to fetch Meta insights."
            exit 1
          fi
