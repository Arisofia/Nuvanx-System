# yaml-language-server: $schema=https://raw.githubusercontent.com/SchemaStore/schemastore/master/src/schemas/json/github-workflow.json
name: Daily Sync Orchestrator

on:
  schedule:
    - cron: '0 7 * * *'   # Daily at 07:00 UTC
  workflow_run:
    workflows: ["Supabase Security Check"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      days:
        description: 'Days of Meta insights to fetch'
        required: false
        default: '2'

env:
  SYNC_MODE: daily
  # Node 22 is used explicitly in setup-node below for stability
  META_GRAPH_VERSION: v22.0  # Updated to current stable Meta Graph API version

concurrency:
  group: daily-sync-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  daily-sync:
    name: Run Daily Sync Orchestrator
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    env:
      # Centralized secret loading for the daily sync job.
      # Many are required by scripts/sync-doctoralia.js and related modules.
      # Some have fallbacks for flexibility during development.
      SUPABASE_URL: ${{ secrets.SUPABASE_URL || secrets.VITE_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || '' }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      GOOGLE_ADS_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_ADS_SERVICE_ACCOUNT }}
      DOCTORALIA_SHEET_ID: ${{ secrets.DOCTORALIA_SHEET_ID }}
      CLINIC_ID: ${{ secrets.CLINIC_ID }}
      ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY || '' }}
      META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
      META_AD_ACCOUNT_ID: ${{ secrets.META_AD_ACCOUNT_ID }}
      META_AD_ACCOUNT_IDS: ${{ secrets.META_AD_ACCOUNT_IDS }}
      META_APP_SECRET: ${{ secrets.META_APP_SECRET }}

      # NOTE: For future calls to Supabase Edge Functions or DB operations,
      # consider using the hardened .github/actions/supabase-link-run composite action
      # (it provides consistent IPv6/pooler handling + masking).

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prefer IPv4 + hardened resolver (Supabase IPv6 mitigation)
        run: |
          echo "=== Hardening for Daily Sync (Supabase IPv6 mitigation) ==="
          echo "Note: Direct db.<ref>.supabase.co for this project is IPv6-only (confirmed via DNS)."
          echo "All connectivity hardening below exists because of this (see also deploy.yml and ci.yml)."
          # Disable IPv6 (best effort - common cause of Supabase connection issues on GitHub runners)
          sudo sysctl -w net.ipv6.conf.all.disable_ipv6=1 2>/dev/null || true
          sudo sysctl -w net.ipv6.conf.default.disable_ipv6=1 2>/dev/null || true
          sudo sysctl -w net.ipv6.conf.lo.disable_ipv6=1 2>/dev/null || true

          # Prefer IPv4 for DNS resolution
          if [ -f /etc/gai.conf ]; then
            sudo sed -i 's/^#precedence ::ffff:0:0\/96  100/precedence ::ffff:0:0\/96  100/' /etc/gai.conf 2>/dev/null || true
          fi

          # Tighter resolver settings
          echo 'options single-request-reopen timeout:2 attempts:3' | sudo tee -a /etc/resolv.conf >/dev/null 2>&1 || true

          # Install debug tools only if missing
          if ! command -v dig >/dev/null 2>&1; then
            sudo apt-get update -qq && sudo apt-get install -y -qq dnsutils netcat-openbsd 2>/dev/null || true
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm install --include=dev --ignore-scripts --legacy-peer-deps

      - name: Run Orchestrator Script
        # Hard timeout to prevent the daily sync from hanging indefinitely
        timeout-minutes: 25
        run: node scripts/run-daily-sync.js
        env:
          # Inherit most secrets from job-level env. Only add workflow-specific ones.
          META_GRAPH_VERSION: ${{ env.META_GRAPH_VERSION }}
          EXPECTED_DOCTORALIA_SHEET_ID: ${{ secrets.EXPECTED_DOCTORALIA_SHEET_ID }}

      - name: Fetch Meta Daily Insights
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ env.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ env.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          DAYS="${{ github.event.inputs.days || '2' }}"
          echo "Fetching Meta insights for last $DAYS days..."

          # Robust call to daily-aggregates Edge Function
          RESPONSE=$(curl -sS --max-time 180 --retry 2 --retry-delay 5 -X POST "${SUPABASE_URL}/functions/v1/daily-aggregates" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Content-Type: application/json" \
            -d "{\"action\": \"fetch_meta_insights\", \"days\": ${DAYS}}" || echo '{"success":false,"error":"curl_failed"}')

          echo "Response: $RESPONSE"

          # Use jq for reliable JSON parsing (more robust than grep)
          if command -v jq >/dev/null 2>&1; then
            SUCCESS=$(echo "$RESPONSE" | jq -r '.success // false' 2>/dev/null || echo "false")
          else
            # Fallback if jq is not available
            SUCCESS=$(echo "$RESPONSE" | grep -o '"success":[^,}]*' | head -1 | grep -q 'true' && echo "true" || echo "false")
          fi

          if [ "$SUCCESS" = "true" ]; then
            echo "✅ Meta insights fetched successfully."
          else
            echo "::warning::Meta insights step failed or returned error (non-fatal — continuing daily sync)."
            echo "Response: $RESPONSE"
            # Do not fail the whole job — the main doctoralia sync may still be valuable
          fi

      - name: Daily Sync Summary
        if: always()
        run: |
          echo "### 📅 Daily Sync Orchestrator Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Run type:** ${{ github.event_name }}"
          echo "- **Meta insights days:** ${{ github.event.inputs.days || '2' }}"
          echo "- **Node version:** 22"
          echo "- **IPv6 disabled:** Yes (hardened for Supabase)"
          echo ""
          echo "See job logs for detailed sync-doctoralia + Meta insights results."
