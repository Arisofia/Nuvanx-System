              const c    = crypto.createCipheriv('aes-256-gcm', key, iv);
              const ct   = Buffer.concat([c.update(text, 'utf8'), c.final()]);
              return [salt, iv, c.getAuthTag(), ct].map(b => b.toString('hex')).join(':');
            }

            const pairs = [
              ['github',    process.env.CRED_GITHUB],
              ['gemini',    process.env.CRED_GEMINI],
              ['whatsapp',  process.env.CRED_WHATSAPP_TOKEN
                              ? JSON.stringify({ access_token: process.env.CRED_WHATSAPP_TOKEN, phone_number_id: process.env.CRED_WHATSAPP_PHONE })
                              : null],
              ['google',    process.env.CRED_GOOGLE],
              ['figma',     process.env.CRED_FIGMA],
              ['anthropic', process.env.CRED_ANTHROPIC],
            ].filter(([, v]) => v && v.trim());

            if (!pairs.length) { core.setFailed('No credentials found'); return; }

            const db = new Client({ connectionString: process.env.DATABASE_URL, ssl: { rejectUnauthorized: false } });
            await db.connect();

            for (const [svc, raw] of pairs) {
              await db.query(
                `INSERT INTO public.credentials (user_id, service, encrypted_key)
                 VALUES ($1,$2,$3)
                 ON CONFLICT (user_id, service) DO UPDATE SET encrypted_key = EXCLUDED.encrypted_key`,
                [UID, svc, encrypt(raw)]
              );
              await db.query(
                `UPDATE public.integrations SET status='connected', updated_at=NOW()
                 WHERE user_id=$1 AND service=$2`,
                [UID, svc]
              );
              console.log(`stored + connected: ${svc}`);
            }

            await db.end();
            console.log(`\nSeeded ${pairs.length} credentials. Encrypted (AES-256-GCM/PBKDF2) — persists in Supabase across all sessions.`);
name: Seed Credentials to Supabase

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "seed" to confirm overwriting stored credentials'
        required: true
        default: ''

jobs:
  seed:
    name: Encrypt & store integration credentials
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'seed'

    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pg client
        run: npm install pg

      - name: Seed credentials via Postgres
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          ADMIN_USER_ID: "a2f2b8a1-fedb-4a74-891d-b8a2089fd49a"
          GITHUB_TOKEN_VALUE: ${{ secrets.GH_PAT }}
          GEMINI_KEY: ${{ secrets.GEMINI_API_KEY }}
          WHATSAPP_TOKEN: ${{ secrets.WHATSAPP_ACCESS_TOKEN }}
          WHATSAPP_PHONE_ID: ${{ secrets.WHATSAPP_PHONE_NUMBER_ID }}
          GOOGLE_API_KEY_VALUE: ${{ secrets.GOOGLE_API_KEY }}
          GOOGLE_CLIENT_EMAIL_VALUE: ${{ secrets.GOOGLE_CLIENT_EMAIL }}
          FIGMA_TOKEN_VALUE: ${{ secrets.FIGMA_TOKEN }}
          ANTHROPIC_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          node - <<'SCRIPT'
          const crypto = require('crypto');
          const { Client } = require('pg');

          const ENC_KEY = process.env.ENCRYPTION_KEY;
          const USER_ID = process.env.ADMIN_USER_ID;

          function encrypt(text) {
            const salt       = crypto.randomBytes(32);
            const iv         = crypto.randomBytes(12);
            const key        = crypto.pbkdf2Sync(ENC_KEY, salt, 100000, 32, 'sha256');
            const cipher     = crypto.createCipheriv('aes-256-gcm', key, iv);
            const ciphertext = Buffer.concat([cipher.update(text, 'utf8'), cipher.final()]);
            const authTag    = cipher.getAuthTag();
            return [salt, iv, authTag, ciphertext].map(b => b.toString('hex')).join(':');
          }

          const credentials = [
            { service: 'github',    raw: process.env.GITHUB_TOKEN_VALUE },
            { service: 'gemini',    raw: process.env.GEMINI_KEY },
            { service: 'whatsapp',  raw: (process.env.WHATSAPP_TOKEN
                ? JSON.stringify({ access_token: process.env.WHATSAPP_TOKEN, phone_number_id: process.env.WHATSAPP_PHONE_ID })
                : null) },
            { service: 'google',    raw: process.env.GOOGLE_API_KEY_VALUE },
            { service: 'figma',     raw: process.env.FIGMA_TOKEN_VALUE },
            { service: 'anthropic', raw: process.env.ANTHROPIC_KEY },
          ].filter(c => c.raw && c.raw.trim() !== '');

          if (!credentials.length) { console.error('No credentials found'); process.exit(1); }

          (async () => {
            const client = new Client({ connectionString: process.env.DATABASE_URL, ssl: { rejectUnauthorized: false } });
            await client.connect();
            for (const cred of credentials) {
              const enc = encrypt(cred.raw);
              await client.query(
                `INSERT INTO public.credentials (user_id, service, encrypted_key)
                 VALUES ($1, $2, $3)
                 ON CONFLICT (user_id, service) DO UPDATE SET encrypted_key = EXCLUDED.encrypted_key`,
                [USER_ID, cred.service, enc]
              );
              await client.query(
                `UPDATE public.integrations SET status = 'connected', updated_at = NOW()
                 WHERE user_id = $1 AND service = $2`,
                [USER_ID, cred.service]
              );
              console.log('stored and connected: ' + cred.service);
            }
            await client.end();
            console.log('Done. ' + credentials.length + ' credentials encrypted and stored in Supabase.');
          })().catch(e => { console.error(e.message); process.exit(1); });
          SCRIPT
