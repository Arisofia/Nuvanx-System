name: Seed Credentials to Supabase

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "seed" to confirm overwriting stored credentials'
        required: true
        default: ''

jobs:
  seed:
    name: Encrypt & store integration credentials
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'seed'

    steps:
      - name: Seed credentials into Supabase
        uses: actions/github-script@v7
        env:
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ADMIN_USER_ID: "a2f2b8a1-fedb-4a74-891d-b8a2089fd49a"
          # Integration credentials
          GITHUB_TOKEN_VALUE: ${{ secrets.GH_PAT }}
          GEMINI_KEY: ${{ secrets.GEMINI_API_KEY }}
          WHATSAPP_TOKEN: ${{ secrets.WHATSAPP_ACCESS_TOKEN }}
          WHATSAPP_PHONE_ID: ${{ secrets.WHATSAPP_PHONE_NUMBER_ID }}
          GOOGLE_API_KEY_VALUE: ${{ secrets.GOOGLE_API_KEY }}
          GOOGLE_CLIENT_EMAIL_VALUE: ${{ secrets.GOOGLE_CLIENT_EMAIL }}
          FIGMA_TOKEN_VALUE: ${{ secrets.FIGMA_TOKEN }}
          ANTHROPIC_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        with:
          script: |
            const crypto = require('crypto');

            const ENCRYPTION_KEY = process.env.ENCRYPTION_KEY;
            const SUPABASE_URL   = process.env.SUPABASE_URL;
            const SERVICE_KEY    = process.env.SUPABASE_SERVICE_ROLE_KEY;
            const USER_ID        = process.env.ADMIN_USER_ID;

            // ── Same AES-256-GCM/PBKDF2 logic as backend/src/services/encryption.js ──
            function encrypt(text) {
              const salt       = crypto.randomBytes(32);
              const iv         = crypto.randomBytes(12);
              const key        = crypto.pbkdf2Sync(ENCRYPTION_KEY, salt, 100000, 32, 'sha256');
              const cipher     = crypto.createCipheriv('aes-256-gcm', key, iv);
              const ciphertext = Buffer.concat([cipher.update(text, 'utf8'), cipher.final()]);
              const authTag    = cipher.getAuthTag();
              return [salt, iv, authTag, ciphertext].map(b => b.toString('hex')).join(':');
            }

            // Build credential list — skip any that have no value in secrets
            const credentials = [
              { service: 'github',    raw: process.env.GITHUB_TOKEN_VALUE },
              { service: 'gemini',    raw: process.env.GEMINI_KEY },
              { service: 'whatsapp',  raw: process.env.WHATSAPP_TOKEN
                  ? JSON.stringify({
                      access_token: process.env.WHATSAPP_TOKEN,
                      phone_number_id: process.env.WHATSAPP_PHONE_ID,
                    })
                  : null },
              { service: 'google',    raw: process.env.GOOGLE_API_KEY_VALUE },
              { service: 'figma',     raw: process.env.FIGMA_TOKEN_VALUE },
              { service: 'anthropic', raw: process.env.ANTHROPIC_KEY },
            ].filter(c => c.raw && c.raw.trim() !== '');

            if (credentials.length === 0) {
              core.setFailed('No credentials found — check that secrets are set');
              return;
            }

            // ── Upsert each credential ────────────────────────────────────────────
            const rows = credentials.map(c => ({
              user_id:       USER_ID,
              service:       c.service,
              encrypted_key: encrypt(c.raw),
            }));

            const credRes = await fetch(`${SUPABASE_URL}/rest/v1/credentials`, {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'apikey':        SERVICE_KEY,
                'Authorization': `Bearer ${SERVICE_KEY}`,
                'Prefer':        'resolution=merge-duplicates,return=minimal',
                'on-conflict':   'user_id,service',
              },
              body: JSON.stringify(rows),
            });

            if (!credRes.ok) {
              const err = await credRes.text();
              core.setFailed(`Failed to upsert credentials: ${err}`);
              return;
            }

            console.log(`✅ Stored ${rows.length} credentials: ${rows.map(r => r.service).join(', ')}`);

            // ── Update integrations table status to 'connected' for each service ──
            const connectedServices = rows.map(r => r.service);

            const intRes = await fetch(
              `${SUPABASE_URL}/rest/v1/integrations?user_id=eq.${USER_ID}&service=in.(${connectedServices.join(',')})`,
              {
                method: 'PATCH',
                headers: {
                  'Content-Type': 'application/json',
                  'apikey':        SERVICE_KEY,
                  'Authorization': `Bearer ${SERVICE_KEY}`,
                },
                body: JSON.stringify({
                  status:     'connected',
                  updated_at: new Date().toISOString(),
                }),
              }
            );

            if (!intRes.ok) {
              const err = await intRes.text();
              console.warn(`⚠️  Could not update integrations status: ${err}`);
            } else {
              console.log(`✅ Integrations marked connected: ${connectedServices.join(', ')}`);
            }

            console.log('');
            console.log('🔒 All credentials are stored encrypted (AES-256-GCM + PBKDF2).');
            console.log('   They persist in Supabase — no need to re-enter them in the UI.');
