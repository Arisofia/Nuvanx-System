name: Seed Credentials to Supabase

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "seed" to confirm overwriting stored credentials'
        required: true
        default: ''

jobs:
  seed:
    name: Encrypt & store integration credentials
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'seed'

    env:
      DATABASE_URL:       ${{ secrets.DATABASE_URL }}
      ENCRYPTION_KEY:     ${{ secrets.ENCRYPTION_KEY }}
      ADMIN_USER_ID:      "a2f2b8a1-fedb-4a74-891d-b8a2089fd49a"
      CRED_GITHUB:        ${{ secrets.GH_PAT }}
      CRED_GEMINI:        ${{ secrets.GEMINI_API_KEY }}
      CRED_WHATSAPP_TOKEN: ${{ secrets.WHATSAPP_ACCESS_TOKEN }}
      CRED_WHATSAPP_PHONE: ${{ secrets.WHATSAPP_PHONE_NUMBER_ID }}
      CRED_GOOGLE:        ${{ secrets.GOOGLE_API_KEY }}
      CRED_FIGMA:         ${{ secrets.FIGMA_TOKEN }}
      CRED_ANTHROPIC:     ${{ secrets.ANTHROPIC_API_KEY }}

    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pg
        run: npm install pg

      - name: Run seed script
        run: |
          node -e "
          const crypto = require('crypto');
          const { Client } = require('./node_modules/pg');

          const ENC = process.env.ENCRYPTION_KEY;
          const UID = process.env.ADMIN_USER_ID;

          function encrypt(text) {
            const salt = crypto.randomBytes(32);
            const iv   = crypto.randomBytes(12);
            const key  = crypto.pbkdf2Sync(ENC, salt, 100000, 32, 'sha256');
            const c    = crypto.createCipheriv('aes-256-gcm', key, iv);
            const ct   = Buffer.concat([c.update(text, 'utf8'), c.final()]);
            return [salt, iv, c.getAuthTag(), ct].map(b => b.toString('hex')).join(':');
          }

          const pairs = [
            ['github',    process.env.CRED_GITHUB],
            ['gemini',    process.env.CRED_GEMINI],
            ['whatsapp',  process.env.CRED_WHATSAPP_TOKEN
                            ? JSON.stringify({ access_token: process.env.CRED_WHATSAPP_TOKEN, phone_number_id: process.env.CRED_WHATSAPP_PHONE })
                            : null],
            ['google',    process.env.CRED_GOOGLE],
            ['figma',     process.env.CRED_FIGMA],
            ['anthropic', process.env.CRED_ANTHROPIC],
          ].filter(([, v]) => v && v.trim());

          if (!pairs.length) { console.error('No credentials found in secrets'); process.exit(1); }

          (async () => {
            const db = new Client({ connectionString: process.env.DATABASE_URL, ssl: { rejectUnauthorized: false } });
            await db.connect();
            for (const [svc, raw] of pairs) {
              await db.query(
                \`INSERT INTO public.credentials (user_id, service, encrypted_key)
                 VALUES (\$1,\$2,\$3)
                 ON CONFLICT (user_id, service) DO UPDATE SET encrypted_key = EXCLUDED.encrypted_key\`,
                [UID, svc, encrypt(raw)]
              );
              await db.query(
                \`UPDATE public.integrations SET status='connected', updated_at=NOW()
                 WHERE user_id=\$1 AND service=\$2\`,
                [UID, svc]
              );
              console.log('stored + connected: ' + svc);
            }
            await db.end();
            console.log('');
            console.log('Seeded ' + pairs.length + ' credentials.');
            console.log('Encrypted AES-256-GCM+PBKDF2. Persists in Supabase — no re-entry needed.');
          })().catch(e => { console.error(e.message); process.exit(1); });
          "
name: Seed Credentials to Supabase

on:
