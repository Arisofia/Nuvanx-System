###############################################################################
# Render.com Blueprint — Nuvanx System
# Docs: https://render.com/docs/blueprint-spec
#
# Deploy both services with one click:
#   render.com → New → Blueprint → connect repo → root: / (default)
#
# Or create each service manually using the values below.
###############################################################################

services:
  # ── Backend — Node.js/Express API ─────────────────────────────────────────
  - type: web
    name: nuvanx-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node src/server.js
    autoDeploy: true
    # Render sets PORT automatically (default 10000); env.js reads process.env.PORT.
    envVars:
      - key: NODE_ENV
        value: production
      # ── Required — set these in the Render dashboard, NOT here ────────────
      # (values marked sync:false are intentionally left blank in this file)
      - key: JWT_SECRET
        sync: false          # minimum 32 chars
      - key: ENCRYPTION_KEY
        sync: false          # minimum 32 chars
      - key: DATABASE_URL
        sync: false          # postgresql://postgres:[PWD]@db.ssvvuuysgxyqvmovrlvk.supabase.co:5432/postgres
      # ── Supabase ──────────────────────────────────────────────────────────
      - key: SUPABASE_URL
        value: https://ssvvuuysgxyqvmovrlvk.supabase.co
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      # ── CORS — point to the static site URL below ─────────────────────────
      - key: FRONTEND_URL
        value: https://nuvanx-frontend.onrender.com  # update after first deploy
      # ── Meta / WhatsApp ────────────────────────────────────────────────────
      - key: META_ACCESS_TOKEN
        sync: false
      - key: META_AD_ACCOUNT_ID
        value: act_4172099716404860
      - key: META_APP_SECRET
        sync: false
      - key: META_VERIFY_TOKEN
        sync: false
      - key: META_BUSINESS_ID
        value: "878822511043717"
      - key: META_PAGE_ID
        value: "685010274687129"
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      # ── AI ─────────────────────────────────────────────────────────────────
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      # ── GitHub ─────────────────────────────────────────────────────────────
      - key: GITHUB_PAT
        sync: false

  # ── Frontend — React/Vite Static Site ─────────────────────────────────────
  - type: web
    name: nuvanx-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    autoDeploy: true
    routes:
      # SPA fallback: serve index.html for all paths (client-side routing)
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          name: nuvanx-backend
          type: web
          property: host
          # Render will inject the backend URL automatically.
          # If using fromService doesn't work in your plan, set manually:
          # value: https://nuvanx-backend.onrender.com
      - key: VITE_SUPABASE_URL
        value: https://ssvvuuysgxyqvmovrlvk.supabase.co
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
