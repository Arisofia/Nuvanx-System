services:
  - type: web
    name: nuvanx-backend
    runtime: node
    region: frankfurt
    rootDir: backend
    buildCommand: npm ci
    startCommand: node src/server.js
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: JWT_SECRET
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: SUPABASE_FIGMA_URL
        sync: false
      - key: SUPABASE_FIGMA_ANON_KEY
        sync: false
      - key: SUPABASE_FIGMA_SERVICE_ROLE
        sync: false
    healthCheckPath: /health
    autoDeploy: true
