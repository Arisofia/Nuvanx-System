# Render.com deployment
# Docs: https://render.com/docs/yaml-spec
#
# First-time setup:
#   1. Go to https://dashboard.render.com/new/blueprint
#   2. Connect repo: Arisofia/Nuvanx-System
#   3. Render detects this file and creates the service
#   4. Run scripts/deploy-render.ps1 to push env vars and deploy
#
# After first setup, deploys are triggered automatically on push to main
# (autoDeploy: true) or manually via: scripts/deploy-render.ps1
services:
  - type: web
    name: nuvanx-backend
    runtime: node
    region: frankfurt          # closest to Spain (EU)
    plan: free
    rootDir: backend
    buildCommand: npm install --omit=dev
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: FRONTEND_URL
        value: https://frontend-arisofias-projects-c2217452.vercel.app
      # Secrets — set via scripts/deploy-render.ps1 or Render dashboard:
      # JWT_SECRET              — minimum 32 characters
      # ENCRYPTION_KEY          — minimum 32 characters
      # DATABASE_URL            — Supabase PostgreSQL connection string
      # SUPABASE_URL
      # SUPABASE_ANON_KEY
      # SUPABASE_SERVICE_ROLE_KEY
      # SUPABASE_JWT_SECRET
      # SUPABASE_FIGMA_URL
      # SUPABASE_FIGMA_ANON_KEY
      # SUPABASE_FIGMA_SERVICE_ROLE
      # WEBHOOK_ADMIN_USER_ID   — UUID of admin user (a2f2b8a1-fedb-4a74-891d-b8a2089fd49a)
      # META_ACCESS_TOKEN       — long-lived Meta System User token
      # META_AD_ACCOUNT_ID      — act_XXXXXXXXX format
      # META_APP_SECRET         — for webhook signature verification
      # META_VERIFY_TOKEN       — for Meta webhook challenge verification
      # WHATSAPP_ACCESS_TOKEN
      # WHATSAPP_PHONE_NUMBER_ID
      # OPENAI_API_KEY
      # GEMINI_API_KEY
      # GITHUB_PAT
      # BCRYPT_ROUNDS
      # JWT_EXPIRES_IN
      # EMAIL_FROM
      # ALLOW_SHARED_CREDENTIALS
      # SENTRY_DSN              — (optional)
      # RESEND_API_KEY          — (optional)
      # CLINIC_ID               — UUID of the default clinic (e.g. 4207023b-eac1-4249-bf0f-d9b1e36a5d7a)
      # DOCTORALIA_SHEET_ID     — Google Sheet ID for Doctoralia export (optional, used by ingest script)
