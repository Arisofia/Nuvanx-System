version: "3.9"

services:
  alloy:
    image: grafana/alloy:latest
    container_name: nuvanx-alloy
    restart: unless-stopped
    env_file:
      - ../../backend/.env          # picks up SUPABASE_SERVICE_ROLE_KEY, GRAFANA_TOKEN
    environment:
      - GRAFANA_PROM_URL=${GRAFANA_PROM_URL}
      - GRAFANA_PROM_USER=${GRAFANA_PROM_USER}
    volumes:
      - ./config.alloy:/etc/alloy/config.alloy:ro
    command:
      - run
      - /etc/alloy/config.alloy
    ports:
      - "12345:12345"   # Alloy UI (local only)
